    '<div style="font-size:18px;font-weight:600;margin-bottom:10px">Carica un ODG</div>'+
    '<div class="sub" style="margin-bottom:10px">Si carica UNA volta: ogni punto va automaticamente in votazione in tutte le palazzine e i delegati ricevono la notifica.</div>'+
    '<label>Titolo</label><input id="og-tit" type="text" placeholder="es. Consiglio dei Delegati — settembre" style="margin:4px 0 10px;width:100%">'+
    '<label>Data del Consiglio (facoltativa)</label><input id="og-data" type="date" style="margin:4px 0 10px;width:100%">'+
    '<label>Punti all\'ordine del giorno</label><div id="og-punti" style="display:grid;gap:10px;margin:6px 0 8px"></div>'+
    '<button id="og-add" style="font-size:14px">＋ Aggiungi punto</button>'+
    '<div id="og-warn" style="color:var(--bad);font-size:14px;margin:6px 0;display:none"></div>'+
    '<div style="display:grid;grid-template-columns:1fr 2fr;gap:9px;margin-top:12px"><button id="og-x">Annulla</button><button class="btn-primary" id="og-ok">Carica e diffondi</button></div></div>';
  document.querySelector('.wrap').appendChild(m);
  function addPunto(){
    var row=document.createElement('div');
    row.style.cssText='border:1px solid var(--line);border-radius:10px;padding:8px';
    row.innerHTML='<div style="display:flex;gap:6px;align-items:center"><input type="text" class="og-pt" placeholder="titolo del punto" style="margin:0;flex:1;min-width:0"><button class="og-rm" style="flex:none;font-size:15px;padding:8px 12px;color:var(--muted)" aria-label="Rimuovi punto">✕</button></div>'+
      '<textarea class="og-pd" rows="2" placeholder="descrizione (facoltativa)" style="margin:6px 0 0;width:100%;font-size:16px;line-height:1.4;min-width:0"></textarea>';
    row.querySelector('.og-rm').onclick=function(){ row.remove(); };
    $('og-punti').appendChild(row);
  }
  addPunto();
  $('og-add').onclick=function(){ addPunto(); var ps=m.querySelectorAll('.og-pt'); ps[ps.length-1].focus(); };
  $('og-x').onclick=function(){ m.remove(); };
  var createdId=null, createdPts=false;   // in caso di retry dopo un errore, non ri-creare l'ODG (fan-out già idempotente a DB)
  $('og-ok').onclick=async function(){
    function warn(t){ $('og-warn').textContent=t; $('og-warn').style.display='block'; }
    var tit=($('og-tit').value||'').trim();
    if(!tit && !createdId){ warn('Il titolo è obbligatorio.'); return; }
    var pts=[]; m.querySelectorAll('#og-punti > div').forEach(function(row){
      var t=(row.querySelector('.og-pt').value||'').trim(), d=(row.querySelector('.og-pd').value||'').trim();
      if(t) pts.push({titolo:t, descrizione:d||null});
    });
    if(!pts.length && !createdPts){ warn('Serve almeno un punto (col suo titolo).'); return; }
    if(!await conferma({titolo:'Diffondere l\'ODG?',testo:'«'+tit+'» — '+pts.length+' punti.\n\nOgni punto va in votazione in TUTTE le palazzine e i delegati ricevono la notifica.',azione:'Carica e diffondi'})) return;
    if(DEMO){
      var oid='odg'+Date.now();
      DEMO_ODG.unshift({id:oid,titolo:tit,data_consiglio:($('og-data').value||null),creato_da_nome:userNome,created_at:new Date().toISOString()});
      pts.forEach(function(p,i){ var pid='pt'+Date.now()+'-'+i;
        DEMO_ODG_PUNTI.push({id:pid,odg_id:oid,ordine:i+1,titolo:p.titolo,descrizione:p.descrizione});
        ['I','C'].forEach(function(pal){ DEMO_SONDAGGI.push({id:'so'+Date.now()+'-'+i+pal,domanda:p.titolo,descrizione:p.descrizione,opzioni:['Sì','No','Astenuto'],chiuso:false,approvato:true,autore_nome:'Consiglio dei Delegati — ODG',palazzina:pal,tipo:'odg_punto',odg_punto_id:pid}); });
      });
      m.remove(); renderOdg(); return;
    }
    var btn=$('og-ok'); btn.disabled=true; btn.textContent='Carico…';
    if(!createdId){
      var r=await sb.from('odg').insert({titolo:tit,data_consiglio:($('og-data').value||null),creato_da_nome:userNome}).select('id').single();
      if(r.error){ warn('Errore: '+r.error.message); btn.disabled=false; btn.textContent='Carica e diffondi'; return; }
      createdId=r.data.id;
    }
    if(!createdPts){
      var rows=pts.map(function(p,i){ return {odg_id:createdId,ordine:i+1,titolo:p.titolo,descrizione:p.descrizione}; });
      var r2=await sb.from('odg_punti').insert(rows);
      if(r2.error){ warn('Errore punti: '+r2.error.message); btn.disabled=false; btn.textContent='Riprova'; return; }
      createdPts=true;
    }
    var r3=await sb.rpc('odg_fanout',{p_odg:createdId});
    if(r3.error){ warn('ODG salvato ma diffusione fallita: '+r3.error.message); btn.disabled=false; btn.textContent='Riprova diffusione'; return; }
    m.remove();
    alert('ODG diffuso ✅\n\n'+r3.data+' votazioni aperte nelle palazzine. I delegati hanno ricevuto la notifica.');
    renderOdg();
  };
}

  var v=$('view-avvisi');

async function cambiaStatoAvviso(a,nuovo){
  if(!a||!a.id){ alert('Avviso senza id: operazione annullata.'); return; }
  if(!puoChiudere(a)){ alert('Solo chi ha aperto l\'avviso (o l\'amministrazione) può aggiornarlo.'); return; }
  if(nuovo==='risolto' && !await conferma({titolo:'Avviso risolto?',testo:'L\'avviso passa tra i risolti, con la tua firma.',azione:'Segna risolto'})) return;
  if(nuovo==='preso_in_carico' && !await conferma({titolo:'Prendere in carico l\'avviso?',testo:'Gli altri vedranno che ci stai lavorando, con la tua firma.',azione:'Prendi in carico'})) return;
  var patch={stato:nuovo};
  if(nuovo==='preso_in_carico'){ if(!a.preso_at) patch.preso_at=new Date().toISOString(); patch.preso_da_nome=userNome; }
  if(nuovo==='risolto'){ patch.chiuso_il=new Date().toISOString(); patch.chiuso_da=userId; patch.chiuso_da_nome=userNome; }
  if(nuovo==='aperto'){ patch.chiuso_il=null; patch.chiuso_da=null; patch.chiuso_da_nome=null; }   // riapertura azzera la chiusura
  if(DEMO){ Object.assign(a,patch); renderAvvisi(); return; }
  var res=await sb.from('avvisi').update(patch).eq('id',a.id).select('id');
  if(res.error){ alert('Errore: '+res.error.message); return; }
  if(res.data && res.data.length>1){ alert('Attenzione: toccate '+res.data.length+' righe (atteso 1). Segnalalo.'); }
  await loadAvvisi(); renderAvvisi();
}

    h+='<button type="button" id="av-add" aria-label="Aggiungi foto" style="width:64px;height:64px;border-radius:8px;border:2px dashed var(--ok);background:var(--okbg);color:var(--ok);font-size:34px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0">+</button>';

    $('av-add').onclick=function(){ $('av-foto').click(); };
  }
  renderPrevs();
  $('av-foto').onchange=function(e){ [].slice.call(e.target.files).forEach(function(f){ downscale(f,function(blob){ fotoBlobs.push(blob); renderPrevs(); }); }); e.target.value=''; };

      var urlsD=fotoBlobs.map(function(b){return URL.createObjectURL(b)});

    try{
      var urls=[];

        var path=userId+'/avviso-'+Date.now()+'-'+i+'.jpg';

        urls.push(sb.storage.from('foto').getPublicUrl(path).data.publicUrl);

function fmtDayShort(g){ var d=new Date(g+'T00:00:00'); return d.toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'short'}); }
function giorniTra(a,b){ return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000); }
function compitoFattoOggi(id){ return compitiOggi.some(function(r){return r.compito_id===id && r.giorno===todayStr();}); }   // difensivo su giorno: se la PWA resta aperta oltre mezzanotte, non contare i ✓ di ieri

function compitoDovutoOggi(c){
  if(compitoFattoOggi(c.id)) return true;         // fatto oggi → resta visibile (come fatto) fino a fine giornata
  if((c.cad||1)<=1) return true;                  // giornaliero → riproposto ogni giorno
  var prev=compitoUltimoPrima(c.id);
  if(!prev) return true;                          // mai registrato → dovuto
  return giorniTra(prev,todayStr())>=c.cad;       // scaduto → dovuto, e resta finché non fatto (poi sparisce fino alla prossima scadenza)

function iscrittiDi(tid){ return iscrizioniTorneo.filter(function(x){return x.torneo_id===tid;}); }

function partiteDi(tid){ return partiteTorneo.filter(function(x){return x.torneo_id===tid;}); }
// classifica del girone: vittorie, giocate; ordina per vittorie, poi differenza (2V-G), poi nome
function classificaDi(tid){
  var isc=iscrittiDi(tid), pg=partiteDi(tid).filter(function(p){return p.stato==='giocato';});
  var st={}; isc.forEach(function(x){ st[x.autore_id]={nome:x.autore_nome,unita:x.unita,g:0,v:0}; });
  pg.forEach(function(p){
    if(st[p.a_id]){ st[p.a_id].g++; if(p.vincitore==='a') st[p.a_id].v++; }
    if(st[p.b_id]){ st[p.b_id].g++; if(p.vincitore==='b') st[p.b_id].v++; }
  });
  var rows=Object.keys(st).map(function(k){return st[k];});
  rows.sort(function(a,b){ return (b.v-a.v) || ((2*b.v-b.g)-(2*a.v-a.g)) || a.nome.localeCompare(b.nome); });
  return rows;
}

  if(!views[v]) v='zona';
  if(v==='admin' && !adminView()) v='zona';   // la vista admin è raggiungibile solo in modalità amministratore
  if(v==='ordini' && !(isAmministratore()||isAdmin)) v='annunci';   // inbox ordini: amministratore + admin (SEMPRE, anche in vista condòmino — scelta Corrado; la gestione stati resta in vista admin)
  curV=v; var hub=hubOf(v);
  $('nav').querySelectorAll('button').forEach(function(b){b.classList.toggle('active', b.dataset.hub===hub.id);});
  var sn=$('subnav'); sn.style.setProperty('--area',hub.col||''); sn.style.setProperty('--areabg',hub.bg||'');
  var wp=document.querySelector('.wrap'); if(wp){ wp.style.setProperty('--area',hub.col||''); wp.style.setProperty('--areabg',hub.bg||''); }   // il contenuto delle viste eredita il colore dell'area corrente
  var vlist=hub.views.filter(function(x){return x!=='ordini' || isAmministratore() || isAdmin;});
  if(vlist.length>1){
    sn.style.display='flex';
    sn.innerHTML=vlist.map(function(x){return '<button class="subchip'+(x===v?' active':'')+'" data-v="'+x+'">'+VIEW_LABEL[x]+'</button>';}).join('');
    sn.querySelectorAll('.subchip').forEach(function(b){b.onclick=function(){showView(b.dataset.v);};});
  } else { sn.style.display='none'; sn.innerHTML=''; }
  Object.keys(views).forEach(function(k){ var el=$('view-'+k); if(el) el.classList.toggle('hide',k!==v); });
  views[v]();
  if(v==='piscina' && !DEMO){ Promise.all([loadPresenze(),loadCompiti(),loadAnalisi()]).then(function(){ if(curV==='piscina') renderPiscina(); }).catch(function(){}); }   // presenze+compiti freschi all'apertura: niente display stantio (check-in vasca; e i ✓ compiti si riazzerano sul giorno giusto anche se la PWA resta aperta oltre mezzanotte)
}
function renderAll(){ if(isPoolStaff() && hubOf(curV).id!=='piscina') curV='piscina'; showView(curV); }

/* ---------- 🎤 DETTATURA (scelta Corrado 2026-07-13: ovunque si digita, si può parlare — per gli anziani è più facile) ----------
   Meccanismo GLOBALE: al focus su qualsiasi campo di testo compare il bottone "🎤 Detta" (sempre nello stesso posto);
   il parlato (italiano) viene aggiunto al campo. Se il telefono non supporta il riconoscimento, il bottone non esiste
   e resta il 🎤 della tastiera di sistema. */
var MIC_SR = window.SpeechRecognition || window.webkitSpeechRecognition;
var micTarget=null, micRec=null, micOn=false, micBar=null, micSess=0;
function micCampoOk(t){ return !!t && (t.tagName==='TEXTAREA' || (t.tagName==='INPUT' && (t.type==='text'||t.type==='search'))); }
function micIdle(){ micOn=false; if(micBar){ micBar.classList.remove('on'); micBar.innerHTML='🎤 Detta'; if(!micCampoOk(document.activeElement)){ micBar.style.display='none'; micTarget=null; } } }
function micStart(){
  if(!MIC_SR || !micTarget || micOn) return;
  micOn=true; micBar.classList.add('on'); micBar.innerHTML='🔴 Sto ascoltando… tocca per fermare';
  var sess=++micSess;
  micTry(micTarget, sess, 0);
  setTimeout(function(){ if(micOn && micSess===sess) micStopHard(); }, 120000);   // tetto di sicurezza: mai in ascolto oltre 120s (scelta Corrado 2026-07-14)
}
function micTry(tgt, sess, tent){   // iOS: dopo uno stop il motore resta occupato per qualche decimo → il nuovo start() fallisce; RIPROVA finché si libera (≤5 tentativi, ~1,7s)
  if(!micOn || micSess!==sess) return;   // fermato o sostituito nel frattempo
  var rec=micRec=new MIC_SR(); rec.lang='it-IT'; rec.interimResults=false; rec.maxAlternatives=1; rec.continuous=false;
  rec.onresult=function(ev){
    var txt=''; for(var i=ev.resultIndex;i<ev.results.length;i++){ if(ev.results[i].isFinal) txt+=ev.results[i][0].transcript; }
    txt=txt.trim();
    if(txt){ var v=tgt.value||''; tgt.value=(v && !/\s$/.test(v) ? v+' ' : v)+txt; tgt.dispatchEvent(new Event('input',{bubbles:true})); }
  };
  rec.onend=function(){ if(micRec===rec) micIdle(); };   // guard identità: l'onend di una recognition vecchia non resetta quella nuova
  rec.onerror=function(ev){
    if(ev.error==='not-allowed'||ev.error==='service-not-allowed'){ if(micRec===rec) micIdle(); alert('Per dettare serve il permesso del microfono (Impostazioni → Oasi delle Palme → Microfono).\n\nIn alternativa puoi usare il tasto 🎤 sulla tastiera del telefono.'); return; }
    if(micRec===rec && micOn && micSess===sess && tent<5 && (ev.error==='aborted'||ev.error==='audio-capture'||ev.error==='network')){
      setTimeout(function(){ micTry(tgt, sess, tent+1); },350);   // motore ancora occupato: riprova
    } else if(micRec===rec) micIdle();
  };
  try{ rec.start(); }
  catch(_e){   // InvalidStateError: sessione precedente non ancora rilasciata → riprova
    if(tent<5 && micOn && micSess===sess){ setTimeout(function(){ micTry(tgt, sess, tent+1); },350); }
    else micIdle();
  }
}
function micStopHard(){   // ferma SUBITO la UI (mai intrappolata), poi spegne il motore con stop e, se serve, abort
  var rec=micRec; micIdle();
  try{ rec && rec.stop(); }catch(_e){}
  setTimeout(function(){ if(micRec===rec){ try{ rec && rec.abort(); }catch(_e){} } },600);   // SOLO la sessione vecchia: mai abortire un riavvio dell'utente
}
if(MIC_SR){
  micBar=document.createElement('button');
  micBar.id='micbar'; micBar.type='button'; micBar.setAttribute('aria-label','Detta il testo col microfono');
  micBar.innerHTML='🎤 Detta'; micBar.style.display='none';
  document.body.appendChild(micBar);
  micBar.addEventListener('pointerdown',function(e){ e.preventDefault(); });   // non ruba il focus al campo
  var micTapT=0;
  function micTap(e){   // su pointerup E click: Safari iOS può sopprimere il click dopo il preventDefault sul pointerdown → il pointerup garantisce che il tocco arrivi SEMPRE
    if(e && e.preventDefault) e.preventDefault();
    var now=Date.now(); if(now-micTapT<400) return; micTapT=now;   // debounce: pointerup+click dello stesso tocco = un'azione sola
    if(micOn) micStopHard(); else micStart();
  }
  micBar.addEventListener('pointerup',micTap);
  micBar.addEventListener('click',micTap);
  document.addEventListener('focusin',function(e){ if(micCampoOk(e.target)){ micTarget=e.target; micBar.style.display='flex'; } });
  document.addEventListener('focusout',function(){ setTimeout(function(){ if(!micOn && !micCampoOk(document.activeElement)){ micBar.style.display='none'; micTarget=null; } },250); });
  if(window.visualViewport){   // iOS: con la tastiera aperta il bottone sale SOPRA la tastiera; chiusa → posizione CSS di default
    var micPos=function(){ var vv=window.visualViewport, gap=window.innerHeight - vv.height - vv.offsetTop;
      micBar.style.bottom = gap>60 ? (gap+14)+'px' : ''; };
    window.visualViewport.addEventListener('resize',micPos); window.visualViewport.addEventListener('scroll',micPos);
  }
}
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}
init();
</script>

<style>

  background:var(--ok,#0B7A69);color:#fff;border:none;border-radius:999px;padding:14px 20px;font-size:17px;font-weight:700;
  box-shadow:0 6px 22px rgba(0,0,0,.28);cursor:pointer;max-width:88vw}
#micbar.on{background:#A03127;animation:micpulse 1.2s ease-in-out infinite}
@keyframes micpulse{0%,100%{box-shadow:0 6px 22px rgba(160,49,39,.35)}50%{box-shadow:0 6px 30px rgba(160,49,39,.75)}}
@media (prefers-reduced-motion: reduce){#micbar.on{animation:none}}
#installbar{position:fixed;left:50%;bottom:calc(78px + env(safe-area-inset-bottom,0px));transform:translateX(-50%) translateY(18px);z-index:1500;opacity:0;pointer-events:none;transition:.25s;max-width:94%}
#installbar.on{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
#installwrap{display:flex;align-items:center;gap:4px;background:#0B7A69;border-radius:999px;box-shadow:0 6px 22px rgba(0,0,0,.28)}
#installbtn{background:none;color:#fff;border:none;border-radius:999px;padding:14px 18px;font-size:16px;font-weight:600;cursor:pointer;white-space:nowrap}
#installx{background:none;border:none;color:rgba(255,255,255,.85);font-size:20px;line-height:1;padding:0 16px 0 0;cursor:pointer}
.iosguide{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;display:flex;align-items:center;justify-content:center;padding:18px}
.ig-card{background:#fff;border-radius:16px;padding:22px;max-width:420px;width:100%;color:#1c1c1a;box-shadow:0 12px 40px rgba(0,0,0,.3)}

  .ig-card{background:var(--surface);color:var(--txt)}
}

<script>
/* Installa sulla Home — Android: prompt nativo · iOS: guida (Apple non consente install automatica) */
(function(){
  var standalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;
  if(standalone)return;                 // già installata: niente bottone
  if(localStorage.getItem('installHidden')==='1')return;
  var ua=navigator.userAgent||'';
  var isIOS=/iphone|ipad|ipod/i.test(ua)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
  var isSafari=/safari/i.test(ua)&&!/(chrome|crios|fxios|edgios|android)/i.test(ua);
  var deferred=null;
  function build(){
    if(document.getElementById('installbar'))return;
    var bar=document.createElement('div');bar.id='installbar';
    bar.innerHTML='<div id="installwrap"><button id="installbtn">📲 Installa l\'app sul telefono</button><button id="installx" title="Nascondi">×</button></div>';
    document.body.appendChild(bar);
    document.getElementById('installx').onclick=function(){bar.classList.remove('on');localStorage.setItem('installHidden','1');};
    document.getElementById('installbtn').onclick=function(){
      if(deferred){deferred.prompt();deferred.userChoice.then(function(r){if(r&&r.outcome==='accepted'){bar.classList.remove('on');}deferred=null;});return;}
      if(isIOS&&!isSafari){safariGuide();return;}   // iPhone con Chrome/Firefox/altro: serve Safari
      iosGuide(!isIOS);                              // iPhone Safari (passi diretti) o desktop (generico)
    };
    return bar;
  }
  function show(){var b=build();setTimeout(function(){b.classList.add('on');},30);}
  function iosGuide(generic){
    var ov=document.createElement('div');ov.className='iosguide';
    var share='<span class="ig-ic"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#0A6E9C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V4"/><path d="M8 8l4-4 4 4"/><path d="M5 11v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/></svg></span>';
    var plus='<span class="ig-ic"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#0A6E9C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M12 8v8M8 12h8"/></svg></span>';
    ov.innerHTML='<div class="ig-card"><div class="ig-h">Aggiungi alla schermata Home</div>'+
      (generic?'<p>Apri questa pagina su <b>Safari</b> dal tuo iPhone, poi segui questi passi:</p>':'')+
      '<ol><li>Tocca il pulsante <b>Condividi</b> '+share+' in basso</li>'+
      '<li>Scorri e scegli <b>«Aggiungi a Home»</b> '+plus+'</li>'+
      '<li>Tocca <b>Aggiungi</b> in alto a destra</li></ol>'+
      '<button class="ig-x">Ho capito</button></div>';
    ov.onclick=function(e){if(e.target===ov||e.target.classList.contains('ig-x'))ov.remove();};
    document.body.appendChild(ov);
  }
  function safariGuide(){   // iPhone con browser ≠ Safari: l'installazione esiste solo in Safari
    var isChrome=/crios/i.test(ua);
    var url=location.href.split('#')[0];
    var ov=document.createElement('div');ov.className='iosguide';
    ov.innerHTML='<div class="ig-card"><div class="ig-h">Apri in Safari per installare</div>'+
      '<p>Su iPhone, l\'app si aggiunge alla Home solo da <b>Safari</b>. Apri questa pagina lì, poi tocca Condividi → «Aggiungi a Home».</p>'+
      '<button class="ig-copy" id="ig-copy">Copia il link</button>'+
      (isChrome?'<p style="margin-top:12px">Scorciatoia su Chrome: tocca <b>⋯</b> in basso a destra e scegli <b>«Apri in Safari»</b>.</p>'
               :'<p style="margin-top:12px">Poi apri <b>Safari</b>, incolla il link nella barra e vai.</p>')+
      '<button class="ig-x">Ho capito</button></div>';
    ov.onclick=function(e){if(e.target===ov||e.target.classList.contains('ig-x'))ov.remove();};
    document.body.appendChild(ov);
    document.getElementById('ig-copy').onclick=function(){var b=this;
      function done(){b.textContent='✓ Link copiato';b.classList.add('ok');}
      if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(done,function(){prompt('Copia il link:',url);});}
      else{prompt('Copia il link:',url);}
    };
  }
  window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferred=e;show();});  // Android/Chrome
  window.addEventListener('appinstalled',function(){var b=document.getElementById('installbar');if(b)b.classList.remove('on');deferred=null;});
  if(isIOS){window.addEventListener('load',show);}                                                    // iPhone: Safari (guida install) o altro browser (guida Safari)
})();
</script>
