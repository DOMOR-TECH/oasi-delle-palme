<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1d9e75">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Custodi 451">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Custodi 451</title>
<style>
  :root{
    --bg:#f6f5f1; --surface:#ffffff; --line:rgba(0,0,0,.12); --line2:rgba(0,0,0,.22);
    --txt:#1c1c1a; --muted:#5f5e5a; --hint:#8a8980;
    --ok:#0f6e56; --okbg:#e1f5ee; --bad:#a32d2d; --badbg:#fceaea; --todo:#85705a; --todobg:#f1efe8;
    --info:#185fa5; --infobg:#e6f1fb; --r:10px; --r2:14px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;font-size:17px;line-height:1.5}
  .wrap{max-width:440px;margin:0 auto;padding:14px 14px 90px}
  header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
  .logo{width:38px;height:38px;border-radius:var(--r);background:var(--okbg);color:var(--ok);display:flex;align-items:center;justify-content:center;font-size:24px;flex:none}
  h1{font-size:21px;font-weight:600;margin:0}
  .sub{font-size:15px;color:var(--muted);margin:0}
  .card{background:var(--surface);border:.5px solid var(--line);border-radius:var(--r2);padding:12px 14px;margin-bottom:9px}
  label{font-size:15px;color:var(--muted)}
  select,input,textarea,button{font:inherit}
  select,input[type=text],input[type=email],textarea{width:100%;padding:13px 13px;border:.5px solid var(--line2);border-radius:var(--r);background:var(--surface);color:var(--txt);margin-top:5px;font-size:17px}
  button{cursor:pointer;border:.5px solid var(--line2);background:var(--surface);color:var(--txt);border-radius:var(--r);padding:13px 16px;font-size:17px}
  button:active{transform:scale(.98)}
  .btn-primary{background:var(--ok);color:#fff;border-color:var(--ok);font-weight:600;width:100%}
  .row{display:flex;align-items:center;gap:10px}
  .pill{font-size:14px;padding:2px 9px;border-radius:20px;display:inline-flex;align-items:center;gap:4px}
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
  .metric{background:var(--surface);border:.5px solid var(--line);border-radius:var(--r);padding:9px 11px}
  .metric .n{font-size:27px;font-weight:600;margin:2px 0 0}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .tile{padding:9px 10px;border-radius:var(--r);border:.5px solid;text-align:left;display:flex;flex-direction:column;gap:3px}
  .src{font-size:14px;color:var(--hint)}
  nav{position:fixed;left:0;right:0;bottom:0;background:var(--surface);border-top:.5px solid var(--line);display:flex;max-width:440px;margin:0 auto}
  nav button{flex:1;border:none;background:none;border-radius:0;padding:10px 4px;color:var(--muted);font-size:14px;display:flex;flex-direction:column;align-items:center;gap:3px}
  nav button.active{color:var(--ok)}
  nav button{position:relative}
  nav .ic{font-size:24px}
  .navbadge{position:absolute;top:4px;right:calc(50% - 26px);min-width:18px;height:18px;padding:0 4px;border-radius:9px;background:var(--bad);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1}
  .hide{display:none}
  .seg{flex:none;padding:10px 16px;font-size:16px}
  .photo-thumb{width:46px;height:46px;border-radius:var(--r);object-fit:cover;border:.5px solid var(--line)}
  .empty{color:var(--hint);font-size:16px;text-align:center;padding:18px}
  .spin{color:var(--hint);font-size:16px;text-align:center;padding:24px}
  /* fonte cliccabile → apre il contratto */
  .src-link{background:none;border:none;padding:0;margin-top:6px;color:var(--info);font-size:14px;text-decoration:underline;text-underline-offset:2px;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
  /* pagina a tutta schermo (presentazione + contratto) */
  .page{position:fixed;inset:0;z-index:2100;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch}
  .page-in{max-width:480px;margin:0 auto;padding:18px 16px calc(28px + env(safe-area-inset-bottom,0px))}
  .page-top{position:sticky;top:0;background:var(--bg);display:flex;align-items:center;gap:10px;padding:6px 0 12px;margin-bottom:6px;border-bottom:.5px solid var(--line)}
  .page-x{flex:none;width:40px;height:40px;border-radius:50%;border:.5px solid var(--line2);background:var(--surface);font-size:22px;line-height:1;padding:0}
  .page-h{font-size:20px;font-weight:700;margin:0}
  .cap-item{background:var(--surface);border:.5px solid var(--line);border-radius:var(--r2);padding:13px 14px;margin-bottom:9px;scroll-margin-top:64px}
  .cap-item.hl{border-color:var(--ok);box-shadow:0 0 0 2px var(--okbg);animation:hlpulse 1.6s ease-out}
  @keyframes hlpulse{0%{box-shadow:0 0 0 3px var(--ok)}100%{box-shadow:0 0 0 2px var(--okbg)}}
  .cap-grp{font-size:14px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--hint);margin:18px 2px 8px}
  .lead{font-size:17px;line-height:1.55;color:var(--txt);margin:0 0 12px}
  .pres-step{display:flex;gap:11px;align-items:flex-start;margin:0 0 12px}
  .pres-n{flex:none;width:30px;height:30px;border-radius:50%;background:var(--okbg);color:var(--ok);font-weight:700;display:flex;align-items:center;justify-content:center;font-size:16px}
  .pres-note{background:var(--infobg);border-radius:var(--r2);padding:13px 14px;font-size:16px;line-height:1.5;color:var(--txt);margin:14px 0}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">◍</div>
    <div style="flex:1">
      <h1>Custodi 451</h1>
      <p class="sub" id="hsub">il controllo del capitolato è di tutti</p>
    </div>
    <div id="user-badge" class="hide" style="display:flex;align-items:center;gap:7px;flex:none"></div>
  </header>
  <div id="view-zona"><div class="spin">Carico…</div></div>
  <div id="view-bacheca" class="hide"></div>
  <div id="view-dossier" class="hide"></div>
  <div id="view-voti" class="hide"></div>
  <div id="view-admin" class="hide"></div>
</div>

<nav id="nav" style="display:none">
  <button data-v="zona" class="active"><span class="ic">◎</span>Controlla</button>
  <button data-v="bacheca"><span class="ic">▦</span>Bacheca</button>
  <button data-v="dossier"><span class="ic">▤</span>Dossier</button>
  <button data-v="voti"><span class="ic">☑</span>Voti</button>
  <button data-v="admin" id="nav-admin" class="hide"><span class="ic">★</span>Admin</button>
</nav>

<script src="config.js?v=2"></script>
<script src="capitolato-verde.js?v=2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient(window.SUPA_URL, window.SUPA_KEY);
const DEMO = location.search.indexOf('demo')>=0;  // ?demo=1 → prova l'interfaccia senza login (dati finti, niente email)

let userId=null, userNome=null, userUnita=null, userEmail=null, userStato=null, isAdmin=false, reports=[], comments=[], openThreads={}, curArea='Pal. E';
let UNITA_LIST=null;
function approvato(){return userStato==='approvato'}
async function loadUnitaList(){
  if(UNITA_LIST) return UNITA_LIST;
  if(DEMO){ UNITA_LIST=[{unita:'I/08',palazzina:'I',interno:'8'}]; return UNITA_LIST; }
  var res=await sb.from('unita_pubbliche').select('unita,palazzina,interno');
  UNITA_LIST=(res.data||[]).slice().sort(function(a,b){return a.unita<b.unita?-1:1});
  return UNITA_LIST;
}
function findUnitaCode(pal,intr){var u=(UNITA_LIST||[]).find(function(x){return x.palazzina===pal&&String(x.interno)===String(intr)});return u?u.unita:null;}
const meseOggi=new Date().getMonth()+1;
const $=function(id){return document.getElementById(id)};
function esc(s){return (s||'').replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}
function fmt(iso){var d=new Date(iso);return d.toLocaleDateString('it-IT')+' '+d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}
function oggiLabel(){return new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'})}
function applicabile(s){return !s.mesi||s.mesi.indexOf(meseOggi)>=0}
function setApp(on){$('nav').style.display=on?'flex':'none'; $('nav-admin').classList.toggle('hide',!isAdmin); if(!on)$('user-badge').classList.add('hide')}

// Pallino rosso col numero di richieste IN ATTESA sul tab Admin
async function updateAdminBadge(){
  var nav=$('nav-admin'); if(!nav) return;
  var n=0;
  if(DEMO){ n=DEMO_ADMIN.filter(function(x){return x.stato==='in_attesa'}).length; }
  else if(isAdmin){ try{ var r=await sb.from('proprietari').select('unita',{count:'exact',head:true}).eq('stato','in_attesa'); n=r.count||0; }catch(e){ n=0; } }
  var b=nav.querySelector('.navbadge');
  if(n>0){ if(!b){ b=document.createElement('span'); b.className='navbadge'; nav.appendChild(b); } b.textContent=n; b.style.display='flex'; }
  else if(b){ b.style.display='none'; }
}

/* ---------- AUTH / INIT ---------- */
async function init(){
  if(DEMO){ userId='demo'; userNome='Demo Tester'; userUnita={palazzina:'I',interno:'8',unita:'I/08',millesimi:6.5}; userStato='approvato'; isAdmin=true; $('hsub').textContent='MODALITÀ PROVA (senza login)'; showBadge(); setApp(true); renderAll(); updateAdminBadge(); return; }
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){ setApp(false); renderLogin(); return; }
  userId=session.user.id; userEmail=session.user.email||null;
  var unita=(session.user.user_metadata && session.user.user_metadata.unita) || null;
  if(!unita){ setApp(false); renderSelezionaUnita(); return; }      // utente senza unità (o vecchio account)
  var pr = await claimUnita(unita);
  if(pr.blocked){ setApp(false); renderBloccato(pr); return; }
  userUnita = pr.row; userNome = pr.row.nome; userStato = pr.row.stato;
  try{ const { data:adm } = await sb.rpc('is_admin'); isAdmin = !!adm; }catch(e){ isAdmin=false; }
  $('hsub').textContent='il controllo del capitolato è di tutti';
  showBadge();
  await loadReports(); await loadComments(); setApp(true); renderAll(); updateAdminBadge();
}

// Lega l'email dell'utente alla sua unità; ritorna {row, blocked, motivo}
async function claimUnita(unita){
  var res=await sb.from('proprietari').select('*').eq('unita',unita).maybeSingle();
  var row=res.data;
  if(!row) return { blocked:true, motivo:'Unità '+unita+' non trovata nell\'elenco proprietari.', row:{unita:unita} };
  if(!row.autore_id){
    var up=await sb.from('proprietari').update({autore_id:userId,email:userEmail,stato:'in_attesa'}).eq('unita',unita).is('autore_id',null).select().maybeSingle();
    if(up.data) return { blocked:false, row:up.data };
    var re=await sb.from('proprietari').select('*').eq('unita',unita).maybeSingle(); row=re.data||row;   // qualcuno ha appena richiesto
  }
  if(row.autore_id && row.autore_id!==userId) return { blocked:true, motivo:'L\'unità '+unita+' è già stata richiesta da un altro account. Se è la tua, contatta l\'amministratore del gruppo.', row:row };
  return { blocked:false, row:row };
}

function statoChip(){
  if(approvato()) return '<span class="pill" style="background:var(--okbg);color:var(--ok)">✓ verificato</span>';
  return '<span class="pill" style="background:var(--infobg);color:var(--info)">in attesa di conferma</span>';
}
function showBadge(){
  var ub=$('user-badge');
  var ini=(userNome||'?').trim().split(/\s+/).map(function(w){return w[0]}).slice(0,2).join('').toUpperCase();
  var sub = userUnita ? ('Pal. '+userUnita.palazzina+' · int '+userUnita.interno) : 'unità non associata';
  ub.innerHTML='<div style="text-align:right;line-height:1.2"><div style="font-size:15px;font-weight:500">'+esc((userNome||'').split(' ')[0])+(approvato()?'':' ·')+'</div>'+
    '<div style="font-size:14px;color:var(--hint)">'+sub+(approvato()?'':' · in attesa')+'</div></div>'+
    '<div style="width:34px;height:34px;border-radius:50%;background:var(--'+(approvato()?'okbg':'infobg')+');color:var(--'+(approvato()?'ok':'info')+');display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:600">'+esc(ini)+'</div>';
  ub.classList.remove('hide');
  ub.style.cursor='pointer'; ub.onclick=userMenu;
}

/* ---------- MENU UTENTE (I miei dati / Esci / Elimina account) ---------- */
function userMenu(){
  var m=document.createElement('div'); m.className='page'; m.id='page-user';
  var sub = userUnita ? ('Palazzina '+userUnita.palazzina+' · interno '+userUnita.interno) : 'unità non associata';
  m.innerHTML='<div class="page-in">'+
    '<div class="page-top"><button class="page-x" id="um-x">×</button><h2 class="page-h">I miei dati</h2></div>'+
    '<div class="card"><div style="display:grid;gap:10px">'+
      '<div><label>Nome</label><div style="font-size:17px;font-weight:600">'+esc(userNome||'—')+'</div></div>'+
      '<div><label>Unità</label><div style="font-size:17px">'+esc(sub)+'</div></div>'+
      '<div><label>Email</label><div style="font-size:17px">'+esc(userEmail||'—')+'</div></div>'+
      '<div><label>Stato</label><div style="margin-top:4px">'+statoChip()+'</div></div>'+
    '</div></div>'+
    '<button id="um-logout" style="width:100%;margin-top:4px">Esci</button>'+
    '<button id="um-del" style="width:100%;margin-top:18px;border-color:var(--bad);color:var(--bad)">Elimina il mio account</button>'+
    '<p class="sub" style="margin-top:8px">Eliminando l\'account si chiude il tuo accesso e si libera la tua unità. <b>Le segnalazioni che hai inviato restano</b> (firmate col tuo nome), perché sono prove condivise della comunità.</p>'+
    '</div>';
  document.body.appendChild(m);
  $('um-x').onclick=function(){m.remove()};
  $('um-logout').onclick=async function(){ if(DEMO){location.href=location.pathname;return;} await sb.auth.signOut(); location.reload(); };
  $('um-del').onclick=function(){ eliminaAccount(m); };
}
async function eliminaAccount(menuEl){
  if(!confirm('Vuoi eliminare il tuo account?\n\nIl tuo accesso verrà chiuso e la tua unità liberata. Le segnalazioni che hai inviato RESTANO (firmate col tuo nome).')) return;
  if(DEMO){ alert('In modalità prova non c\'è un account da eliminare.'); return; }
  // 1) cancellazione completa via edge function (login Auth + appartamento), se attiva
  try{
    var r=await sb.functions.invoke('elimina-account');
    if(r && !r.error){ await sb.auth.signOut(); alert('Account eliminato. Le tue segnalazioni restano nel dossier. A presto!'); location.reload(); return; }
  }catch(e){ /* function non ancora deployata → fallback */ }
  // 2) fallback: libera almeno l'appartamento (il login Auth resta finché non deployi la edge function)
  var up=await sb.from('proprietari').update({stato:'libero',autore_id:null,email:null}).eq('autore_id',userId);
  if(up.error){ alert('Errore: '+up.error.message+'\n\nServe la migrazione migrate_v7 sul database.'); return; }
  await sb.auth.signOut();
  alert('Account eliminato. Le tue segnalazioni restano nel dossier. A presto!');
  location.reload();
}
sb.auth.onAuthStateChange(function(_e,sess){ if(sess) init(); });

function unitaPickerHTML(){
  return '<label>La tua unità</label>'+
    '<div style="display:flex;gap:8px;margin-top:5px"><select id="u-pal" style="flex:2;margin-top:0"><option value="" disabled selected>Palazzina…</option></select>'+
    '<select id="u-int" style="flex:1;margin-top:0" disabled><option value="" disabled selected>Int…</option></select></div>';
}
async function fillUnitaPicker(pre){
  var list=await loadUnitaList();
  var palSel=$('u-pal'), intSel=$('u-int'); if(!palSel) return;
  var pals=[]; list.forEach(function(u){if(pals.indexOf(u.palazzina)<0)pals.push(u.palazzina)});
  pals.sort();
  pals.forEach(function(p){var o=document.createElement('option');o.value=p;o.textContent='Palazzina '+p;palSel.appendChild(o)});
  palSel.onchange=function(){
    intSel.innerHTML='<option value="" disabled selected>Int…</option>';
    list.filter(function(u){return u.palazzina===palSel.value}).sort(function(a,b){return (parseInt(a.interno,10)||0)-(parseInt(b.interno,10)||0)})
      .forEach(function(u){var o=document.createElement('option');o.value=u.interno;o.textContent='Interno '+u.interno;intSel.appendChild(o)});
    intSel.disabled=false;
  };
  if(pre){ var u=list.find(function(x){return x.unita===pre}); if(u){ palSel.value=u.palazzina; palSel.onchange(); intSel.value=u.interno; } }   // pre-compila (conferma dopo il login)
}
function renderLogin(){
  $('view-zona').innerHTML='<div class="card"><p style="font-weight:600;margin:0 0 4px">Accedi come condòmino</p>'+
    '<p class="sub" style="margin:0 0 12px">Indica la <b>tua unità</b> e la tua email: ti arriva un <b>codice</b> per entrare. L\'amministratore del gruppo conferma che sei tu — da quel momento le tue verifiche valgono come prova firmata.</p>'+
    unitaPickerHTML()+
    '<label style="margin-top:10px;display:block">Email</label><input id="l-email" type="email" placeholder="tu@email.it" autocomplete="email" inputmode="email" autocapitalize="none" autocorrect="off" spellcheck="false">'+
    '<button class="btn-primary" style="margin-top:12px" id="l-go">Ricevi il codice di accesso</button>'+
    '<p id="l-msg" class="sub" style="margin-top:10px;display:none"></p></div>'+
    '<button class="src-link" id="l-pres" style="font-size:16px;margin:2px 2px 0">Cos\'è Custodi 451? Come funziona →</button>';
  $('l-pres').onclick=function(){presentazione()};
  fillUnitaPicker();
  if(localStorage.getItem('presVista')!=='1'){ localStorage.setItem('presVista','1'); presentazione(); }   // popup automatico al primo accesso
  $('l-go').onclick=async function(){
    const pal=$('u-pal').value, intr=$('u-int').value, email=$('l-email').value.trim();
    if(!pal){$('u-pal').focus();return} if(!intr){$('u-int').focus();return} if(!email){$('l-email').focus();return}
    const unita=findUnitaCode(pal,intr);
    if(!unita){ const m=$('l-msg');m.style.display='block';m.style.color='var(--bad)';m.textContent='Unità non trovata. Controlla palazzina e interno.';return; }
    try{ localStorage.setItem('pendingUnita', unita); }catch(e){}   // riconfermata dopo il login
    $('l-go').disabled=true; $('l-go').textContent='Invio…';
    const { error } = await sb.auth.signInWithOtp({ email, options:{ emailRedirectTo: location.origin+location.pathname } });
    if(error){ const m=$('l-msg'); m.style.display='block'; m.style.color='var(--bad)'; m.textContent='Errore: '+error.message; $('l-go').disabled=false; $('l-go').textContent='Ricevi il codice di accesso'; }
    else { renderCodeStep(email); }
  };
}

// Inserimento del CODICE a 6 cifre → resta dentro l'app installata (PWA), non apre il browser
function renderCodeStep(email){
  $('view-zona').innerHTML='<div class="card"><p style="font-weight:600;margin:0 0 4px">Inserisci il codice</p>'+
    '<p class="sub" style="margin:0 0 12px">Ti ho mandato un\'email a <b>'+esc(email)+'</b> con un <b>codice</b>. Scrivilo qui sotto per entrare: così <b>resti nell\'app</b>. (Controlla anche lo Spam la prima volta.)</p>'+
    '<label>Codice ricevuto via email</label><input id="c-code" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="10" placeholder="il codice" style="letter-spacing:4px;font-size:24px;text-align:center">'+
    '<button class="btn-primary" style="margin-top:12px" id="c-go">Entra</button>'+
    '<p id="c-msg" class="sub" style="margin-top:10px;display:none"></p>'+
    '<button class="src-link" id="c-back" style="font-size:15px;margin-top:12px">‹ Cambia email o unità</button></div>';
  $('c-back').onclick=renderLogin;
  $('c-code').focus();
  $('c-go').onclick=async function(){
    var code=$('c-code').value.replace(/\D/g,'');
    if(code.length<6){ $('c-code').focus(); return; }
    $('c-go').disabled=true; $('c-go').textContent='Verifico…';
    const { error } = await sb.auth.verifyOtp({ email:email, token:code, type:'email' });
    if(error){ var m=$('c-msg'); m.style.display='block'; m.style.color='var(--bad)'; m.textContent='Codice non valido o scaduto. Controlla e riprova.'; $('c-go').disabled=false; $('c-go').textContent='Entra'; }
    // se OK: onAuthStateChange → init()
  };
}

// utente loggato ma senza unità nei metadati (vecchio account): fagli scegliere l'unità
function renderSelezionaUnita(){
  var pre=null; try{ pre=localStorage.getItem('pendingUnita'); }catch(e){}
  $('view-zona').innerHTML='<div class="card"><p style="font-weight:600;margin:0 0 4px">Conferma la tua unità</p>'+
    '<p class="sub" style="margin:0 0 12px">Controlla che palazzina e interno siano corretti: è ciò a cui verrà legato il tuo accesso. L\'amministratore confermerà che sei tu.</p>'+
    unitaPickerHTML()+
    '<button class="btn-primary" style="margin-top:12px" id="o-go">Conferma ed entra</button></div>';
  fillUnitaPicker(pre);
  $('o-go').onclick=async function(){

function latest(area,sid){var r=reports.filter(function(x){return x.area===area&&x.servizio===sid});return r[0]||null}

  };

function downscale(file,cb){var img=new Image();var rd=new FileReader();rd.onload=function(){img.onload=function(){var mx=1280,sc=Math.min(1,mx/Math.max(img.width,img.height));var cv=document.createElement('canvas');cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);cv.toBlob(function(b){cb(b)},'image/jpeg',0.75)};img.src=rd.result};rd.readAsDataURL(file)}

/* ---------- EXPORT PDF ---------- */
function loadImg(url){return new Promise(function(res,rej){var img=new Image();if(/^https?:/i.test(url))img.crossOrigin='anonymous';img.onload=function(){try{var c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;c.getContext('2d').drawImage(img,0,0);res({data:c.toDataURL('image/jpeg',0.85),w:img.naturalWidth,h:img.naturalHeight});}catch(e){rej(e);}};img.onerror=function(){rej(new Error('load'))};img.src=url;});}
async function exportPDF(){
  var btn=$('dz-export'); if(btn){btn.disabled=true;btn.textContent='Genero il PDF…';}
  try{
    var doc=new jspdf.jsPDF({unit:'pt',format:'a4'});
    var W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight(), M=40, y=54;
    doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.text('Dossier — esecuzione capitolato verde', M, y); y+=20;
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(110);
    doc.text('Condominio Oasi delle Palme (Via Cina 451, Roma) · generato il '+new Date().toLocaleDateString('it-IT'), M, y); y+=14;
    var probs=reports.filter(isOpen);
    doc.text(reports.length+' segnalazioni totali · '+probs.length+' inadempienze aperte', M, y); y+=22;
    doc.setTextColor(0);
    var bySrv={}; probs.forEach(function(r){(bySrv[r.servizio]=bySrv[r.servizio]||[]).push(r);});
    if(!probs.length){ doc.setFontSize(11); doc.text('Nessuna inadempienza aperta.', M, y); }
    var keys=Object.keys(bySrv);
    for(var k=0;k<keys.length;k++){
      var s=CAPITOLATO_VERDE.find(function(x){return x.id===keys[k]}); var rs=bySrv[keys[k]];
      if(y>H-120){doc.addPage();y=54;}
      doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.text(s?s.nome:keys[k], M, y); y+=15;
      doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(110);
      doc.text('dovuto: '+(s?s.freq:'')+'   ·   '+(rs[0].fonte||''), M, y); y+=16; doc.setTextColor(0);
      for(var i=0;i<rs.length;i++){
        var r=rs[i];
        if(y>H-110){doc.addPage();y=54;}
        doc.setFontSize(11);
        var head=r.area+(r.nota?' — '+r.nota:'');
        var lines=doc.splitTextToSize(head, W-2*M); doc.text(lines, M, y+12);
        doc.setFontSize(9); doc.setTextColor(110);
        doc.text(r.autore_nome+' · '+fmt(r.created_at), M, y+12+lines.length*13+3); doc.setTextColor(0);
        y+=12+lines.length*13+12;
        if(r.foto_url){ try{
          var im=await loadImg(r.foto_url);
          var iw=(W-2*M)*0.5, ih=iw*im.h/im.w;       // foto al 50% della larghezza utile, proporzioni reali
          var avail=H-54-y-16;                        // spazio rimasto sotto y in questa pagina
          if(ih>avail){ doc.addPage(); y=54; avail=H-54-y-16; }
          if(ih>avail){ var sc=avail/ih; ih=avail; iw=iw*sc; }   // foto verticale più alta della pagina: riduci in proporzione
          var ix=M+((W-2*M)-iw)/2;                     // centra se ridotta
          doc.addImage(im.data,'JPEG',ix,y,iw,ih);
          y+=ih+10;
        }catch(e){} }
        var cms=comments.filter(function(c){return c.segnalazione_id===r.id});
        for(var j=0;j<cms.length;j++){
          if(y>H-60){doc.addPage();y=54;}
          doc.setFontSize(9); doc.setTextColor(90);
          var clines=doc.splitTextToSize('— '+cms[j].autore_nome+': '+cms[j].testo, W-M-(M+18));
          doc.text(clines, M+18, y); doc.setTextColor(0);
          y+=clines.length*11+5;
        }
      }
      y+=12;
    }
    doc.setFontSize(8); doc.setTextColor(140);
    doc.text('Ogni voce è ancorata al capitolato e a segnalazioni firmate con foto e data.', M, H-26);
    doc.save('dossier-oasi-delle-palme.pdf');
  }catch(err){ alert('Errore PDF: '+err.message); }
  if(btn){btn.disabled=false;btn.textContent='Esporta PDF firmato';}
}

/* ---------- VIEW: VOTI (sondaggi informali, pesati per millesimi, palesi) ---------- */
var DEMO_SONDAGGI=[
  {id:'s1',domanda:'Sei a favore di valutare il cambio di amministratore per il 2027?',opzioni:['Sì','No','Astenuto'],chiuso:false,approvato:true,autore_nome:'Admin'},
  {id:'s2',domanda:'Proposta: installare rastrelliere per le biciclette?',opzioni:['Sì','No'],chiuso:false,approvato:false,proposto_da:'u9',autore_nome:'Coccia Anna'}
];
var DEMO_VOTI=[
  {sondaggio_id:'s1',unita:'A/07',autore_id:'u1',autore_nome:'Romani Barbara',millesimi:6.8,opzione:'Sì'},
  {sondaggio_id:'s1',unita:'F/03',autore_id:'u2',autore_nome:'Bruschi - Caratelli',millesimi:5.7,opzione:'Sì'},
  {sondaggio_id:'s1',unita:'C/02',autore_id:'u3',autore_nome:'Vermigli Andrea',millesimi:4.9,opzione:'No'}
];
async function renderVoti(){
  var v=$('view-voti'); v.innerHTML='<div class="spin">Carico…</div>';
  var sondaggi, voti;
  if(DEMO){ sondaggi=DEMO_SONDAGGI; voti=DEMO_VOTI; }
  else {
    var rs=await sb.from('sondaggi').select('*').order('created_at',{ascending:false});
    if(rs.error){ v.innerHTML='<div class="empty">Errore: '+esc(rs.error.message)+'<br><br>Hai eseguito <b>migrate_v9_votazione.sql</b>?</div>'; return; }
    sondaggi=rs.data||[];
    var rv=await sb.from('voti').select('*'); voti=rv.error?[]:(rv.data||[]);
  }
  var attivi=sondaggi.filter(function(s){return s.approvato!==false});
  var proposte=sondaggi.filter(function(s){return s.approvato===false});
  function opzOf(s){return Array.isArray(s.opzioni)? s.opzioni : (typeof s.opzioni==='string'? JSON.parse(s.opzioni):['Sì','No','Astenuto'])}
  var html='<p style="font-size:16px;font-weight:600;color:var(--muted);margin:4px 2px 10px">Sondaggi della comunità</p>';
  if(approvato()){ html+='<button class="btn-primary" id="vt-new" style="margin-bottom:12px">＋ '+(isAdmin?'Nuovo sondaggio':'Proponi un sondaggio')+'</button>'; }
  else { html+='<div class="sub" style="margin-bottom:12px">Quando sarai un condòmino confermato potrai votare e proporre sondaggi.</div>'; }
  // PROPOSTE (in attesa di avallo dell'admin)
  if(proposte.length){
    html+='<div class="cap-grp">Proposte da approvare ('+proposte.length+')</div>';
    proposte.forEach(function(s){
      html+='<div class="card"><div style="font-weight:600;font-size:17px">'+esc(s.domanda)+'</div>'+
        '<div style="font-size:14px;color:var(--hint);margin:3px 0 8px">proposto da '+esc(s.autore_nome||'—')+' · opzioni: '+esc(opzOf(s).join(' / '))+'</div>';
      if(isAdmin){ html+='<div style="display:flex;gap:7px"><button class="vt-appr" data-s="'+esc(s.id)+'" style="border-color:var(--ok);color:var(--ok)">✓ Avalla</button>'+
        '<button class="vt-del" data-s="'+esc(s.id)+'" style="border-color:var(--bad);color:var(--bad)">Elimina</button></div>'; }
      else { html+='<div class="sub">In attesa che l\'amministratore la approvi.</div>'; }
      html+='</div>';
    });
    html+='<div class="cap-grp">Sondaggi attivi</div>';
  }
  if(!attivi.length){ html+='<div class="empty">Nessun sondaggio attivo.'+(approvato()?' '+(isAdmin?'Creane uno':'Proponine uno')+' col pulsante qui sopra.':'')+'</div>'; }
  attivi.forEach(function(s){
    var sv=voti.filter(function(x){return x.sondaggio_id===s.id});
    var mine=sv.find(function(x){return x.autore_id===userId});
    var opzioni=opzOf(s);
    var totMm=sv.reduce(function(t,x){return t+(+x.millesimi||0)},0);
    html+='<div class="card"><div style="font-weight:600;font-size:18px">'+esc(s.domanda)+'</div>'+
      '<div style="font-size:14px;color:var(--hint);margin:3px 0 10px">'+sv.length+' voti · '+totMm.toFixed(1).replace('.',',')+'/1000 mm'+(s.chiuso?' · CHIUSO':'')+'</div>';
    if(!mine && !s.chiuso && approvato()){
      html+='<div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px">'+opzioni.map(function(o){return '<button class="vt-vote" data-s="'+esc(s.id)+'" data-o="'+esc(o)+'">'+esc(o)+'</button>'}).join('')+'</div>';
    } else if(!approvato() && !mine && !s.chiuso){
      html+='<div class="sub" style="margin-bottom:4px">Per votare devi essere un condòmino confermato.</div>';
    }
    opzioni.forEach(function(o){
      var ov=sv.filter(function(x){return x.opzione===o});
      var mm=ov.reduce(function(t,x){return t+(+x.millesimi||0)},0);
      var pct=totMm>0?Math.round(mm/totMm*100):0;
      html+='<div style="margin-top:10px"><div style="display:flex;justify-content:space-between;font-size:15px;gap:8px">'+
        '<span>'+(mine&&mine.opzione===o?'<b>'+esc(o)+' ✓ (il tuo voto)</b>':esc(o))+'</span>'+
        '<span style="color:var(--hint);white-space:nowrap">'+ov.length+' u · '+mm.toFixed(1).replace('.',',')+' mm</span></div>'+
        '<div style="height:8px;background:var(--line);border-radius:5px;margin-top:4px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:var(--ok)"></div></div>'+
        (ov.length?'<div style="font-size:13px;color:var(--hint);margin-top:3px">'+ov.map(function(x){return esc(x.autore_nome)}).join(', ')+'</div>':'')+'</div>';
    });
    if(isAdmin){ html+='<div style="display:flex;gap:7px;margin-top:12px">'+
      '<button class="vt-close" data-s="'+esc(s.id)+'" data-chiuso="'+(s.chiuso?'1':'0')+'" style="font-size:14px">'+(s.chiuso?'Riapri':'Chiudi')+'</button>'+
      '<button class="vt-del" data-s="'+esc(s.id)+'" style="font-size:14px;border-color:var(--bad);color:var(--bad)">Elimina</button></div>'; }
    html+='</div>';
  });
  v.innerHTML=html;
  v.querySelectorAll('.vt-vote').forEach(function(b){b.onclick=function(){votaSondaggio(b.dataset.s,b.dataset.o)}});
  var nb=$('vt-new'); if(nb) nb.onclick=nuovoSondaggio;
  if(isAdmin){
    v.querySelectorAll('.vt-appr').forEach(function(b){b.onclick=function(){approveSondaggio(b.dataset.s)}});

  }
}
async function votaSondaggio(sid,opzione){
  if(DEMO){ DEMO_VOTI=DEMO_VOTI.filter(function(x){return !(x.sondaggio_id===sid&&x.autore_id===userId)}); DEMO_VOTI.push({sondaggio_id:sid,unita:userUnita.unita,autore_id:userId,autore_nome:userNome,millesimi:userUnita.millesimi||0,opzione:opzione}); renderVoti(); return; }
  if(!approvato()){ alert('Devi essere un condòmino confermato per votare.'); return; }
  var up=await sb.from('voti').upsert({ sondaggio_id:sid, unita:userUnita.unita, autore_id:userId, autore_nome:userNome, millesimi:(userUnita.millesimi||0), opzione:opzione },{onConflict:'sondaggio_id,unita'});
  if(up.error){ alert('Errore: '+up.error.message); return; }
  renderVoti();
}
async function nuovoSondaggio(){
  if(!approvato()){ alert('Devi essere un condòmino confermato.'); return; }
  var d=prompt(isAdmin?'Domanda del sondaggio:':'Proponi una domanda (l\'amministratore la valuterà):'); if(!d||!d.trim())return;
  var opz=prompt('Opzioni separate da virgola:','Sì, No, Astenuto');
  var opzioni=(opz&&opz.trim())?opz.split(',').map(function(s){return s.trim()}).filter(Boolean):['Sì','No','Astenuto'];
  if(opzioni.length<2){ alert('Servono almeno 2 opzioni.'); return; }
  if(DEMO){ DEMO_SONDAGGI.unshift({id:'s'+Date.now(),domanda:d.trim(),opzioni:opzioni,chiuso:false,approvato:isAdmin,proposto_da:userId,autore_nome:userNome}); renderVoti(); if(!isAdmin)alert('Proposta inviata! L\'amministratore la valuterà.'); return; }
  var rec={domanda:d.trim(),opzioni:opzioni,autore_nome:userNome,approvato:isAdmin,proposto_da:userId};
  var up=await sb.from('sondaggi').insert(rec);
  if(up.error){ alert('Errore: '+up.error.message); return; }
  if(!isAdmin) alert('Proposta inviata! L\'amministratore la valuterà.');
  renderVoti();
}
async function approveSondaggio(sid){
  if(DEMO){ var s=DEMO_SONDAGGI.find(function(x){return x.id===sid}); if(s)s.approvato=true; renderVoti(); return; }
  var up=await sb.from('sondaggi').update({approvato:true}).eq('id',sid);
  if(up.error){ alert('Errore: '+up.error.message); return; }
  renderVoti();
}
async function toggleSondaggio(sid,chiudi){
  if(DEMO){ var s=DEMO_SONDAGGI.find(function(x){return x.id===sid}); if(s)s.chiuso=chiudi; renderVoti(); return; }
  var up=await sb.from('sondaggi').update({chiuso:chiudi}).eq('id',sid);
  if(up.error){ alert('Errore: '+up.error.message); return; }
  renderVoti();
}
async function eliminaSondaggio(sid){
  if(!confirm('Eliminare questo sondaggio e tutti i suoi voti?')) return;
  if(DEMO){ DEMO_SONDAGGI=DEMO_SONDAGGI.filter(function(x){return x.id!==sid}); DEMO_VOTI=DEMO_VOTI.filter(function(x){return x.sondaggio_id!==sid}); renderVoti(); return; }
  var up=await sb.from('sondaggi').delete().eq('id',sid);
  if(up.error){ alert('Errore: '+up.error.message); return; }
  renderVoti();
}

#installbar{position:fixed;left:50%;bottom:calc(78px + env(safe-area-inset-bottom,0px));transform:translateX(-50%) translateY(18px);z-index:1500;opacity:0;pointer-events:none;transition:.25s;max-width:94%}
#installbar.on{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
#installwrap{display:flex;align-items:center;gap:4px;background:#1d9e75;border-radius:999px;box-shadow:0 6px 22px rgba(0,0,0,.28)}
#installbtn{background:none;color:#fff;border:none;border-radius:999px;padding:14px 18px;font-size:16px;font-weight:600;cursor:pointer;white-space:nowrap}
#installx{background:none;border:none;color:rgba(255,255,255,.85);font-size:20px;line-height:1;padding:0 16px 0 0;cursor:pointer}
.iosguide{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;display:flex;align-items:center;justify-content:center;padding:18px}
.ig-card{background:#fff;border-radius:16px;padding:22px;max-width:420px;width:100%;color:#1c1c1a;box-shadow:0 12px 40px rgba(0,0,0,.3)}
.ig-h{font-size:20px;font-weight:700;margin-bottom:10px}
.iosguide p{font-size:16px;margin:0 0 8px}
.iosguide ol{margin:6px 0 4px;padding-left:22px}
.iosguide li{font-size:17px;line-height:1.75;margin-bottom:8px}
.ig-ic{display:inline-flex;vertical-align:middle;background:#e6f1fb;border-radius:7px;padding:3px;margin:0 2px}
.ig-x{margin-top:14px;width:100%;background:#1d9e75;color:#fff;border:none;border-radius:10px;padding:13px;font-size:17px;font-weight:600;cursor:pointer}
.ig-copy{width:100%;background:#185fa5;color:#fff;border:none;border-radius:10px;padding:13px;font-size:17px;font-weight:600;cursor:pointer}
.ig-copy.ok{background:#1d9e75}
</style>
<script>
/* Installa sulla Home — Android: prompt nativo · iOS: guida (Apple non consente install automatica) */
(function(){
  var standalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;
  if(standalone)return;                 // già installata: niente bottone
  if(localStorage.getItem('installHidden')==='1')return;
  var ua=navigator.userAgent||'';
  var isIOS=/iphone|ipad|ipod/i.test(ua)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
  var isSafari=/safari/i.test(ua)&&!/(chrome|crios|fxios|edgios|android)/i.test(ua);
  var deferred=null;
  function build(){
    if(document.getElementById('installbar'))return;
    var bar=document.createElement('div');bar.id='installbar';
    bar.innerHTML='<div id="installwrap"><button id="installbtn">📲 Installa l\'app sul telefono</button><button id="installx" title="Nascondi">×</button></div>';
    document.body.appendChild(bar);
    document.getElementById('installx').onclick=function(){bar.classList.remove('on');localStorage.setItem('installHidden','1');};
    document.getElementById('installbtn').onclick=function(){
      if(deferred){deferred.prompt();deferred.userChoice.then(function(r){if(r&&r.outcome==='accepted'){bar.classList.remove('on');}deferred=null;});return;}
      if(isIOS&&!isSafari){safariGuide();return;}   // iPhone con Chrome/Firefox/altro: serve Safari
      iosGuide(!isIOS);                              // iPhone Safari (passi diretti) o desktop (generico)
    };
    return bar;
  }
  function show(){var b=build();setTimeout(function(){b.classList.add('on');},30);}
  function iosGuide(generic){
    var ov=document.createElement('div');ov.className='iosguide';
    var share='<span class="ig-ic"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#185fa5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V4"/><path d="M8 8l4-4 4 4"/><path d="M5 11v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/></svg></span>';
    var plus='<span class="ig-ic"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#185fa5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M12 8v8M8 12h8"/></svg></span>';
    ov.innerHTML='<div class="ig-card"><div class="ig-h">Aggiungi alla schermata Home</div>'+
      (generic?'<p>Apri questa pagina su <b>Safari</b> dal tuo iPhone, poi segui questi passi:</p>':'')+
      '<ol><li>Tocca il pulsante <b>Condividi</b> '+share+' in basso</li>'+
      '<li>Scorri e scegli <b>«Aggiungi a Home»</b> '+plus+'</li>'+
      '<li>Tocca <b>Aggiungi</b> in alto a destra</li></ol>'+
      '<button class="ig-x">Ho capito</button></div>';
    ov.onclick=function(e){if(e.target===ov||e.target.classList.contains('ig-x'))ov.remove();};
    document.body.appendChild(ov);
  }
  function safariGuide(){   // iPhone con browser ≠ Safari: l'installazione esiste solo in Safari
    var isChrome=/crios/i.test(ua);
    var url=location.href.split('#')[0];
    var ov=document.createElement('div');ov.className='iosguide';
    ov.innerHTML='<div class="ig-card"><div class="ig-h">Apri in Safari per installare</div>'+
      '<p>Su iPhone, l\'app si aggiunge alla Home solo da <b>Safari</b>. Apri questa pagina lì, poi tocca Condividi → «Aggiungi a Home».</p>'+
      '<button class="ig-copy" id="ig-copy">Copia il link</button>'+
      (isChrome?'<p style="margin-top:12px">Scorciatoia su Chrome: tocca <b>⋯</b> in basso a destra e scegli <b>«Apri in Safari»</b>.</p>'
               :'<p style="margin-top:12px">Poi apri <b>Safari</b>, incolla il link nella barra e vai.</p>')+
      '<button class="ig-x">Ho capito</button></div>';
    ov.onclick=function(e){if(e.target===ov||e.target.classList.contains('ig-x'))ov.remove();};
    document.body.appendChild(ov);
    document.getElementById('ig-copy').onclick=function(){var b=this;
      function done(){b.textContent='✓ Link copiato';b.classList.add('ok');}
      if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(done,function(){prompt('Copia il link:',url);});}
      else{prompt('Copia il link:',url);}
    };
  }
  window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferred=e;show();});  // Android/Chrome
  window.addEventListener('appinstalled',function(){var b=document.getElementById('installbar');if(b)b.classList.remove('on');deferred=null;});
  if(isIOS){window.addEventListener('load',show);}                                                    // iPhone: Safari (guida install) o altro browser (guida Safari)
})();
</script>
</body>
</html>
