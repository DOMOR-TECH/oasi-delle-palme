/* ---------- FINESTRE DI VERIFICA (nota 18) ----------
   Ogni servizio ha una finestra (giorno/settimana/decade/mese/stagione): la verifica
   vive DENTRO la finestra e si CHIUDE alla sua scadenza. Niente "non fatto" prima della

function pad2(n){return (n<10?'0':'')+n}
var MESINOMI=['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
function isoWeek(d){var t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));var day=(t.getUTCDay()+6)%7;t.setUTCDate(t.getUTCDate()-day+3);var firstThu=new Date(Date.UTC(t.getUTCFullYear(),0,4));var week=1+Math.round(((t-firstThu)/86400000-3+((firstThu.getUTCDay()+6)%7))/7);return [t.getUTCFullYear(),week];}
function endOfWeek(d){var x=new Date(d);var day=(x.getDay()+6)%7;x.setDate(x.getDate()+(6-day));x.setHours(23,59,59,0);return x;}
function decadeOf(d){var g=d.getDate();return g<=10?1:g<=20?2:3;}
function endOfDecade(d){var n=decadeOf(d),y=d.getFullYear(),m=d.getMonth();if(n===1)return new Date(y,m,10,23,59,59);if(n===2)return new Date(y,m,20,23,59,59);return new Date(y,m+1,0,23,59,59);}
function endOfMonth(d){return new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59);}
function dscad(e){var oggi=new Date(),dom=new Date(oggi);dom.setDate(dom.getDate()+1);
  if(e.toDateString()===oggi.toDateString())return 'oggi';
  if(e.toDateString()===dom.toDateString())return 'domani';
  return e.toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'short'});}
function startOfWeek(d){var x=new Date(d);var day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x;}
// Finestra corrente del servizio s; null se fuori stagione (mese non attivo). ap = apertura, scad = scadenza.
function windowOf(s,d){d=d||new Date();var m=d.getMonth()+1,y=d.getFullYear();
  if(s.mesi&&s.mesi.indexOf(m)<0)return null;
  var t=s.win||'W';
  if(t==='D'){var e=new Date(y,d.getMonth(),d.getDate(),23,59,59);return {id:y+'-'+pad2(m)+'-'+pad2(d.getDate()),ap:new Date(y,d.getMonth(),d.getDate(),0,0,0),scad:e,label:'oggi'};}
  if(t==='X10'){var n=decadeOf(d),e=endOfDecade(d),ap=new Date(y,d.getMonth(),n===1?1:n===2?11:21,0,0,0);return {id:y+'-'+pad2(m)+'-D'+n,ap:ap,scad:e,label:'entro '+dscad(e)};}
  if(t==='M'){var e=endOfMonth(d);return {id:y+'-'+pad2(m),ap:new Date(y,d.getMonth(),1,0,0,0),scad:e,label:'entro fine '+MESINOMI[d.getMonth()]};}
  if(t==='S'){var last=s.mesi?Math.max.apply(null,s.mesi):12,first=s.mesi?Math.min.apply(null,s.mesi):1,e=new Date(y,last,0,23,59,59);return {id:y+'-S'+pad2(first),ap:new Date(y,first-1,1,0,0,0),scad:e,label:'entro fine '+MESINOMI[last-1]};}
  var w=isoWeek(d),e=endOfWeek(d);return {id:w[0]+'-W'+pad2(w[1]),ap:startOfWeek(d),scad:e,label:'entro '+dscad(e)};   // 'W' default
}
// Finestra immediatamente precedente (o null se prima dell'avvio del controllo / non esiste in stagione)
function prevWindowOf(s,d){d=d||new Date();var cur=windowOf(s,d);if(!cur)return null;

}
// Esito di una finestra PASSATA: 'ok'=fatto confermato · 'problema'=segnalato · 'ocra'=scaduta SENZA controllo (vale come fatta)
function periodOutcome(area,sid,periodId){
  var rs=reports.filter(function(x){return x.area===area&&x.servizio===sid&&(x.periodo||'')===periodId;});

function curPeriodo(sid){var s=CAPITOLATO_VERDE.find(function(x){return x.id===sid});var w=s?windowOf(s):null;return w?w.id:'';}

// Finestre PASSATE di un servizio (esclusa la corrente) da fromDate a oggi → per la lista ocra a 5 settimane
function pastWindows(s,fromDate){
  var out=[],seen={},guard=0,cur=windowOf(s),probe=new Date((cur?cur.ap.getTime():Date.now())-86400000);
  while(guard++<420){
    if(probe<fromDate) break;
    var w=windowOf(s,probe);
    if(w && !seen[w.id] && (!cur||w.id!==cur.id)){ seen[w.id]=1; if(w.scad>=fromDate) out.push(w); }
    probe=new Date((w?w.ap.getTime():probe.getTime())-86400000);
  }
  return out;
}
// Penale Art.5 per una segnalazione di PROBLEMA su servizio settimanale+ (NO giornaliero): €100 + €30/giorno di ritardo
// dalla scadenza della finestra del report fino a oggi. null se non penalizzabile.
var PEN_BASE=100, PEN_DAY=30;
function penaleOf(r){
  var s=srvById(r.servizio); if(!s||s.win==='D') return null;   // i giornalieri non generano penale

  var w=windowOf(s,new Date(r.created_at)); if(!w) return null;
  var giorni=Math.floor((Date.now()-w.scad.getTime())/86400000);
  if(giorni<0) return null;                                     // finestra ancora aperta → non ancora inadempimento
  return { giorni:giorni, euro: PEN_BASE + PEN_DAY*giorni };
}

// Lega l'utente alla sua unità. Più comproprietari possono condividere la stessa unità:
// il PRIMO è il "primario" (proprietari.autore_id); gli altri si uniscono come coproprietari.
// La firma è sempre il NOME DELL'UNITÀ. Ritorna {row, stato, isCo, blocked, motivo}.
async function claimUnita(unita){
  var res=await sb.from('proprietari').select('*').eq('unita',unita).maybeSingle();
  var row=res.data;
  if(!row) return { blocked:true, motivo:'Unità '+unita+' non trovata nell\'elenco proprietari.', row:{unita:unita} };
  if(!row.autore_id){
    var up=await sb.from('proprietari').update({autore_id:userId,email:userEmail,stato:'in_attesa'}).eq('unita',unita).is('autore_id',null).select().maybeSingle();
    if(up.data) return { blocked:false, row:up.data, stato:up.data.stato };
    var re=await sb.from('proprietari').select('*').eq('unita',unita).maybeSingle(); row=re.data||row;   // qualcuno ha appena preso il primario
  }
  if(row.autore_id===userId) return { blocked:false, row:row, stato:row.stato };   // sono il primario
  // unità già col primario di un altro → mi unisco come COMPROPRIETARIO (in attesa di approvazione)
  var co=await sb.from('coproprietari').select('*').eq('unita',unita).eq('autore_id',userId).maybeSingle();
  if(!co.data){
    var ins=await sb.from('coproprietari').upsert({unita:unita,autore_id:userId,email:userEmail,stato:'in_attesa'},{onConflict:'unita,autore_id'}).select().maybeSingle();
    if(ins.error) return { blocked:true, motivo:'Errore nell\'unirti all\'unità '+unita+': '+ins.error.message, row:row };
    co.data=ins.data;
  }
  return { blocked:false, row:row, stato:(co.data&&co.data.stato)||'in_attesa', isCo:true };
}

function urlB64ToUint8(b64){ var pad='='.repeat((4-b64.length%4)%4); var s=(b64+pad).replace(/-/g,'+').replace(/_/g,'/'); var raw=atob(s); var arr=new Uint8Array(raw.length); for(var i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i); return arr; }
async function attivaNotifiche(){

    var reg=await navigator.serviceWorker.ready;

    body+
    '<div class="cap-grp">Art. 5 — Controllo e penali</div>'+

        '<li><b>Controllo con foto</b> — diritto di verificare l\'esecuzione anche con documentazione fotografica (è ciò che fa questa app).</li>'+
        '<li><b>Penale € 30/giorno</b> per ogni ritardo non giustificato (le tempistiche del capitolato sono dichiarate «essenziali»).</li>'+
        '<li><b>Penalità ≥ € 100</b> per ogni inadempimento accertato.</li>'+

// Scarica il contratto originale (PDF) — solo condòmini loggati, link temporaneo
async function scaricaContratto(){
  if(DEMO){ alert('In modalità prova il download non è attivo. Nella versione vera, da qui si scarica il PDF originale del contratto.'); return; }
  if(!userId){ alert('Accedi come condòmino per scaricare il contratto originale.'); return; }
  var btn=$('cap-pdf'); if(btn){btn.disabled=true;btn.textContent='Preparo il download…';}
  try{
    var r=await sb.storage.from('documenti').createSignedUrl('contratto-house-garden.pdf', 120);
    if(r.error||!r.data){ alert('Il documento non è ancora disponibile. (Va caricato nello Storage "documenti".)'); }
    else { window.open(r.data.signedUrl,'_blank'); }
  }catch(e){ alert('Errore: '+(e.message||e)); }
  if(btn){btn.disabled=false;btn.textContent='📄 Scarica il contratto originale (PDF)';}
}
// Scarica un documento dal bucket privato "documenti" (link firmato temporaneo) — solo condòmini loggati
async function scaricaDoc(file,btnId,label){
  if(DEMO){ alert('In modalità prova il download non è attivo. Nella versione vera si scarica il PDF originale.'); return; }
  if(!userId){ alert('Accedi come condòmino per scaricare il documento.'); return; }
  var btn=document.getElementById(btnId); if(btn){btn.disabled=true;btn.textContent='Preparo il download…';}
  try{
    var r=await sb.storage.from('documenti').createSignedUrl(file,120);
    if(r.error||!r.data){ alert('Il documento non è ancora disponibile.'); }
    else { window.open(r.data.signedUrl,'_blank'); }
  }catch(e){ alert('Errore: '+(e.message||e)); }
  if(btn){btn.disabled=false;btn.textContent=label;}
}

/* ---------- VIEW: ZONA (3 stati: Attuali · Problematici · Chiusi) ---------- */
var curStato='attuali';
var curAdminTab='condomini';   // condomini | speciali | logs
function srvById(id){return CAPITOLATO_VERDE.find(function(x){return x.id===id})}
function fornitoreOf(s){return (s&&s.fornitore)||'House & Garden';}
function fornTag(s){ if(areaType(curArea)!=='piscina') return '';   // il tag serve solo dove convivono 2 fornitori (piscina)
  var f=fornitoreOf(s), w=f==='WaterForYou';
  return '<div style="margin-top:3px"><span style="font-size:12px;font-weight:600;padding:2px 9px;border-radius:999px;background:'+(w?'#E6F1FB':'var(--todobg)')+';color:'+(w?'#185FA5':'var(--muted)')+'">'+esc(f)+'</span></div>'; }
// tipo di luogo di un'area + se un servizio compare in quell'area (mappatura SERVIZIO_DOVE)
function areaType(a){ return a==='Collina'?'collina':a==='Zona piscina'?'piscina':a==='Campo tennis'?'tennis':a==='Strade interne'?'strade':a==='Tutto il complesso'?'comune':'palazzina'; }
function serviceInArea(s,a){ var d=(window.SERVIZIO_DOVE&&window.SERVIZIO_DOVE[s.id])||[]; return d.indexOf(areaType(a))>=0; }
function threadHTML(r){
  var cms=comments.filter(function(c){return c.segnalazione_id===r.id});
  return '<button class="th-tog" data-rid="'+r.id+'" style="font-size:14px;padding:7px 12px;margin-top:8px">Discussione'+(cms.length?' ('+cms.length+')':'')+'</button>'+
    '<div class="th" data-tid="'+r.id+'" style="display:none;margin-top:8px;padding-left:8px;border-left:2px solid var(--line)">'+
      cms.map(function(c){return '<div style="margin-bottom:7px"><div style="font-size:14px"><span style="font-weight:500">'+esc(c.autore_nome)+'</span> <span style="color:var(--hint)">'+new Date(c.created_at).toLocaleDateString('it-IT')+'</span></div><div style="font-size:15px">'+esc(c.testo)+'</div></div>'}).join('')+
      '<div style="display:flex;gap:6px;margin-top:6px"><input type="text" class="th-in" data-rid="'+r.id+'" placeholder="Scrivi un commento…" style="flex:1;margin-top:0"><button class="th-send" data-rid="'+r.id+'" style="flex:none">Invia</button></div>'+
    '</div>';
}
function renderZona(){
  var v=$('view-zona');
  var selectHTML='<label>Dove sei ora</label><select id="z-area"><option value="" disabled'+(!curArea?' selected':'')+'>Dove ti trovi ora?</option>'+AREE.map(function(a){return '<option'+(a===curArea?' selected':'')+'>'+esc(a)+'</option>'}).join('')+'</select>';
  if(!curArea){   // nessun luogo scelto → prima si seleziona "dove ti trovi"
    v.innerHTML=(approvato()?'':'<div class="pres-note" style="margin:0 0 11px"><b>Il tuo accesso è in attesa di conferma</b> dall\'amministratore del gruppo. Intanto puoi guardare tutto; potrai inviare segnalazioni appena sei confermato.</div>')+selectHTML+
      '<div class="card" style="text-align:center;margin-top:14px"><div style="font-size:42px">📍</div><div style="font-size:17px;font-weight:600;margin-top:4px">Dove ti trovi ora?</div><div class="sub" style="margin-top:4px">Scegli la zona qui sopra per vedere cosa controllare e poter segnalare.</div></div>';
    $('z-area').onchange=function(e){curArea=e.target.value;renderAll();};
    return;
  }
  var apri=reports.filter(function(r){return r.area===curArea&&isOpen(r)}).length;
  var totApri=reports.filter(isOpen).length;
  function hasOpenProblem(sid){ return reports.some(function(r){return r.area===curArea&&r.servizio===sid&&isOpen(r)}); }
  // partiziona i servizi attivi
  var attuali=[], problematici=[];
  CAPITOLATO_VERDE.forEach(function(s){
    if(!serviceInArea(s,curArea)) return;   // solo i servizi che esistono in QUESTO luogo
    if(hasOpenProblem(s.id)) problematici.push(s);
    else if(windowOf(s)) attuali.push(s);
  });
  // CHIUSI: report di finestre PASSATE (periodo ≠ corrente) + conteggio ocra (finestra precedente non controllata)
  var chiusiReports=reports.filter(function(r){ return r.area===curArea && !isOpen(r) && (r.periodo||'')!==curPeriodo(r.servizio); })
    .sort(function(a,b){return a.created_at<b.created_at?1:-1});
  var win5=new Date(Date.now()-35*86400000);   // ultime 5 settimane: l'ocra resta visibile qui
  var ocraBySrv={}, ocraDaily=0;
  CAPITOLATO_VERDE.forEach(function(s){
    if(!serviceInArea(s,curArea)) return;
    pastWindows(s,win5).forEach(function(w){
      if(periodOutcome(curArea,s.id,w.id)!=='ocra') return;
      if(s.win==='D') ocraDaily++; else { (ocraBySrv[s.id]=ocraBySrv[s.id]||{s:s,wins:[]}).wins.push(w); }
    });
  });
  var ocraGroups=Object.keys(ocraBySrv).map(function(k){return ocraBySrv[k];});
  var counts={attuali:attuali.length, problematici:problematici.length, chiusi:chiusiReports.length+ocraGroups.length+(ocraDaily?1:0)};

  function chip(key,label){ var on=curStato===key;
    return '<button class="zchip" data-st="'+key+'" style="flex:1;padding:9px 4px;border-radius:9px;border:1px solid '+(on?'var(--txt)':'var(--line)')+';background:'+(on?'var(--txt)':'var(--surface)')+';color:'+(on?'#fff':'var(--muted)')+';font-size:14px;font-weight:600">'+label+' · '+counts[key]+'</button>'; }

  var html=(approvato()?'':'<div class="pres-note" style="margin:0 0 11px"><b>Il tuo accesso è in attesa di conferma</b> dall\'amministratore del gruppo. Intanto puoi guardare tutto; potrai inviare segnalazioni appena sei confermato.</div>')+
    selectHTML+
    '<div class="metrics" style="margin-top:11px"><div class="metric"><label>Qui, aperti</label><div class="n" style="color:var(--bad)">'+apri+' <span style="font-size:15px;font-weight:400;color:var(--hint)">problemi</span></div></div>'+
    '<div class="metric"><label>Tutto il complesso</label><div class="n">'+totApri+' <span style="font-size:15px;font-weight:400;color:var(--hint)">aperti</span></div></div></div>'+
    '<div style="display:flex;gap:7px;margin:13px 0 4px">'+chip('attuali','Attuali')+chip('problematici','Problematici')+chip('chiusi','Chiusi')+'</div>';

  function segBtn(sid,mio){ return canSegnalare()?'<button class="seg" data-s="'+sid+'">'+(mio?'✎ Modifica':'Segnala')+'</button>':'<button class="seg" disabled style="opacity:.45">Segnala</button>'; }

  if(curStato==='attuali'){
    html+='<p style="font-size:16px;font-weight:600;color:var(--muted);margin:8px 2px 8px">Cosa controllare in '+esc(curArea)+' · '+oggiLabel()+'</p>';
    if(!attuali.length) html+='<div class="empty">Per ora niente da controllare in questa zona.</div>';
    attuali.forEach(function(s){
      var w=windowOf(s), st=pillStato(curArea,s.id), c=st==='ok'?'ok':'todo', ic=st==='ok'?'✓':'?';
      var mio=myReportP(curArea,s.id), scadTxt= st==='ok'?'verificato in questa finestra':w.label;
      html+='<div class="card"><div class="row"><span class="pill" style="background:var(--'+c+'bg);color:var(--'+c+')">'+ic+'</span>'+
        '<div style="flex:1;min-width:0"><div style="font-size:17px;font-weight:600">'+esc(s.nome)+'</div>'+fornTag(s)+
        '<div style="font-size:15px;color:var(--hint)">'+esc(s.freq)+' · <b>'+esc(scadTxt)+'</b>'+(mio?' · <b style="color:var(--ok)">tua: fatto</b>':'')+'</div></div>'+segBtn(s.id,mio)+'</div>'+
        '<button class="src-link" data-cap="'+s.id+'">📄 '+esc(s.fonte)+'</button></div>';
    });
  } else if(curStato==='problematici'){
    html+='<p style="font-size:16px;font-weight:600;color:var(--muted);margin:8px 2px 8px">Problemi aperti in '+esc(curArea)+'</p>';
    if(!problematici.length) html+='<div class="empty">Nessun problema aperto in questa zona. 👍</div>';
    problematici.forEach(function(s){
      var probs=reports.filter(function(r){return r.area===curArea&&r.servizio===s.id&&isOpen(r)});
      var mio=myReportP(curArea,s.id);
      html+='<div class="card"><div class="row"><span class="pill" style="background:var(--badbg);color:var(--bad)">!</span>'+
        '<div style="flex:1;min-width:0"><div style="font-size:17px;font-weight:600">'+esc(s.nome)+'</div>'+fornTag(s)+
        '<div style="font-size:15px;color:var(--bad)"><b>'+probs.length+(probs.length>1?' problemi aperti':' problema aperto')+'</b></div></div>'+segBtn(s.id,mio)+'</div>'+
        (probs[0]&&probs[0].nota?'<div style="font-size:15px;color:var(--muted);margin-top:6px">«'+esc(probs[0].nota)+'»</div>':'')+
        '<button class="src-link" data-cap="'+s.id+'">📄 '+esc(s.fonte)+'</button></div>';
    });
    html+='<p class="sub" style="margin-top:10px">Il dossier completo (con foto ed export PDF) è nel tab <b>Dossier</b>.</p>';
  } else {  // CHIUSI
    html+='<p style="font-size:16px;font-weight:600;color:var(--muted);margin:8px 2px 8px">Finestre concluse in '+esc(curArea)+' · ultime 5 settimane</p>';
    if(!chiusiReports.length && !ocraGroups.length && !ocraDaily) html+='<div class="empty">Ancora nessuna finestra conclusa qui.</div>';
    if(ocraDaily) html+='<div class="card" style="background:var(--ocrabg)"><div style="color:var(--ocra);font-size:15px;line-height:1.45">⬤ <b>'+ocraDaily+'</b> finestre giornaliere scadute senza controllo — valgono come fatte, ma nessuno le ha confermate.</div></div>';
    ocraGroups.forEach(function(g){
      var dates=g.wins.sort(function(a,b){return a.scad<b.scad?1:-1}).map(function(w){return w.ap.toLocaleDateString('it-IT')}).join(' · ');
      html+='<div class="card" style="background:var(--ocrabg)"><div style="font-size:17px;font-weight:600;color:var(--ocra)">'+esc(g.s.nome)+'</div>'+
        '<div style="font-size:14px;color:var(--ocra);margin-top:3px">⬤ <b>'+g.wins.length+'</b> '+(g.wins.length>1?'finestre non controllate':'finestra non controllata')+' (ultime 5 sett.) — '+(g.wins.length>1?'valgono':'vale')+' come '+(g.wins.length>1?'fatte':'fatta')+', non confermat'+(g.wins.length>1?'e':'a')+'</div>'+
        '<div style="font-size:13px;color:var(--ocra);margin-top:4px">'+dates+'</div>'+
        '<button class="src-link" data-cap="'+g.s.id+'">📄 '+esc(g.s.fonte)+'</button></div>';
    });
    chiusiReports.forEach(function(r){
      var s=srvById(r.servizio); var fatto=r.stato==='ok';
      var col=fatto?'ok':'todo';

        threadHTML(r)+'</div>';

  v.querySelectorAll('.seg:not([disabled])').forEach(function(b){b.onclick=function(){openSegnala(b.dataset.s)}});

  v.querySelectorAll('.th-tog').forEach(function(b){b.onclick=function(){var t=v.querySelector('.th[data-tid="'+b.dataset.rid+'"]');var show=t.style.display==='none';t.style.display=show?'block':'none';openThreads[b.dataset.rid]=show;}});

/* ---------- SEGNALA ---------- */
function openSegnala(sid){
  if(!curArea){ alert('Scegli prima dove ti trovi ("Dove sei ora").'); return; }   // niente segnalazione senza luogo
  var s=CAPITOLATO_VERDE.find(function(x){return x.id===sid});
  var existing=myReportP(curArea,sid);
  var existingUrls = existing? fotoListOf(existing).slice() : [];
  var m=document.createElement('div');
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:1000';
  m.innerHTML='<div style="background:var(--surface);width:100%;max-width:440px;max-height:92vh;overflow:auto;border-radius:16px 16px 0 0;padding:16px 16px 22px">'+
    '<div style="font-size:18px;font-weight:600">'+esc(s.nome)+(existing?' <span style="font-size:14px;color:var(--info)">· modifica</span>':'')+'</div>'+
    '<div style="font-size:15px;color:var(--hint);margin:2px 0 12px">'+esc(curArea)+' · dovuto: '+esc(s.freq)+' · '+esc(s.fonte)+'</div>'+
    (existing?'<div class="sub" style="margin:-6px 0 10px">Hai già segnalato questa voce: stai <b>modificando</b> la tua segnalazione.</div>':'')+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:9px">'+
      '<button id="b-ok" style="border-color:var(--ok);color:var(--ok)">✓ Fatto</button>'+
      '<button id="b-no" style="border-color:var(--bad);color:var(--bad)">! Problema</button></div>'+
    '<label style="margin-top:12px;display:block">Foto (puoi sceglierne più di una)</label>'+
    '<input id="b-foto" type="file" accept="image/*" multiple style="display:none">'+
    '<div id="b-prevs" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px"></div>'+
    '<label id="b-nota-lbl" style="margin-top:8px;display:block">Nota (facoltativa)</label><textarea id="b-nota" rows="3" placeholder="es. prato secco, irrigazione ferma da giorni" style="min-height:92px;font-size:16px;border:1.5px solid var(--hint);background:var(--surface);border-radius:10px;padding:11px">'+esc(existing&&existing.nota?existing.nota:'')+'</textarea>'+
    '<div style="font-size:14px;color:var(--hint);margin-top:8px">firma: '+esc(userNome)+' · '+new Date().toLocaleDateString('it-IT')+' · zona '+esc(curArea)+'</div>'+
    '<div id="b-warn" style="color:var(--bad);font-size:15px;margin-top:8px;display:none">Indica prima se è Fatto o Problema</div>'+
    '<div style="display:grid;grid-template-columns:1fr 2fr;gap:9px;margin-top:14px"><button id="b-x">Annulla</button>'+
    '<button class="btn-primary" id="b-send">'+(existing?'Salva modifiche':'Invia segnalazione')+'</button></div></div>';
  document.querySelector('.wrap').appendChild(m);
  var stato = existing? existing.stato : null, fotoBlobs=[];
  function pick(el,col){$('b-ok').style.outline='';$('b-no').style.outline='';el.style.outline='2px solid '+col}
  function renderPrevs(){
    var h='';
    existingUrls.forEach(function(u,i){ h+='<div style="position:relative"><img src="'+esc(u)+'" style="width:64px;height:64px;object-fit:cover;border-radius:8px"><button data-ex="'+i+'" class="rm-ex" style="position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:var(--bad);color:#fff;border:none;font-size:14px;line-height:1;padding:0">×</button></div>'; });
    fotoBlobs.forEach(function(b,i){ h+='<div style="position:relative"><img src="'+URL.createObjectURL(b)+'" style="width:64px;height:64px;object-fit:cover;border-radius:8px"><button data-nw="'+i+'" class="rm-nw" style="position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:var(--bad);color:#fff;border:none;font-size:14px;line-height:1;padding:0">×</button></div>'; });
    // riquadro "+" SEMPRE in coda → resta a destra dopo le miniature: si capisce che si possono aggiungere altre foto
    h+='<button type="button" id="b-add" aria-label="Aggiungi foto" style="width:64px;height:64px;border-radius:8px;border:2px dashed var(--ok);background:var(--okbg);color:var(--ok);font-size:34px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0">+</button>';
    var p=$('b-prevs'); p.innerHTML=h;
    p.querySelectorAll('.rm-ex').forEach(function(b){b.onclick=function(){existingUrls.splice(+b.dataset.ex,1);renderPrevs();}});
    p.querySelectorAll('.rm-nw').forEach(function(b){b.onclick=function(){fotoBlobs.splice(+b.dataset.nw,1);renderPrevs();}});
    $('b-add').onclick=function(){ $('b-foto').click(); };
  }
  function updateNotaLbl(){ var l=$('b-nota-lbl'); if(!l)return;
    if(stato==='problema'){ l.innerHTML='Nota — <b style="color:var(--bad)">descrivi il problema</b> (obbligatoria)'; $('b-nota').setAttribute('placeholder','Cosa non va? es. prato secco, irrigazione ferma da giorni'); }
    else { l.textContent='Nota (facoltativa)'; $('b-nota').setAttribute('placeholder','es. note utili, dettagli'); } }
  if(existing && stato){ pick(stato==='ok'?$('b-ok'):$('b-no'), stato==='ok'?'var(--ok)':'var(--bad)'); }
  renderPrevs(); updateNotaLbl();
  $('b-ok').onclick=function(){stato='ok';pick(this,'var(--ok)');updateNotaLbl();};
  $('b-no').onclick=function(){stato='problema';pick(this,'var(--bad)');updateNotaLbl();};
  $('b-foto').onchange=function(e){ [].slice.call(e.target.files).forEach(function(f){ downscale(f,function(blob){ fotoBlobs.push(blob); renderPrevs(); }); }); e.target.value=''; };
  $('b-x').onclick=function(){m.remove()};
  $('b-send').onclick=async function(){
    if(!stato){$('b-warn').textContent='Indica prima se è Fatto o Problema';$('b-warn').style.display='block';return}
    if(stato==='problema' && !$('b-nota').value.trim()){$('b-warn').textContent='Per un problema scrivi cosa non va.';$('b-warn').style.display='block';$('b-nota').focus();return}
    if(DEMO){
      var urlsD=existingUrls.concat(fotoBlobs.map(function(b){return URL.createObjectURL(b)}));
      if(existing){ existing.stato=stato; existing.nota=$('b-nota').value.trim(); existing.foto_urls=urlsD; existing.foto_url=urlsD[0]||null; }
      else { reports.unshift({id:'d'+Date.now(),area:curArea,servizio:s.id,servizio_nome:s.nome,fonte:s.fonte,stato:stato,nota:$('b-nota').value.trim(),foto_url:urlsD[0]||null,foto_urls:urlsD,autore_id:userId,autore_nome:userNome,risolto:false,periodo:curPeriodo(s.id),created_at:new Date().toISOString()}); }
      m.remove(); renderAll(); return;
    }
    var btn=$('b-send'); btn.disabled=true; btn.textContent='Invio…';
    try{
      var newUrls=[];
      for(var i=0;i<fotoBlobs.length;i++){
        var path=userId+'/'+Date.now()+'-'+i+'.jpg';
        var up=await sb.storage.from('foto').upload(path, fotoBlobs[i], {contentType:'image/jpeg'});
        if(up.error) throw up.error;
        newUrls.push(sb.storage.from('foto').getPublicUrl(path).data.publicUrl);
      }
      var allUrls=existingUrls.concat(newUrls);
      var payload={ area:curArea, servizio:s.id, servizio_nome:s.nome, fonte:s.fonte, stato:stato, nota:$('b-nota').value.trim(), foto_url:allUrls[0]||null, foto_urls:allUrls, autore_id:userId, autore_nome:userNome, periodo:curPeriodo(s.id) };
      var res=await sb.from('segnalazioni').upsert(payload,{onConflict:'autore_id,area,servizio,periodo'});
      if(res.error) throw res.error;
      m.remove(); await loadReports(); renderAll();
    }catch(err){ $('b-warn').textContent='Errore: '+err.message; $('b-warn').style.display='block'; btn.disabled=false; btn.textContent=existing?'Salva modifiche':'Invia segnalazione'; }
  };
}
function downscale(file,cb){var img=new Image();var rd=new FileReader();rd.onload=function(){img.onload=function(){var mx=1280,sc=Math.min(1,mx/Math.max(img.width,img.height));var cv=document.createElement('canvas');cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);cv.toBlob(function(b){cb(b)},'image/jpeg',0.75)};img.src=rd.result};rd.readAsDataURL(file)}

/* ---------- VIEW: BACHECA ---------- */
function renderBacheca(){
  var v=$('view-bacheca');
  var probByArea={};reports.forEach(function(r){if(isOpen(r)){probByArea[r.area]=(probByArea[r.area]||0)+1}});
  var pw={}; CAPITOLATO_VERDE.forEach(function(s){pw[s.id]=prevWindowOf(s);});
  function ocraOf(a){var n=0;CAPITOLATO_VERDE.forEach(function(s){if(!serviceInArea(s,a))return;var w=pw[s.id];if(w&&periodOutcome(a,s.id,w.id)==='ocra')n++;});return n;}
  var ocraByArea={}; AREE.forEach(function(a){ocraByArea[a]=ocraOf(a)});
  var totProb=Object.keys(probByArea).reduce(function(t,k){return t+probByArea[k]},0);
  var totOcra=AREE.reduce(function(t,a){return t+ocraByArea[a]},0);
  var okAree=AREE.filter(function(a){return !probByArea[a]&&!ocraByArea[a]}).length;
  var html='<div class="metrics"><div class="metric"><label>Aree controllate</label><div class="n">'+okAree+' <span style="font-size:15px;font-weight:400;color:var(--hint)">/'+AREE.length+'</span></div></div>'+
    '<div class="metric"><label>Problemi aperti</label><div class="n" style="color:var(--bad)">'+totProb+'</div></div></div>'+
    (totOcra?'<div style="margin:9px 0 2px;font-size:14px;background:var(--ocrabg);color:var(--ocra);padding:7px 10px;border-radius:8px">⬤ <b>'+totOcra+'</b> finestre scadute senza controllo — valgono come fatte, ma nessuno le ha confermate</div>':'')+
    '<p style="font-size:16px;font-weight:600;color:var(--muted);margin:10px 2px 8px">Mappa del complesso · '+oggiLabel()+'</p><div class="grid">';
  AREE.forEach(function(a){var p=probByArea[a]||0,o=ocraByArea[a]||0;
    var col=p>0?'bad':o>0?'ocra':'ok';
    var txt=p>0?('! '+p+(p>1?' problemi':' problema')):o>0?('⬤ '+o+' non controllate'):'✓ ok';
    html+='<button class="tile bch-tile" data-area="'+esc(a)+'" style="cursor:pointer;border-color:var(--'+col+');background:var(--'+col+'bg);color:var(--'+col+')">'+
      '<span style="font-size:15px;font-weight:600">'+a+'</span><span style="font-size:14px">'+txt+'</span></button>';
  });
  v.innerHTML=html+'</div>';
  v.querySelectorAll('.bch-tile').forEach(function(b){b.onclick=function(){goToArea(b.dataset.area)}});
}
function goToArea(a){
  curArea=a;
  showView('zona'); window.scrollTo(0,0);
}

/* ---------- VIEW: DOSSIER ---------- */

      '<div class="sub" style="margin-bottom:4px">'+penali.length+' inadempiment'+(penali.length>1?'i':'o')+' · €100 a inadempimento + €30/giorno di ritardo (matura finché non risolto)</div>'+

    rqConf.forEach(function(r){

    });

      html+='<div style="border-top:.5px solid var(--line);padding:8px 0">'+
        '<div class="row" style="align-items:flex-start">'+

/* ---------- EXPORT PDF ---------- */
function loadImg(url){return new Promise(function(res,rej){var img=new Image();if(/^https?:/i.test(url))img.crossOrigin='anonymous';img.onload=function(){try{var c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;c.getContext('2d').drawImage(img,0,0);res({data:c.toDataURL('image/jpeg',0.85),w:img.naturalWidth,h:img.naturalHeight});}catch(e){rej(e);}};img.onerror=function(){rej(new Error('load'))};img.src=url;});}
async function exportPDF(){
  var btn=$('dz-export'); if(btn){btn.disabled=true;btn.textContent='Genero il PDF…';}
  try{
    var doc=new jspdf.jsPDF({unit:'pt',format:'a4'});
    var W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight(), M=40, y=54;
    doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.text('Dossier — esecuzione capitolato verde', M, y); y+=20;
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(110);
    doc.text('Condominio Oasi delle Palme (Via Cina 451, Roma) · generato il '+new Date().toLocaleDateString('it-IT'), M, y); y+=14;
    var probs=reports.filter(isOpen);
    doc.text(reports.length+' segnalazioni totali · '+probs.length+' inadempienze aperte', M, y); y+=22;
    doc.setTextColor(0);
    var bySrv={}; probs.forEach(function(r){(bySrv[r.servizio]=bySrv[r.servizio]||[]).push(r);});
    if(!probs.length){ doc.setFontSize(11); doc.text('Nessuna inadempienza aperta.', M, y); }
    var keys=Object.keys(bySrv);
    for(var k=0;k<keys.length;k++){
      var s=CAPITOLATO_VERDE.find(function(x){return x.id===keys[k]}); var rs=bySrv[keys[k]];
      if(y>H-120){doc.addPage();y=54;}
      doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.text(s?s.nome:keys[k], M, y); y+=15;
      doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(110);
      doc.text('dovuto: '+(s?s.freq:'')+'   ·   '+(rs[0].fonte||''), M, y); y+=16; doc.setTextColor(0);
      for(var i=0;i<rs.length;i++){
        var r=rs[i];
        if(y>H-110){doc.addPage();y=54;}
        doc.setFontSize(11);
        var head=r.area+(r.nota?' — '+r.nota:'');
        var lines=doc.splitTextToSize(head, W-2*M); doc.text(lines, M, y+12);
        doc.setFontSize(9); doc.setTextColor(110);
        doc.text(r.autore_nome+' · '+fmt(r.created_at), M, y+12+lines.length*13+3); doc.setTextColor(0);
        y+=12+lines.length*13+12;
        var fotos=fotoListOf(r);
        for(var fi=0; fi<fotos.length; fi++){ try{
          var im=await loadImg(fotos[fi]);
          var iw=(W-2*M)*0.5, ih=iw*im.h/im.w;       // foto al 50% della larghezza utile, proporzioni reali
          var avail=H-54-y-16;                        // spazio rimasto sotto y in questa pagina
          if(ih>avail){ doc.addPage(); y=54; avail=H-54-y-16; }
          if(ih>avail){ var sc=avail/ih; ih=avail; iw=iw*sc; }   // foto verticale più alta della pagina: riduci in proporzione
          var ix=M+((W-2*M)-iw)/2;                     // centra se ridotta
          doc.addImage(im.data,'JPEG',ix,y,iw,ih);
          y+=ih+10;
        }catch(e){} }
        var cms=comments.filter(function(c){return c.segnalazione_id===r.id});
        for(var j=0;j<cms.length;j++){
          if(y>H-60){doc.addPage();y=54;}
          doc.setFontSize(9); doc.setTextColor(90);
          var clines=doc.splitTextToSize('— '+cms[j].autore_nome+': '+cms[j].testo, W-M-(M+18));
          doc.text(clines, M+18, y); doc.setTextColor(0);
          y+=clines.length*11+5;
        }
      }
      y+=12;
    }
    doc.setFontSize(8); doc.setTextColor(140);
    doc.text('Ogni voce è ancorata al capitolato e a segnalazioni firmate con foto e data.', M, H-26);
    doc.save('dossier-oasi-delle-palme.pdf');
  }catch(err){ alert('Errore PDF: '+err.message); }
  if(btn){btn.disabled=false;btn.textContent='Esporta PDF firmato';}
}

  attivi.forEach(function(s){
    var sv=voti.filter(function(x){return x.sondaggio_id===s.id});
    var myVote=sv.find(function(x){return x.autore_id===userId});
    var unitVote=sv.find(function(x){return userUnita && x.unita===userUnita.unita});   // il voto è dell'UNITÀ
    var mine=!!myVote;
    var opzioni=opzOf(s);
    var totMm=sv.reduce(function(t,x){return t+(+x.millesimi||0)},0);
    html+='<div class="card"><div style="font-weight:600;font-size:18px">'+esc(s.domanda)+'</div>'+
      '<div style="font-size:14px;color:var(--hint);margin:3px 0 10px">'+sv.length+' voti · '+totMm.toFixed(1).replace('.',',')+'/1000 mm'+(s.chiuso?' · CHIUSO':'')+'</div>';
    if((!unitVote || mine) && !s.chiuso && approvato() && userUnita){
      html+='<div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px">'+opzioni.map(function(o){return '<button class="vt-vote" data-s="'+esc(s.id)+'" data-o="'+esc(o)+'">'+esc(o)+'</button>'}).join('')+'</div>';
    } else if(unitVote && !mine && approvato() && !s.chiuso){
      html+='<div class="sub" style="margin-bottom:4px;color:var(--ocra)">Ha già votato un comproprietario della tua unità. Il voto è <b>dell\'unità</b>: lo vedi, ma non puoi cambiarlo.</div>';
    } else if(!userUnita && approvato() && !s.chiuso){
      html+='<div class="sub" style="margin-bottom:4px">Il voto è dell\'unità: i non-condòmini (custode, avvocato…) non votano.</div>';
    } else if(!approvato() && !unitVote && !s.chiuso){
      html+='<div class="sub" style="margin-bottom:4px">Per votare devi essere un condòmino confermato.</div>';
    }
    opzioni.forEach(function(o){
      var ov=sv.filter(function(x){return x.opzione===o});
      var mm=ov.reduce(function(t,x){return t+(+x.millesimi||0)},0);
      var pct=totMm>0?Math.round(mm/totMm*100):0;
      html+='<div style="margin-top:10px"><div style="display:flex;justify-content:space-between;font-size:15px;gap:8px">'+
        '<span>'+(unitVote&&unitVote.opzione===o?'<b>'+esc(o)+' ✓ ('+(mine?'il tuo voto':'voto dell\'unità')+')</b>':esc(o))+'</span>'+
        '<span style="color:var(--hint);white-space:nowrap">'+ov.length+' u · '+mm.toFixed(1).replace('.',',')+' mm</span></div>'+
        '<div style="height:8px;background:var(--line);border-radius:5px;margin-top:4px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:var(--ok)"></div></div>'+
        (ov.length?'<div style="font-size:13px;color:var(--hint);margin-top:3px">'+ov.map(function(x){return esc(x.autore_nome)}).join(', ')+'</div>':'')+'</div>';
    });
    if(adminView()){ html+='<div style="display:flex;gap:7px;margin-top:12px">'+
      '<button class="vt-close" data-s="'+esc(s.id)+'" data-chiuso="'+(s.chiuso?'1':'0')+'" style="font-size:14px">'+(s.chiuso?'Riapri':'Chiudi')+'</button>'+
      '<button class="vt-del" data-s="'+esc(s.id)+'" style="font-size:14px;border-color:var(--bad);color:var(--bad)">Elimina</button></div>'; }
    html+='</div>';
  });
  v.innerHTML=html;
  v.querySelectorAll('.vt-vote').forEach(function(b){b.onclick=function(){votaSondaggio(b.dataset.s,b.dataset.o)}});
  var nb=$('vt-new'); if(nb) nb.onclick=nuovoSondaggio;
  if(adminView()){
    v.querySelectorAll('.vt-appr').forEach(function(b){b.onclick=function(){approveSondaggio(b.dataset.s)}});
    v.querySelectorAll('.vt-close').forEach(function(b){b.onclick=function(){toggleSondaggio(b.dataset.s,b.dataset.chiuso!=='1')}});
    v.querySelectorAll('.vt-del').forEach(function(b){b.onclick=function(){eliminaSondaggio(b.dataset.s)}});
  }
}
async function votaSondaggio(sid,opzione){
  if(DEMO){ DEMO_VOTI=DEMO_VOTI.filter(function(x){return !(x.sondaggio_id===sid&&x.autore_id===userId)}); DEMO_VOTI.push({sondaggio_id:sid,unita:userUnita.unita,autore_id:userId,autore_nome:userNome,millesimi:userUnita.millesimi||0,opzione:opzione}); renderVoti(); return; }
  if(!approvato()){ alert('Devi essere un condòmino confermato per votare.'); return; }
  if(!userUnita){ alert('Il voto è dell\'unità: i non-condòmini non votano.'); return; }
  var up=await sb.from('voti').upsert({ sondaggio_id:sid, unita:userUnita.unita, autore_id:userId, autore_nome:userNome, millesimi:(userUnita.millesimi||0), opzione:opzione },{onConflict:'sondaggio_id,unita'});
  if(up.error){ alert('Errore: '+up.error.message); return; }
  renderVoti();
}
async function nuovoSondaggio(){
  if(!approvato()){ alert('Devi essere un condòmino confermato.'); return; }
  var d=prompt(adminView()?'Domanda del sondaggio:':'Proponi una domanda (l\'amministratore la valuterà):'); if(!d||!d.trim())return;
  var opz=prompt('Opzioni separate da virgola:','Sì, No, Astenuto');
  var opzioni=(opz&&opz.trim())?opz.split(',').map(function(s){return s.trim()}).filter(Boolean):['Sì','No','Astenuto'];
  if(opzioni.length<2){ alert('Servono almeno 2 opzioni.'); return; }
  if(DEMO){ DEMO_SONDAGGI.unshift({id:'s'+Date.now(),domanda:d.trim(),opzioni:opzioni,chiuso:false,approvato:adminView(),proposto_da:userId,autore_nome:userNome}); renderVoti(); if(!adminView())alert('Proposta inviata! L\'amministratore la valuterà.'); return; }
  var rec={domanda:d.trim(),opzioni:opzioni,autore_nome:userNome,approvato:adminView(),proposto_da:userId};
  var up=await sb.from('sondaggi').insert(rec);
  if(up.error){ alert('Errore: '+up.error.message); return; }
  if(!adminView()) alert('Proposta inviata! L\'amministratore la valuterà.');
  renderVoti();
}
async function approveSondaggio(sid){
  if(DEMO){ var s=DEMO_SONDAGGI.find(function(x){return x.id===sid}); if(s)s.approvato=true; renderVoti(); return; }
  var up=await sb.from('sondaggi').update({approvato:true}).eq('id',sid);
  if(up.error){ alert('Errore: '+up.error.message); return; }
  renderVoti();
}
async function toggleSondaggio(sid,chiudi){
  if(DEMO){ var s=DEMO_SONDAGGI.find(function(x){return x.id===sid}); if(s)s.chiuso=chiudi; renderVoti(); return; }
  var up=await sb.from('sondaggi').update({chiuso:chiudi}).eq('id',sid);
  if(up.error){ alert('Errore: '+up.error.message); return; }
  renderVoti();
}
async function eliminaSondaggio(sid){
  if(!confirm('Eliminare questo sondaggio e tutti i suoi voti?')) return;
  if(DEMO){ DEMO_SONDAGGI=DEMO_SONDAGGI.filter(function(x){return x.id!==sid}); DEMO_VOTI=DEMO_VOTI.filter(function(x){return x.sondaggio_id!==sid}); renderVoti(); return; }
  var up=await sb.from('sondaggi').delete().eq('id',sid);
  if(up.error){ alert('Errore: '+up.error.message); return; }
  renderVoti();
}

  var chiusi=avvisi.filter(function(a){return a.stato==='risolto'});

    '<div class="sub" style="margin:0 2px 12px">Imprevisti non coperti da nessun contratto fornitore (centralina, citofoni, ascensore…). Chi apre un avviso ne segue la chiusura; l\'amministrazione può chiudere qualsiasi avviso.</div>';

  v.innerHTML=html;

  v.querySelectorAll('.av-foto').forEach(function(im){im.onclick=function(){openImage(im.dataset.u)}});
  v.querySelectorAll('.av-st').forEach(function(b){b.onclick=function(){

  v.querySelectorAll('.th-tog').forEach(function(b){b.onclick=function(){var t=v.querySelector('.th[data-tid="'+b.dataset.rid+'"]');var show=t.style.display==='none';t.style.display=show?'block':'none';openThreads[b.dataset.rid]=show;}});
  v.querySelectorAll('.th-send').forEach(function(b){b.onclick=async function(){var inp=v.querySelector('.th-in[data-rid="'+b.dataset.rid+'"]');if(!inp.value.trim())return;openThreads[b.dataset.rid]=true;var ok=await addComment(b.dataset.rid,inp.value);if(ok)renderAvvisi();}});
  Object.keys(openThreads).forEach(function(rid){if(openThreads[rid]){var t=v.querySelector('.th[data-tid="'+rid+'"]');if(t)t.style.display='block';}});

async function cambiaStatoAvviso(a,nuovo){
  if(!a||!a.id){ alert('Avviso senza id: operazione annullata.'); return; }
  if(!puoChiudere(a)){ alert('Solo chi ha aperto l\'avviso (o l\'amministrazione) può aggiornarlo.'); return; }
  if(nuovo==='risolto' && !confirm('Segnare questo avviso come RISOLTO?')) return;
  var patch={stato:nuovo};
  if(nuovo==='preso_in_carico'){ if(!a.preso_at) patch.preso_at=new Date().toISOString(); patch.preso_da_nome=userNome; }
  if(nuovo==='risolto'){ patch.chiuso_il=new Date().toISOString(); patch.chiuso_da=userId; patch.chiuso_da_nome=userNome; }
  if(nuovo==='aperto'){ patch.chiuso_il=null; patch.chiuso_da=null; patch.chiuso_da_nome=null; }   // riapertura azzera la chiusura
  if(DEMO){ Object.assign(a,patch); renderAvvisi(); return; }
  var res=await sb.from('avvisi').update(patch).eq('id',a.id).select('id');
  if(res.error){ alert('Errore: '+res.error.message); return; }
  if(res.data && res.data.length>1){ alert('Attenzione: toccate '+res.data.length+' righe (atteso 1). Segnalalo.'); }
  await loadAvvisi(); renderAvvisi();
}
function openNuovoAvviso(){

    '<div style="font-size:18px;font-weight:600">Nuovo avviso fuori-capitolato</div>'+
    '<div style="font-size:15px;color:var(--hint);margin:2px 0 12px">Imprevisto non coperto da contratti. Lo segui tu fino alla chiusura (anche l\'amministrazione può chiuderlo).</div>'+
    '<label style="display:block">Titolo</label><input id="av-tit" type="text" placeholder="es. Centralina cancello fuori uso" style="margin-top:4px">'+

    '<label style="margin-top:10px;display:block">Descrizione</label><textarea id="av-desc" rows="3" placeholder="Cosa è successo, dove, da quando…" style="min-height:84px;font-size:16px;border:1.5px solid var(--hint);background:var(--surface);border-radius:10px;padding:11px;margin-top:4px"></textarea>'+
    '<label style="margin-top:10px;display:block">Foto (facoltativa, anche più di una)</label>'+

    '<div id="av-prevs" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px"></div>'+
    '<div style="font-size:14px;color:var(--hint);margin-top:10px">firma: '+esc(userNome)+' · '+new Date().toLocaleDateString('it-IT')+'</div>'+
    '<div id="av-warn" style="color:var(--bad);font-size:15px;margin-top:8px;display:none"></div>'+
    '<div style="display:grid;grid-template-columns:1fr 2fr;gap:9px;margin-top:14px"><button id="av-x">Annulla</button>'+
    '<button class="btn-primary" id="av-send">Pubblica avviso</button></div></div>';
  document.querySelector('.wrap').appendChild(m);
  var fotoBlobs=[];
  function renderPrevs(){
    var h='';
    fotoBlobs.forEach(function(b,i){ h+='<div style="position:relative"><img src="'+URL.createObjectURL(b)+'" style="width:64px;height:64px;object-fit:cover;border-radius:8px"><button data-nw="'+i+'" class="rm-nw" style="position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:var(--bad);color:#fff;border:none;font-size:14px;line-height:1;padding:0">×</button></div>'; });
    h+='<button type="button" id="av-add" aria-label="Aggiungi foto" style="width:64px;height:64px;border-radius:8px;border:2px dashed var(--ok);background:var(--okbg);color:var(--ok);font-size:34px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0">+</button>';
    var p=$('av-prevs'); p.innerHTML=h;
    p.querySelectorAll('.rm-nw').forEach(function(b){b.onclick=function(){fotoBlobs.splice(+b.dataset.nw,1);renderPrevs();}});
    $('av-add').onclick=function(){ $('av-foto').click(); };
  }
  renderPrevs();
  $('av-foto').onchange=function(e){ [].slice.call(e.target.files).forEach(function(f){ downscale(f,function(blob){ fotoBlobs.push(blob); renderPrevs(); }); }); e.target.value=''; };
  $('av-x').onclick=function(){m.remove()};
  $('av-send').onclick=async function(){
    var tit=($('av-tit').value||'').trim(), cat=$('av-cat').value, desc=($('av-desc').value||'').trim();
    if(!tit){ $('av-warn').textContent='Scrivi un titolo per l\'avviso.'; $('av-warn').style.display='block'; return; }
    if(DEMO){
      var urlsD=fotoBlobs.map(function(b){return URL.createObjectURL(b)});
      avvisi.unshift({id:'av'+Date.now(),titolo:tit,categoria:cat,descrizione:desc,foto_urls:urlsD,stato:'aperto',autore_id:userId,autore_nome:userNome,preso_at:null,preso_da_nome:null,chiuso_il:null,chiuso_da:null,chiuso_da_nome:null,created_at:new Date().toISOString()});
      m.remove(); renderAvvisi(); return;
    }
    var btn=$('av-send'); btn.disabled=true; btn.textContent='Pubblico…';
    try{
      var urls=[];
      for(var i=0;i<fotoBlobs.length;i++){
        var path=userId+'/avviso-'+Date.now()+'-'+i+'.jpg';
        var up=await sb.storage.from('foto').upload(path, fotoBlobs[i], {contentType:'image/jpeg'});
        if(up.error) throw up.error;
        urls.push(sb.storage.from('foto').getPublicUrl(path).data.publicUrl);
      }
      var res=await sb.from('avvisi').insert({ titolo:tit, categoria:cat, descrizione:desc, foto_urls:urls, stato:'aperto', autore_id:userId, autore_nome:userNome });
      if(res.error) throw res.error;
      m.remove(); await loadAvvisi(); renderAvvisi();
    }catch(err){ $('av-warn').textContent='Errore: '+err.message; $('av-warn').style.display='block'; btn.disabled=false; btn.textContent='Pubblica avviso'; }
  };
}

// classifica del girone: vittorie, giocate; ordina per vittorie, poi differenza (2V-G), poi nome
function classificaDi(tid){
  var isc=iscrittiDi(tid), pg=partiteDi(tid).filter(function(p){return p.stato==='giocato';});
  var st={}; isc.forEach(function(x){ st[x.autore_id]={nome:x.autore_nome,unita:x.unita,g:0,v:0}; });
  pg.forEach(function(p){
    if(st[p.a_id]){ st[p.a_id].g++; if(p.vincitore==='a') st[p.a_id].v++; }
    if(st[p.b_id]){ st[p.b_id].g++; if(p.vincitore==='b') st[p.b_id].v++; }
  });
  var rows=Object.keys(st).map(function(k){return st[k];});
  rows.sort(function(a,b){ return (b.v-a.v) || ((2*b.v-b.g)-(2*a.v-a.g)) || a.nome.localeCompare(b.nome); });

async function generaCalendario(tid){
  if(!adminView()) return;
  var isc=iscrittiDi(tid);
  if(isc.length<2){ alert('Servono almeno 2 iscritti per generare il calendario.'); return; }
  if(partiteDi(tid).length){ alert('Il calendario è già stato generato.'); return; }
  if(!confirm('Genero il calendario del girone: '+(isc.length*(isc.length-1)/2)+' partite (tutti contro tutti). Il torneo passa "in corso".')) return;
  var nuove=[];
  for(var i=0;i<isc.length;i++) for(var j=i+1;j<isc.length;j++){
    nuove.push({torneo_id:tid,a_id:isc[i].autore_id,a_nome:isc[i].autore_nome,a_unita:isc[i].unita,b_id:isc[j].autore_id,b_nome:isc[j].autore_nome,b_unita:isc[j].unita,vincitore:null,stato:'da_giocare'});
  }
  openCal[tid]=true;
  if(DEMO){ nuove.forEach(function(p,k){ partiteTorneo.push(Object.assign({id:'pt'+Date.now()+k},p)); }); var t=tornei.find(function(x){return x.id===tid;}); if(t)t.stato='in_corso'; renderTornei(); return; }
  var res=await sb.from('partite_torneo').insert(nuove); if(res.error){ alert('Errore: '+res.error.message); return; }
  await sb.from('tornei').update({stato:'in_corso'}).eq('id',tid);
  await loadTornei(); renderTornei();
}

  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:1000';
  m.innerHTML='<div style="background:var(--surface);width:100%;max-width:440px;max-height:92vh;overflow:auto;border-radius:16px 16px 0 0;padding:16px 16px 22px">'+
    '<div style="font-size:18px;font-weight:600;margin-bottom:12px">Nuovo annuncio</div>'+
    '<label>Titolo</label><input id="an-tit" type="text" placeholder="es. Assemblea condominiale" style="margin:4px 0 10px;width:100%">'+
    '<label>Testo</label><textarea id="an-txt" rows="6" placeholder="Scrivi la comunicazione…" style="margin:4px 0 10px;width:100%;font-size:15px;line-height:1.4;min-width:0"></textarea>'+
    '<label style="display:flex;align-items:center;gap:8px;margin:6px 0;font-size:15px"><input id="an-imp" type="checkbox"> Segna come importante (resta in cima)</label>'+
    '<label style="display:block">Foto (facoltativa)</label><input id="an-foto-in" type="file" accept="image/*" style="display:none"><div id="an-prev" style="margin:6px 0"></div>'+
    '<div id="an-warn" style="color:var(--bad);font-size:14px;margin:4px 0;display:none"></div>'+
    '<div style="display:grid;grid-template-columns:1fr 2fr;gap:9px;margin-top:12px"><button id="an-x">Annulla</button><button class="btn-primary" id="an-ok">Pubblica</button></div></div>';
  document.querySelector('.wrap').appendChild(m);
  var blob=null;
  function addBtn(){ $('an-prev').innerHTML='<button type="button" id="an-add" style="width:100%;border:2px dashed var(--ok);color:var(--ok);background:var(--okbg);border-radius:10px;padding:12px">📷 Aggiungi foto</button>'; $('an-add').onclick=function(){$('an-foto-in').click();}; }
  addBtn();
  $('an-foto-in').onchange=function(e){ var f=e.target.files[0]; if(!f)return; downscale(f,function(b){ blob=b; $('an-prev').innerHTML='<img src="'+URL.createObjectURL(b)+'" style="width:90px;height:90px;object-fit:cover;border-radius:10px"> <button type="button" id="an-rm">Rimuovi</button>'; $('an-rm').onclick=function(){blob=null;addBtn();}; }); e.target.value=''; };
  $('an-x').onclick=function(){m.remove();};
  $('an-ok').onclick=async function(){
    var tit=($('an-tit').value||'').trim();
    if(!tit){ $('an-warn').textContent='Il titolo è obbligatorio.'; $('an-warn').style.display='block'; return; }
    var rec={titolo:tit,testo:($('an-txt').value||'').trim()||null,importante:$('an-imp').checked,autore_nome:(userNome||'Amministrazione'),autore_id:userId};
    if(DEMO){ annunci.unshift(Object.assign({id:'an'+Date.now(),created_at:new Date().toISOString(),foto_url:blob?URL.createObjectURL(blob):null},rec)); m.remove(); renderAnnunci(); return; }
    var btn=$('an-ok'); btn.disabled=true; btn.textContent='Pubblico…';
    try{
      if(blob){ var path='annunci/'+Date.now()+'.jpg'; var up=await sb.storage.from('foto').upload(path,blob,{contentType:'image/jpeg'}); if(up.error) throw up.error; rec.foto_url=sb.storage.from('foto').getPublicUrl(path).data.publicUrl; }
      var res=await sb.from('annunci').insert(rec); if(res.error) throw res.error;
      m.remove(); await loadAnnunci(); renderAnnunci();
    }catch(err){ $('an-warn').textContent='Errore: '+(err.message||err); $('an-warn').style.display='block'; btn.disabled=false; btn.textContent='Pubblica'; }
  };
}
async function eliminaAnnuncio(id){
  if(!confirm('Eliminare questo annuncio?')) return;
  if(DEMO){ annunci=annunci.filter(function(x){return String(x.id)!==String(id);}); renderAnnunci(); return; }
  var d=await sb.from('annunci').delete().eq('id',id); if(d.error){ alert('Errore: '+d.error.message); return; }
  await loadAnnunci(); renderAnnunci();
}
var views={zona:renderZona,bacheca:renderBacheca,dossier:renderDossier,voti:renderVoti,avvisi:renderAvvisi,piscina:renderPiscina,tennis:renderTennis,tornei:renderTornei,sala:renderSala,pacchi:renderPacchi,annunci:renderAnnunci,admin:renderAdmin};
var VIEW_LABEL={zona:'Controlla',bacheca:'Mappa',dossier:'Dossier',voti:'Voti',avvisi:'Avvisi',piscina:'Piscina',tennis:'Prenota',tornei:'Tornei',sala:'Feste',pacchi:'Pacchi',annunci:'Bacheca',admin:'Admin'};
var HUBS=[
  {id:'controllo',label:'Controllo',ic:'▤',views:['zona','bacheca','dossier','avvisi']},
  {id:'piscina',label:'Piscina',ic:'≈',views:['piscina'],seasonal:true},
  {id:'tennis',label:'Tennis',ic:'🎾',views:['tennis','tornei']},
  {id:'comunita',label:'Comunità',ic:'☑',views:['annunci','voti','sala']},
  {id:'pacchi',label:'Pacchi',ic:'📦',views:['pacchi']},
  {id:'admin',label:'Admin',ic:'★',views:['admin'],adminOnly:true}
];
function inStagione(){ var n=new Date(), y=n.getFullYear(); return n>=new Date(y,5,13) && n<=new Date(y,8,13,23,59,59); }
var curV='zona';
function hubOf(v){return HUBS.find(function(h){return h.views.indexOf(v)>=0})||HUBS[0];}
function isPoolStaff(){ return !!userRuolo && ['bagnino','gestore'].indexOf(userRuolo.trim().toLowerCase())>=0; }   // personale piscina: vive solo nel modulo Piscina
// "vista amministratore": l'admin è residente di default; i poteri/le viste admin compaiono SOLO quando ha attivato la modalità.
// isAdmin resta la CAPACITÀ dell'account (es. ricevere le push admin); adminView() è ciò che governa la PRESENTAZIONE.
function adminView(){ return isAdmin && adminMode; }
function toggleAdminView(){
  if(!isAdmin) return;
  adminMode=!adminMode;
  $('hsub').textContent = adminView() ? ((DEMO?'PROVA · ':'')+'🛠️ vista amministratore') : (DEMO?'MODALITÀ PROVA (senza login)':'Siamo tutti custodi');
  buildNav(); showBadge();
  if(adminView()){ curV='admin'; showView('admin'); }        // entrando in vista admin atterri sulla gestione
  else { if(curV==='admin') curV='zona'; showView(curV); }    // uscendo torni al Controllo
  updateAdminBadge();
}
function buildNav(){
  var nav=$('nav'); nav.innerHTML='';
  HUBS.forEach(function(h){
    if(h.adminOnly && !adminView()) return;
    if(h.seasonal && !inStagione() && !isPoolStaff()) return;   // condòmini: Piscina solo in stagione; personale piscina: sempre (gestisce anche l'inverno)
    if(isPoolStaff() && h.id!=='piscina') return;                // PRIVILEGI: bagnino/gestore vedono SOLO l'hub Piscina
    var b=document.createElement('button'); b.dataset.hub=h.id;
    if(h.id==='admin') b.id='nav-admin';
    b.innerHTML='<span class="ic">'+h.ic+'</span>'+h.label;
    b.onclick=function(){ showView(h.views.indexOf(curV)>=0?curV:h.views[0]); };
    nav.appendChild(b);
  });
  updatePacchiBadge();
}
function showView(v){
  if(!views[v]) v='zona';
  if(v==='admin' && !adminView()) v='zona';   // la vista admin è raggiungibile solo in modalità amministratore
  curV=v; var hub=hubOf(v);
  $('nav').querySelectorAll('button').forEach(function(b){b.classList.toggle('active', b.dataset.hub===hub.id);});
  var sn=$('subnav');
  if(hub.views.length>1){
    sn.style.display='flex';
    sn.innerHTML=hub.views.map(function(x){return '<button class="subchip'+(x===v?' active':'')+'" data-v="'+x+'">'+VIEW_LABEL[x]+'</button>';}).join('');
    sn.querySelectorAll('.subchip').forEach(function(b){b.onclick=function(){showView(b.dataset.v);};});
  } else { sn.style.display='none'; sn.innerHTML=''; }
  Object.keys(views).forEach(function(k){ var el=$('view-'+k); if(el) el.classList.toggle('hide',k!==v); });
  views[v]();
}
function renderAll(){ if(isPoolStaff() && hubOf(curV).id!=='piscina') curV='piscina'; showView(curV); }

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(function(){})}
init();
</script>

<style>
#installbar{position:fixed;left:50%;bottom:calc(78px + env(safe-area-inset-bottom,0px));transform:translateX(-50%) translateY(18px);z-index:1500;opacity:0;pointer-events:none;transition:.25s;max-width:94%}
#installbar.on{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
#installwrap{display:flex;align-items:center;gap:4px;background:#1d9e75;border-radius:999px;box-shadow:0 6px 22px rgba(0,0,0,.28)}
#installbtn{background:none;color:#fff;border:none;border-radius:999px;padding:14px 18px;font-size:16px;font-weight:600;cursor:pointer;white-space:nowrap}
#installx{background:none;border:none;color:rgba(255,255,255,.85);font-size:20px;line-height:1;padding:0 16px 0 0;cursor:pointer}
.iosguide{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;display:flex;align-items:center;justify-content:center;padding:18px}
.ig-card{background:#fff;border-radius:16px;padding:22px;max-width:420px;width:100%;color:#1c1c1a;box-shadow:0 12px 40px rgba(0,0,0,.3)}
.ig-h{font-size:20px;font-weight:700;margin-bottom:10px}
.iosguide p{font-size:16px;margin:0 0 8px}
.iosguide ol{margin:6px 0 4px;padding-left:22px}
.iosguide li{font-size:17px;line-height:1.75;margin-bottom:8px}
.ig-ic{display:inline-flex;vertical-align:middle;background:#e6f1fb;border-radius:7px;padding:3px;margin:0 2px}
.ig-x{margin-top:14px;width:100%;background:#1d9e75;color:#fff;border:none;border-radius:10px;padding:13px;font-size:17px;font-weight:600;cursor:pointer}
.ig-copy{width:100%;background:#185fa5;color:#fff;border:none;border-radius:10px;padding:13px;font-size:17px;font-weight:600;cursor:pointer}
.ig-copy.ok{background:#1d9e75}
</style>
<script>
/* Installa sulla Home — Android: prompt nativo · iOS: guida (Apple non consente install automatica) */
(function(){
  var standalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone===true;
  if(standalone)return;                 // già installata: niente bottone
  if(localStorage.getItem('installHidden')==='1')return;
  var ua=navigator.userAgent||'';
  var isIOS=/iphone|ipad|ipod/i.test(ua)||(navigator.platform==='MacIntel'&&navigator.maxTouchPoints>1);
  var isSafari=/safari/i.test(ua)&&!/(chrome|crios|fxios|edgios|android)/i.test(ua);
  var deferred=null;
  function build(){
    if(document.getElementById('installbar'))return;
    var bar=document.createElement('div');bar.id='installbar';
    bar.innerHTML='<div id="installwrap"><button id="installbtn">📲 Installa l\'app sul telefono</button><button id="installx" title="Nascondi">×</button></div>';
    document.body.appendChild(bar);
    document.getElementById('installx').onclick=function(){bar.classList.remove('on');localStorage.setItem('installHidden','1');};
    document.getElementById('installbtn').onclick=function(){
      if(deferred){deferred.prompt();deferred.userChoice.then(function(r){if(r&&r.outcome==='accepted'){bar.classList.remove('on');}deferred=null;});return;}
      if(isIOS&&!isSafari){safariGuide();return;}   // iPhone con Chrome/Firefox/altro: serve Safari
      iosGuide(!isIOS);                              // iPhone Safari (passi diretti) o desktop (generico)
    };
    return bar;
  }
  function show(){var b=build();setTimeout(function(){b.classList.add('on');},30);}
  function iosGuide(generic){
    var ov=document.createElement('div');ov.className='iosguide';
    var share='<span class="ig-ic"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#185fa5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V4"/><path d="M8 8l4-4 4 4"/><path d="M5 11v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-7"/></svg></span>';
    var plus='<span class="ig-ic"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#185fa5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3"/><path d="M12 8v8M8 12h8"/></svg></span>';
    ov.innerHTML='<div class="ig-card"><div class="ig-h">Aggiungi alla schermata Home</div>'+
      (generic?'<p>Apri questa pagina su <b>Safari</b> dal tuo iPhone, poi segui questi passi:</p>':'')+
      '<ol><li>Tocca il pulsante <b>Condividi</b> '+share+' in basso</li>'+
      '<li>Scorri e scegli <b>«Aggiungi a Home»</b> '+plus+'</li>'+
      '<li>Tocca <b>Aggiungi</b> in alto a destra</li></ol>'+
      '<button class="ig-x">Ho capito</button></div>';
    ov.onclick=function(e){if(e.target===ov||e.target.classList.contains('ig-x'))ov.remove();};
    document.body.appendChild(ov);
  }
  function safariGuide(){   // iPhone con browser ≠ Safari: l'installazione esiste solo in Safari
    var isChrome=/crios/i.test(ua);
    var url=location.href.split('#')[0];
    var ov=document.createElement('div');ov.className='iosguide';
    ov.innerHTML='<div class="ig-card"><div class="ig-h">Apri in Safari per installare</div>'+
      '<p>Su iPhone, l\'app si aggiunge alla Home solo da <b>Safari</b>. Apri questa pagina lì, poi tocca Condividi → «Aggiungi a Home».</p>'+
      '<button class="ig-copy" id="ig-copy">Copia il link</button>'+
      (isChrome?'<p style="margin-top:12px">Scorciatoia su Chrome: tocca <b>⋯</b> in basso a destra e scegli <b>«Apri in Safari»</b>.</p>'
               :'<p style="margin-top:12px">Poi apri <b>Safari</b>, incolla il link nella barra e vai.</p>')+
      '<button class="ig-x">Ho capito</button></div>';
    ov.onclick=function(e){if(e.target===ov||e.target.classList.contains('ig-x'))ov.remove();};
    document.body.appendChild(ov);
    document.getElementById('ig-copy').onclick=function(){var b=this;
      function done(){b.textContent='✓ Link copiato';b.classList.add('ok');}
      if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(done,function(){prompt('Copia il link:',url);});}
      else{prompt('Copia il link:',url);}
    };
  }
  window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferred=e;show();});  // Android/Chrome
  window.addEventListener('appinstalled',function(){var b=document.getElementById('installbar');if(b)b.classList.remove('on');deferred=null;});
  if(isIOS){window.addEventListener('load',show);}                                                    // iPhone: Safari (guida install) o altro browser (guida Safari)
})();
</script>
