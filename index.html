<title>Oasi delle Palme</title>
<style>
  :root{
    /* === Design system «Laguna» (VC451 · Oasi delle Palme) — tokens/colors.css === */
    --bg:#F6F5F1; --surface:#FFFFFF; --line:#E6E4DC; --line2:#C7C4B8; --traccia:#ECEAE2;
    --txt:#1B2421; --muted:#5C6663; --hint:#8B948F;
    --ok:#0B7A69; --okbg:#E9F3F0; --okdark:#075E51;   /* brand verde-acqua (ok = brand + azione) */
    --bad:#A03127; --badbg:#F7E7E4; --todo:#59625E; --todobg:#ECEEEC;
    --ocra:#7A5E12; --ocrabg:#F4ECD6;
    --info:#0A6E9C; --infobg:#E2F0F7; --r:13px; --r2:20px;
    /* stati Controllo — SOLO nelle capsule bordate con glifo (mai come tinta d'area) */
    --st-fatto:#237A46; --st-fatto-ink:#1C6139; --st-problema:#B3362C; --st-problema-ink:#A03127;
    --st-finestra:#6E7773; --st-finestra-ink:#59625E; --st-scaduta:#96741B; --st-scaduta-ink:#7A5E12;
    --glass:rgba(255,255,255,.72); --glassblur:blur(20px) saturate(1.6);
    --okc:#FFFFFF; --infoc:#FFFFFF;               /* testo su brand/info pieni */
    --okbr:rgba(11,122,105,.45);                  /* bordo ghost brand */
    --grad:linear-gradient(150deg,#8FDDE8 0%,#4FB6D6 50%,#3D9E6B 100%);
    --hglass:rgba(255,255,255,.85); --hglassb:rgba(255,255,255,.7); --hglasshi:rgba(255,255,255,.9);
    --badgebg:#BC5430; --badgefg:#FFFFFF;
    --segtrack:rgba(27,36,33,.07);
    /* inchiostri e tinte d'AREA (tokens/colors.css chiaro) */
    --ink-comunita:#9E4526; --abg-comunita:#F3E5DF; --tint-comunita:rgba(188,84,48,.13);
    --ink-piscina:#08678F;  --abg-piscina:#E1EFF5;  --tint-piscina:rgba(14,126,176,.12);
    --ink-tennis:#8A6410;   --abg-tennis:#F5EEDA;   --tint-tennis:rgba(242,194,29,.2);
    --ink-verde:#2F6E2C;    --abg-verde:#E6EFE4;    --tint-verde:rgba(62,125,58,.13);
    --ink-pacchi:#5F5346;   --abg-pacchi:#EEEBE6;   --tint-pacchi:rgba(110,97,82,.13);
    --infobr:rgba(10,110,156,.45);
    color-scheme:light;
  }
  /* ── tema scuro «notte-oasi» (tokens/colors.css dark) — segue il tema del telefono ── */
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#0D1513; --surface:#17211E; --line:#26322D; --line2:#3A4741; --traccia:#243029;
      --txt:#EDEFEA; --muted:#9CA8A3; --hint:#8B978F;
      --ok:#3BC2AC; --okbg:rgba(59,194,172,.14); --okdark:#5ECDB9; --okc:#06231D; --okbr:rgba(59,194,172,.45);
      --bad:#E87368; --badbg:rgba(232,115,104,.13); --todo:#AEB9B3; --todobg:rgba(147,160,154,.14);
      --ocra:#DDB856; --ocrabg:rgba(210,169,60,.14);
      --info:#56C4E8; --infobg:rgba(86,196,232,.14); --infoc:#062330;
      --st-fatto-ink:#8FDCA9; --st-problema-ink:#F09186; --st-finestra-ink:#AEB9B3; --st-scaduta-ink:#DDB856;
      --glass:rgba(23,33,30,.72);
      --grad:linear-gradient(150deg,#0E2C38 0%,#134250 50%,#0E3A2A 100%);
      --hglass:rgba(16,26,23,.72); --hglassb:rgba(255,255,255,.16); --hglasshi:rgba(255,255,255,.18);
      --badgebg:#E8906B; --badgefg:#2A130A;
      --segtrack:rgba(255,255,255,.08);
      --ink-comunita:#F0A986; --abg-comunita:rgba(232,144,107,.16); --tint-comunita:rgba(232,144,107,.16);
      --ink-piscina:#56C4E8;  --abg-piscina:rgba(86,196,232,.15);   --tint-piscina:rgba(86,196,232,.15);
      --ink-tennis:#F5CB3D;   --abg-tennis:rgba(245,203,61,.15);    --tint-tennis:rgba(245,203,61,.15);
      --ink-verde:#7CC178;    --abg-verde:rgba(124,193,120,.15);    --tint-verde:rgba(124,193,120,.15);
      --ink-pacchi:#B3A797;   --abg-pacchi:rgba(179,167,151,.15);   --tint-pacchi:rgba(179,167,151,.15);
      --infobr:rgba(86,196,232,.45);
      color-scheme:dark;
    }
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,system-ui,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;font-size:17px;line-height:1.5}
  .wrap{max-width:440px;margin:0 auto;padding:14px 14px 90px}
  header{margin:-14px -14px 12px;padding:calc(env(safe-area-inset-top,0px) + 10px) 12px 14px;background:var(--grad);border-radius:0 0 24px 24px;box-shadow:0 12px 26px -14px rgba(8,32,26,.42)}
  .head-glass{display:flex;align-items:center;gap:10px;background:var(--hglass);backdrop-filter:blur(20px) saturate(1.7);-webkit-backdrop-filter:blur(20px) saturate(1.7);border:1px solid var(--hglassb);border-radius:16px;padding:8px 10px;box-shadow:inset 0 1px 0 var(--hglasshi)}
  .logo{width:38px;height:38px;border-radius:var(--r);background:var(--okbg);color:var(--ok);display:flex;align-items:center;justify-content:center;font-size:24px;flex:none}
  h1{font-size:21px;font-weight:600;margin:0}
  .sub{font-size:15px;color:var(--muted);margin:0}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);padding:12px 14px;margin-bottom:9px}
  label{font-size:15px;color:var(--muted)}
  select,input,textarea,button{font:inherit}
  select,input[type=text],input[type=email],input[type=date],textarea{width:100%;padding:13px 13px;border:.5px solid var(--line2);border-radius:var(--r);background:var(--surface);color:var(--txt);margin-top:5px;font-size:17px}
  button{cursor:pointer;border:.5px solid var(--line2);background:var(--surface);color:var(--txt);border-radius:var(--r);padding:13px 16px;font-size:17px}
  button:active{transform:scale(.98)}
  .btn-primary{background:var(--ok);color:var(--okc);border-color:var(--ok);font-weight:700;width:100%;border-radius:14px;min-height:44px}
  .btn-primary:active{background:var(--okdark)}
  .row{display:flex;align-items:center;gap:10px}
  .pill{font-size:14px;padding:3px 10px;border-radius:999px;display:inline-flex;align-items:center;gap:4px;font-weight:700}
  .metrics{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
  .metric{background:var(--surface);border:.5px solid var(--line);border-radius:var(--r);padding:9px 11px}
  .metric .n{font-size:27px;font-weight:600;margin:2px 0 0}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .tile{padding:9px 10px;border-radius:var(--r);border:.5px solid;text-align:left;display:flex;flex-direction:column;gap:3px}
  .src{font-size:14px;color:var(--hint)}
  nav{position:fixed;left:0;right:0;bottom:0;background:var(--glass);backdrop-filter:var(--glassblur);-webkit-backdrop-filter:var(--glassblur);border-top:.5px solid var(--line);display:flex;max-width:440px;margin:0 auto}
  nav button{flex:1;min-width:0;border:none;background:none;border-radius:0;padding:10px 2px;color:var(--muted);font-size:14px;display:flex;flex-direction:column;align-items:center;gap:3px}
  nav button.active{color:var(--area,var(--ok))}
  nav button{position:relative}
  nav button.active::after{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:3px;border-radius:0 0 3px 3px;background:var(--area,var(--ok))}
  nav .ic{font-size:24px}
  #subnav{display:flex;gap:8px;padding:10px 12px 2px;overflow-x:auto}
  #subnav .subchip{flex:none;border:1px solid var(--line);background:var(--surface);color:var(--muted);border-radius:999px;padding:6px 15px;font-size:14px;font-weight:500}
  #subnav .subchip.active{background:var(--areabg,var(--okbg));border-color:var(--area,var(--ok));color:var(--area,var(--ok))}
  .navbadge{position:absolute;top:4px;right:calc(50% - 26px);min-width:18px;height:18px;padding:0 4px;border-radius:9px;background:var(--badgebg);color:var(--badgefg);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1}
  .hide{display:none}
  .seg{flex:none;padding:10px 16px;font-size:16px}
  .photo-thumb{width:46px;height:46px;border-radius:var(--r);object-fit:cover;border:.5px solid var(--line)}
  .empty{color:var(--hint);font-size:16px;text-align:center;padding:18px}
  .spin{color:var(--hint);font-size:16px;text-align:center;padding:24px}
  /* === Componenti design system «Laguna» (design-vc451) === */
  .vhead{padding:2px 4px 10px}
  .vhead h2{font-size:28px;font-weight:800;letter-spacing:-.02em;margin:0;line-height:1.12}
  .vhead .s{font-size:17px;color:var(--muted);margin-top:3px;line-height:1.35}
  .mlabel{font-size:12.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:14px 4px 8px}
  .statbig{font-size:32px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1}
  .statbig u{font-style:normal;text-decoration:none;font-size:16px;font-weight:600;color:var(--muted);margin-left:4px}
  .prog{height:8px;border-radius:4px;background:var(--traccia);overflow:hidden;margin-top:9px}
  .prog>i{display:block;height:100%;border-radius:4px;background:var(--area,var(--ok))}
  /* capsule dei 4 stati del Controllo: pill con bordo + glifo (✓ ✕ ○ !) — forma dedicata agli STATI */
  .stcap{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:999px;white-space:nowrap;font-size:13px;font-weight:700}
  .stcap-fatto{background:rgba(35,122,70,.12);border:1px solid rgba(35,122,70,.45);color:var(--st-fatto-ink)}
  .stcap-problema{background:rgba(179,54,44,.10);border:1px solid rgba(179,54,44,.45);color:var(--st-problema-ink)}
  .stcap-finestra{background:rgba(110,119,115,.12);border:1px solid rgba(110,119,115,.45);color:var(--st-finestra-ink)}
  .stcap-scaduta{background:rgba(150,116,27,.13);border:1px solid rgba(150,116,27,.5);color:var(--st-scaduta-ink)}
  /* quadrotto icona d'area: 44×44, raggio 14, tinta d'area 12-20% (via --tint inline) */
  .itile{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:21px;flex:none;background:var(--tint,var(--okbg))}
  /* tile modulo per la Home */
  .mtile{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--r2);padding:14px;display:flex;flex-direction:column;gap:8px;cursor:pointer;text-align:left;font-family:inherit;color:var(--txt)}
  .mtile.hor{grid-column:1/-1;flex-direction:row;align-items:center;gap:12px}
  .mtile .t{font-size:17px;font-weight:700}
  .mtile .st{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;margin-top:1px}
  .mtile .mbadge{position:absolute;top:10px;right:10px;min-width:20px;height:20px;border-radius:10px;background:var(--badgebg);color:var(--badgefg);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px}
  .mtile.hor .mbadge{position:static;flex:none}
  /* segmented control (design system): binario testo-7%, segmento attivo bianco con ombra */
  .segw{display:flex;background:var(--segtrack);border-radius:13px;padding:3px;margin:13px 0 4px}
  .segw button{flex:1;min-height:44px;padding:8px 4px;border:none;border-radius:10px;background:transparent;color:var(--muted);font-size:14px;font-weight:600}
  .segw button.on{background:var(--surface);box-shadow:0 1px 4px rgba(20,30,26,.14);color:var(--txt);font-weight:700}
  /* fonte cliccabile → apre il contratto */
  .src-link{background:none;border:none;padding:0;margin-top:6px;color:var(--info);font-size:14px;text-decoration:underline;text-underline-offset:2px;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
  /* pagina a tutta schermo (presentazione + contratto) */
  .page{position:fixed;inset:0;z-index:2100;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch}
  .page-in{max-width:480px;margin:0 auto;padding:18px 16px calc(28px + env(safe-area-inset-bottom,0px))}
  .page-top{position:sticky;top:0;background:var(--bg);display:flex;align-items:center;gap:10px;padding:6px 0 12px;margin-bottom:6px;border-bottom:.5px solid var(--line)}
  .page-x{flex:none;width:40px;height:40px;border-radius:50%;border:.5px solid var(--line2);background:var(--surface);font-size:22px;line-height:1;padding:0}
  .page-h{font-size:20px;font-weight:700;margin:0}
  .cap-item{background:var(--surface);border:.5px solid var(--line);border-radius:var(--r2);padding:13px 14px;margin-bottom:9px;scroll-margin-top:64px}
  .cap-item.hl{border-color:var(--ok);box-shadow:0 0 0 2px var(--okbg);animation:hlpulse 1.6s ease-out}
  @keyframes hlpulse{0%{box-shadow:0 0 0 3px var(--ok)}100%{box-shadow:0 0 0 2px var(--okbg)}}
  .cap-grp{font-size:12.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:18px 4px 8px}
  .lead{font-size:17px;line-height:1.55;color:var(--txt);margin:0 0 12px}
  .pres-step{display:flex;gap:11px;align-items:flex-start;margin:0 0 12px}
  .pres-n{flex:none;width:30px;height:30px;border-radius:50%;background:var(--okbg);color:var(--ok);font-weight:700;display:flex;align-items:center;justify-content:center;font-size:16px}
  .pres-note{background:var(--infobg);border-radius:var(--r2);padding:13px 14px;font-size:16px;line-height:1.5;color:var(--txt);margin:14px 0}
  /* override dark di CLASSE — devono stare DOPO le definizioni base (cascata a pari specificità) */
  @media (prefers-color-scheme: dark){
    .stcap-fatto{background:rgba(111,207,143,.14);border-color:rgba(111,207,143,.4)}
    .stcap-problema{background:rgba(232,115,104,.13);border-color:rgba(232,115,104,.4)}
    .stcap-finestra{background:rgba(147,160,154,.14);border-color:rgba(147,160,154,.4)}
    .stcap-scaduta{background:rgba(210,169,60,.14);border-color:rgba(210,169,60,.42)}
    .segw button.on{background:#223029;box-shadow:0 1px 4px rgba(0,0,0,.35)}
  }
</style>
</head>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';
const sb = createClient(window.SUPA_URL, window.SUPA_KEY);
const DEMO = location.search.indexOf('demo')>=0;  // ?demo=1 → prova l'interfaccia senza login (dati finti, niente email)
const APP_VERSION = 'v110';   // mostrata in "I miei dati"; tienila allineata a CACHE in sw.js
const VAPID_PUBLIC = 'BE36pywDqgkv7C2IMRojjCei_DMZ6m28-SP5qin1QyKugzBBsrc4PMxwpxxcYS74Uo9s4bq0L73QuO5RTM5fedo';  // chiave push pubblica (Web Push)

let userId=null, userNome=null, userUnita=null, userEmail=null, userStato=null, isAdmin=false, reports=[], comments=[], avvisi=[], userMorosita=null, analisiAcqua=[], compitiOggi=[], compitiStorico=[], presenze=[], magazzino=[], richieste=[], openThreads={}, curArea='', adminMode=false, prenotazioniTennis=[], curGiornoTennis=0, tornei=[], iscrizioniTorneo=[], partiteTorneo=[], openCal={}, prenotazioniSala=[], pacchi=[], annunci=[], openAnnunci={};   // curArea vuoto = nessun luogo scelto; adminMode = "vista admin" attiva (default OFF: l'admin vive come residente); curGiornoTennis 0=oggi 1=domani; openCal = tornei col calendario espanso
let userRuolo=null, isSuper=false, puoSegnalare=true;   // ruolo non-condòmino (custode/avvocato…), superadmin, gating segnalazioni
function canSegnalare(){ return approvato() && puoSegnalare; }
async function logLogin(){   // registra l'accesso (una volta per sessione browser)
  if(DEMO || !userEmail) return;
  try{
    if(sessionStorage.getItem('logged_'+userEmail)==='1') return;
    sessionStorage.setItem('logged_'+userEmail,'1');
    var r = userRuolo || (userUnita ? ('Pal. '+userUnita.palazzina+' int '+userUnita.interno) : 'condòmino');
    await sb.from('logs').insert({ email:userEmail, nome:userNome||userEmail, ruolo:r, evento:'accesso' });
  }catch(e){}
}
let UNITA_LIST=null;
function approvato(){return userStato==='approvato'}
async function loadUnitaList(){
  if(UNITA_LIST) return UNITA_LIST;
  if(DEMO){ UNITA_LIST=[{unita:'I/08',palazzina:'I',interno:'8'}]; return UNITA_LIST; }
  var res=await sb.from('unita_pubbliche').select('unita,palazzina,interno');
  UNITA_LIST=(res.data||[]).slice().sort(function(a,b){return a.unita<b.unita?-1:1});
  return UNITA_LIST;
}
function findUnitaCode(pal,intr){var u=(UNITA_LIST||[]).find(function(x){return x.palazzina===pal&&String(x.interno)===String(intr)});return u?u.unita:null;}
// Insieme delle unità GIÀ REGISTRATE (stato != libero) → nel picker si mostrano non selezionabili
var TAKEN_SET=null;
async function loadTaken(){
  if(TAKEN_SET) return TAKEN_SET;
  if(DEMO){ TAKEN_SET=new Set(); return TAKEN_SET; }
  try{ var r=await sb.from('anagrafica').select('unita,stato'); TAKEN_SET=new Set((r.data||[]).filter(function(x){return x.stato&&x.stato!=='libero'}).map(function(x){return x.unita})); }
  catch(e){ TAKEN_SET=new Set(); }
  return TAKEN_SET;
}
const meseOggi=new Date().getMonth()+1;
const $=function(id){return document.getElementById(id)};
function esc(s){return (s||'').replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
// URL sicura per attributi src/href: solo http(s)/data-image, altrimenti stringa vuota (blocca javascript:, ecc.)
function safeUrl(u){ u=(u||'').trim(); return (/^https?:\/\//i.test(u)||/^data:image\//i.test(u)||/^blob:/i.test(u))?u:''; }
function fmt(iso){var d=new Date(iso);return d.toLocaleDateString('it-IT')+' '+d.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'})}
function oggiLabel(){return new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'})}
function applicabile(s){return !s.mesi||s.mesi.indexOf(meseOggi)>=0}

/* ---------- FINESTRE DI VERIFICA (nota 18) ----------
   Ogni servizio ha una finestra (giorno/settimana/decade/mese/stagione): la verifica
   vive DENTRO la finestra e si CHIUDE alla sua scadenza. Niente "non fatto" prima della
   scadenza → niente penali Art.5 applicate male. Le segnalazioni sono bucketizzate per periodo. */
function pad2(n){return (n<10?'0':'')+n}
var MESINOMI=['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
function isoWeek(d){var t=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));var day=(t.getUTCDay()+6)%7;t.setUTCDate(t.getUTCDate()-day+3);var firstThu=new Date(Date.UTC(t.getUTCFullYear(),0,4));var week=1+Math.round(((t-firstThu)/86400000-3+((firstThu.getUTCDay()+6)%7))/7);return [t.getUTCFullYear(),week];}
function endOfWeek(d){var x=new Date(d);var day=(x.getDay()+6)%7;x.setDate(x.getDate()+(6-day));x.setHours(23,59,59,0);return x;}
function decadeOf(d){var g=d.getDate();return g<=10?1:g<=20?2:3;}
function endOfDecade(d){var n=decadeOf(d),y=d.getFullYear(),m=d.getMonth();if(n===1)return new Date(y,m,10,23,59,59);if(n===2)return new Date(y,m,20,23,59,59);return new Date(y,m+1,0,23,59,59);}
function endOfMonth(d){return new Date(d.getFullYear(),d.getMonth()+1,0,23,59,59);}
function dscad(e){var oggi=new Date(),dom=new Date(oggi);dom.setDate(dom.getDate()+1);
  if(e.toDateString()===oggi.toDateString())return 'oggi';
  if(e.toDateString()===dom.toDateString())return 'domani';
  return e.toLocaleDateString('it-IT',{weekday:'short',day:'numeric',month:'short'});}
function startOfWeek(d){var x=new Date(d);var day=(x.getDay()+6)%7;x.setDate(x.getDate()-day);x.setHours(0,0,0,0);return x;}
// Finestra corrente del servizio s; null se fuori stagione (mese non attivo). ap = apertura, scad = scadenza.
function windowOf(s,d){d=d||new Date();var m=d.getMonth()+1,y=d.getFullYear();
  if(s.mesi&&s.mesi.indexOf(m)<0)return null;
  var t=s.win||'W';
  if(t==='D'){var e=new Date(y,d.getMonth(),d.getDate(),23,59,59);return {id:y+'-'+pad2(m)+'-'+pad2(d.getDate()),ap:new Date(y,d.getMonth(),d.getDate(),0,0,0),scad:e,label:'oggi'};}
  if(t==='X10'){var n=decadeOf(d),e=endOfDecade(d),ap=new Date(y,d.getMonth(),n===1?1:n===2?11:21,0,0,0);return {id:y+'-'+pad2(m)+'-D'+n,ap:ap,scad:e,label:'entro '+dscad(e)};}
  if(t==='M'){var e=endOfMonth(d);return {id:y+'-'+pad2(m),ap:new Date(y,d.getMonth(),1,0,0,0),scad:e,label:'entro fine '+MESINOMI[d.getMonth()]};}
  if(t==='S'){var last=s.mesi?Math.max.apply(null,s.mesi):12,first=s.mesi?Math.min.apply(null,s.mesi):1,e=new Date(y,last,0,23,59,59);return {id:y+'-S'+pad2(first),ap:new Date(y,first-1,1,0,0,0),scad:e,label:'entro fine '+MESINOMI[last-1]};}
  var w=isoWeek(d),e=endOfWeek(d);return {id:w[0]+'-W'+pad2(w[1]),ap:startOfWeek(d),scad:e,label:'entro '+dscad(e)};   // 'W' default
}
// Finestra immediatamente precedente (o null se prima dell'avvio del controllo / non esiste in stagione)
function prevWindowOf(s,d){d=d||new Date();var cur=windowOf(s,d);if(!cur)return null;
  var before=new Date(cur.ap.getTime()-86400000);
  for(var k=0;k<400;k++){var w=windowOf(s,before);if(w&&w.id!==cur.id)return w;before=new Date(before.getTime()-86400000);}
  return null;
}
// Esito di una finestra PASSATA: 'ok'=fatto confermato · 'problema'=segnalato · 'ocra'=scaduta SENZA controllo (vale come fatta)
function periodOutcome(area,sid,periodId){
  var rs=reports.filter(function(x){return x.area===area&&x.servizio===sid&&(x.periodo||'')===periodId;});
  if(rs.some(function(r){return r.stato==='problema'}))return 'problema';
  if(rs.some(function(r){return r.stato==='ok'}))return 'ok';
  return 'ocra';   // nessuna segnalazione su finestra scaduta → potenzialmente fatto, non confermato, ma comunque fatto
}
function curPeriodo(sid){var s=CAPITOLATO_VERDE.find(function(x){return x.id===sid});var w=s?windowOf(s):null;return w?w.id:'';}

// Finestre PASSATE di un servizio (esclusa la corrente) da fromDate a oggi → per la lista ocra a 5 settimane
function pastWindows(s,fromDate){
  var out=[],seen={},guard=0,cur=windowOf(s),probe=new Date((cur?cur.ap.getTime():Date.now())-86400000);
  while(guard++<420){
    if(probe<fromDate) break;
    var w=windowOf(s,probe);
    if(w && !seen[w.id] && (!cur||w.id!==cur.id)){ seen[w.id]=1; if(w.scad>=fromDate) out.push(w); }
    probe=new Date((w?w.ap.getTime():probe.getTime())-86400000);
  }
  return out;
}
// Penale Art.5 per una segnalazione di PROBLEMA su servizio settimanale+ (NO giornaliero): €100 + €30/giorno di ritardo
// dalla scadenza della finestra del report fino a oggi. null se non penalizzabile.
var PEN_BASE=100, PEN_DAY=30;
function penaleOf(r){
  var s=srvById(r.servizio); if(!s||s.win==='D') return null;   // i giornalieri non generano penale
  if(r.stato!=='problema' || r.risolto) return null;            // solo problemi APERTI
  var w=windowOf(s,new Date(r.created_at)); if(!w) return null;
  var giorni=Math.floor((Date.now()-w.scad.getTime())/86400000);
  if(giorni<0) return null;                                     // finestra ancora aperta → non ancora inadempimento
  return { giorni:giorni, euro: PEN_BASE + PEN_DAY*giorni };
}
// stato/segnalazioni SCOPED al periodo corrente (per la vista Zona)
function latestP(area,sid){var pid=curPeriodo(sid);var r=reports.filter(function(x){return x.area===area&&x.servizio===sid&&(x.periodo||'')===pid});return r[0]||null;}
function myReportP(area,sid){var pid=curPeriodo(sid);return reports.find(function(x){return x.autore_id===userId&&x.area===area&&x.servizio===sid&&(x.periodo||'')===pid})||null;}
// pill: problema aperto (qualsiasi periodo, finché non risolto) prevale; poi "fatto" del periodo; poi da verificare
function pillStato(area,sid){
  if(reports.some(function(r){return r.area===area&&r.servizio===sid&&isOpen(r)}))return 'problema';
  var l=latestP(area,sid);return (l&&l.stato==='ok')?'ok':'todo';
}

// Lega l'utente alla sua unità. Più comproprietari possono condividere la stessa unità:
// il PRIMO è il "primario" (proprietari.autore_id); gli altri si uniscono come coproprietari.
// La firma è sempre il NOME DELL'UNITÀ. Ritorna {row, stato, isCo, blocked, motivo}.
async function claimUnita(unita){
  var res=await sb.from('anagrafica').select('*').eq('unita',unita).maybeSingle();
  var row=res.data;
  if(!row) return { blocked:true, motivo:'Unità '+unita+' non trovata nell\'elenco proprietari.', row:{unita:unita} };
  if(!row.autore_id){
    var up=await sb.from('proprietari').update({autore_id:userId,email:userEmail,stato:'in_attesa'}).eq('unita',unita).is('autore_id',null).select().maybeSingle();
    if(up.data) return { blocked:false, row:up.data, stato:up.data.stato };
    var re=await sb.from('anagrafica').select('*').eq('unita',unita).maybeSingle(); row=re.data||row;   // qualcuno ha appena preso il primario
  }
  if(row.autore_id===userId) return { blocked:false, row:row, stato:row.stato };   // sono il primario
  // unità già col primario di un altro → mi unisco come COMPROPRIETARIO (in attesa di approvazione)
  var co=await sb.from('coproprietari').select('*').eq('unita',unita).eq('autore_id',userId).maybeSingle();
  if(!co.data){
    var ins=await sb.from('coproprietari').upsert({unita:unita,autore_id:userId,email:userEmail,stato:'in_attesa'},{onConflict:'unita,autore_id'}).select().maybeSingle();
    if(ins.error) return { blocked:true, motivo:'Errore nell\'unirti all\'unità '+unita+': '+ins.error.message, row:row };
    co.data=ins.data;
  }
  return { blocked:false, row:row, stato:(co.data&&co.data.stato)||'in_attesa', isCo:true };
}

async function eliminaAccount(menuEl){
  var c=prompt('Questa azione è IRREVERSIBILE: chiude il tuo accesso e libera la tua unità (le segnalazioni che hai inviato RESTANO, firmate col tuo nome).\n\nPer confermare, scrivi la parola:  ELIMINA');
  if(c===null) return;                                                  // ha annullato
  if(c.trim().toUpperCase()!=='ELIMINA'){ alert('Non hai scritto ELIMINA: operazione annullata, il tuo account è al sicuro.'); return; }
  if(DEMO){ alert('In modalità prova non c\'è un account da eliminare.'); return; }
  // 1) cancellazione completa via edge function (login Auth + appartamento), se attiva
  try{
    var r=await sb.functions.invoke('elimina-account');
    if(r && !r.error){ await sb.auth.signOut(); alert('Account eliminato. Le tue segnalazioni restano nel dossier. A presto!'); location.reload(); return; }
  }catch(e){ /* function non ancora deployata → fallback */ }
  // 2) fallback: libera almeno l'appartamento (il login Auth resta finché non deployi la edge function)
  var up=await sb.from('proprietari').update({stato:'libero',autore_id:null,email:null}).eq('autore_id',userId);
  if(up.error){ alert('Errore: '+up.error.message+'\n\nServe la migrazione migrate_v7 sul database.'); return; }
  await sb.auth.signOut();
  alert('Account eliminato. Le tue segnalazioni restano nel dossier. A presto!');
  location.reload();
}

function urlB64ToUint8(b64){ var pad='='.repeat((4-b64.length%4)%4); var s=(b64+pad).replace(/-/g,'+').replace(/_/g,'/'); var raw=atob(s); var arr=new Uint8Array(raw.length); for(var i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i); return arr; }
async function attivaNotifiche(){
  if(DEMO){ alert('In modalità prova le notifiche non si attivano.'); return; }
  if(!('serviceWorker' in navigator) || !('PushManager' in window) || !('Notification' in window)){
    alert('Le notifiche non sono supportate qui.\n\nSu iPhone funzionano SOLO se hai installato l\'app sulla Home (col bottone «Installa») e con iOS 16.4 o successivo.'); return; }
  try{
    var perm=await Notification.requestPermission();
    if(perm!=='granted'){ alert('Permesso negato. Puoi riattivarlo dalle impostazioni del telefono.'); return; }
    var reg=await navigator.serviceWorker.ready;
    var sub=await reg.pushManager.getSubscription();
    if(!sub){ sub=await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: urlB64ToUint8(VAPID_PUBLIC) }); }
    var j=sub.toJSON();
    var up=await sb.from('push_subscriptions').upsert({ endpoint:j.endpoint, autore_id:userId, unita:(userUnita&&userUnita.unita)||null, is_admin:!!isAdmin, sub:j }, {onConflict:'endpoint'});
    if(up.error){ alert('Errore nel salvataggio: '+up.error.message); return; }
    alert('Notifiche attivate! 🔔\n\n'+(isAdmin?'Riceverai un avviso a ogni nuova richiesta da approvare.':'Riceverai un avviso quando viene lanciato un nuovo sondaggio.'));
  }catch(e){ alert('Non è stato possibile attivare le notifiche: '+(e.message||e)+'\n\nSu iPhone serve l\'app installata sulla Home (iOS 16.4+).'); }
}

  return '<div style="margin-top:3px"><span style="font-size:12px;font-weight:600;padding:2px 9px;border-radius:999px;background:'+(w?'var(--infobg)':'var(--todobg)')+';color:'+(w?'var(--info)':'var(--muted)')+'">'+esc(f)+'</span></div>'; }
// tipo di luogo di un'area + se un servizio compare in quell'area (mappatura SERVIZIO_DOVE)
function areaType(a){ return a==='Collina'?'collina':a==='Zona piscina'?'piscina':a==='Campo tennis'?'tennis':a==='Strade interne'?'strade':a==='Tutto il complesso'?'comune':'palazzina'; }
function serviceInArea(s,a){ var d=(window.SERVIZIO_DOVE&&window.SERVIZIO_DOVE[s.id])||[]; return d.indexOf(areaType(a))>=0; }
function threadHTML(r){
  var cms=comments.filter(function(c){return c.segnalazione_id===r.id});
  return '<button class="th-tog" data-rid="'+r.id+'" style="font-size:14px;padding:7px 12px;margin-top:8px">Discussione'+(cms.length?' ('+cms.length+')':'')+'</button>'+
    '<div class="th" data-tid="'+r.id+'" style="display:none;margin-top:8px;padding-left:8px;border-left:2px solid var(--line)">'+
      cms.map(function(c){return '<div style="margin-bottom:7px"><div style="font-size:14px"><span style="font-weight:500">'+esc(c.autore_nome)+'</span> <span style="color:var(--hint)">'+new Date(c.created_at).toLocaleDateString('it-IT')+'</span></div><div style="font-size:15px">'+esc(c.testo)+'</div></div>'}).join('')+
      '<div style="display:flex;gap:6px;margin-top:6px"><input type="text" class="th-in" data-rid="'+r.id+'" placeholder="Scrivi un commento…" style="flex:1;margin-top:0"><button class="th-send" data-rid="'+r.id+'" style="flex:none">Invia</button></div>'+
    '</div>';
}
function renderZona(){
  var v=$('view-zona');
  var selectHTML=vHead('🌿','Controllo','Capitolato del verde — controlla e segnala')+'<label>Dove sei ora</label><select id="z-area"><option value="" disabled'+(!curArea?' selected':'')+'>Dove ti trovi ora?</option>'+AREE.map(function(a){return '<option'+(a===curArea?' selected':'')+'>'+esc(a)+'</option>'}).join('')+'</select>';
  if(!curArea){   // nessun luogo scelto → prima si seleziona "dove ti trovi"
    v.innerHTML=(approvato()?'':'<div class="pres-note" style="margin:0 0 11px"><b>Il tuo accesso è in attesa di conferma</b> dall\'amministratore del gruppo. Intanto puoi guardare tutto; potrai inviare segnalazioni appena sei confermato.</div>')+selectHTML+
      '<div class="card" style="text-align:center;margin-top:14px"><div style="font-size:42px">📍</div><div style="font-size:17px;font-weight:600;margin-top:4px">Dove ti trovi ora?</div><div class="sub" style="margin-top:4px">Scegli la zona qui sopra per vedere cosa controllare e poter segnalare.</div></div>';
    $('z-area').onchange=function(e){curArea=e.target.value;renderAll();};
    return;
  }
  var apri=reports.filter(function(r){return r.area===curArea&&isOpen(r)}).length;
  var totApri=reports.filter(isOpen).length;
  function hasOpenProblem(sid){ return reports.some(function(r){return r.area===curArea&&r.servizio===sid&&isOpen(r)}); }
  // partiziona i servizi attivi
  var attuali=[], problematici=[];
  CAPITOLATO_VERDE.forEach(function(s){
    if(!serviceInArea(s,curArea)) return;   // solo i servizi che esistono in QUESTO luogo
    if(hasOpenProblem(s.id)) problematici.push(s);
    else if(windowOf(s)) attuali.push(s);
  });
  // CHIUSI: report di finestre PASSATE (periodo ≠ corrente) + conteggio ocra (finestra precedente non controllata)
  var chiusiReports=reports.filter(function(r){ return r.area===curArea && !isOpen(r) && (r.periodo||'')!==curPeriodo(r.servizio); })
    .sort(function(a,b){return a.created_at<b.created_at?1:-1});
  var win5=new Date(Date.now()-35*86400000);   // ultime 5 settimane: l'ocra resta visibile qui
  var ocraBySrv={}, ocraDaily=0;
  CAPITOLATO_VERDE.forEach(function(s){
    if(!serviceInArea(s,curArea)) return;
    pastWindows(s,win5).forEach(function(w){
      if(periodOutcome(curArea,s.id,w.id)!=='ocra') return;
      if(s.win==='D') ocraDaily++; else { (ocraBySrv[s.id]=ocraBySrv[s.id]||{s:s,wins:[]}).wins.push(w); }
    });
  });
  var ocraGroups=Object.keys(ocraBySrv).map(function(k){return ocraBySrv[k];});
  var counts={attuali:attuali.length, problematici:problematici.length, chiusi:chiusiReports.length+ocraGroups.length+(ocraDaily?1:0)};

  function chip(key,label){ var on=curStato===key;
    return '<button class="zchip'+(on?' on':'')+'" data-st="'+key+'">'+label+' · '+counts[key]+'</button>'; }

  var html=(approvato()?'':'<div class="pres-note" style="margin:0 0 11px"><b>Il tuo accesso è in attesa di conferma</b> dall\'amministratore del gruppo. Intanto puoi guardare tutto; potrai inviare segnalazioni appena sei confermato.</div>')+
    selectHTML+
    '<div class="metrics" style="margin-top:11px"><div class="metric"><label>Qui, aperti</label><div class="n" style="color:var(--bad)">'+apri+' <span style="font-size:15px;font-weight:400;color:var(--hint)">problemi</span></div></div>'+
    '<div class="metric"><label>Tutto il complesso</label><div class="n">'+totApri+' <span style="font-size:15px;font-weight:400;color:var(--hint)">aperti</span></div></div></div>'+
    '<div class="segw">'+chip('attuali','Attuali')+chip('problematici','Problematici')+chip('chiusi','Chiusi')+'</div>';

  function segBtn(sid,mio){ return canSegnalare()?'<button class="seg" data-s="'+sid+'">'+(mio?'✎ Modifica':'Segnala')+'</button>':'<button class="seg" disabled style="opacity:.45">Segnala</button>'; }

  if(curStato==='attuali'){
    html+='<p style="font-size:16px;font-weight:600;color:var(--muted);margin:8px 2px 8px">Cosa controllare in '+esc(curArea)+' · '+oggiLabel()+'</p>';
    if(!attuali.length) html+='<div class="empty">Per ora niente da controllare in questa zona.</div>';
    attuali.forEach(function(s){
      var w=windowOf(s), st=pillStato(curArea,s.id);
      var mio=myReportP(curArea,s.id), scadTxt= st==='ok'?'verificato in questa finestra':w.label;
      html+='<div class="card"><div class="row">'+
        '<div style="flex:1;min-width:0"><div style="font-size:17px;font-weight:600">'+esc(s.nome)+'</div>'+fornTag(s)+'</div>'+segBtn(s.id,mio)+'</div>'+
        '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:7px">'+(st==='ok'?stCap('fatto','Fatto'):stCap('finestra','Finestra aperta'))+
        '<span style="font-size:15px;color:var(--muted)">'+esc(s.freq)+' · <b>'+esc(scadTxt)+'</b>'+(mio?' · <b style="color:var(--ok)">tua: fatto</b>':'')+'</span></div>'+
        '<button class="src-link" data-cap="'+s.id+'">📄 '+esc(s.fonte)+'</button></div>';
    });
  } else if(curStato==='problematici'){
    html+='<p style="font-size:16px;font-weight:600;color:var(--muted);margin:8px 2px 8px">Problemi aperti in '+esc(curArea)+'</p>';
    if(!problematici.length) html+='<div class="empty">Nessun problema aperto in questa zona. 👍</div>';
    problematici.forEach(function(s){
      var probs=reports.filter(function(r){return r.area===curArea&&r.servizio===s.id&&isOpen(r)});
      var mio=myReportP(curArea,s.id);
      html+='<div class="card"><div class="row">'+
        '<div style="flex:1;min-width:0"><div style="font-size:17px;font-weight:600">'+esc(s.nome)+'</div>'+fornTag(s)+'</div>'+segBtn(s.id,mio)+'</div>'+
        '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:7px">'+stCap('problema','Problema')+
        '<span style="font-size:15px;color:var(--bad)"><b>'+probs.length+(probs.length>1?' problemi aperti':' problema aperto')+'</b></span></div>'+
        (probs[0]&&probs[0].nota?'<div style="font-size:15px;color:var(--muted);margin-top:6px">«'+esc(probs[0].nota)+'»</div>':'')+
        '<button class="src-link" data-cap="'+s.id+'">📄 '+esc(s.fonte)+'</button></div>';
    });
    html+='<p class="sub" style="margin-top:10px">Il dossier completo (con foto ed export PDF) è nel tab <b>Dossier</b>.</p>';
  } else {  // CHIUSI
    html+='<p style="font-size:16px;font-weight:600;color:var(--muted);margin:8px 2px 8px">Finestre concluse in '+esc(curArea)+' · ultime 5 settimane</p>';
    if(!chiusiReports.length && !ocraGroups.length && !ocraDaily) html+='<div class="empty">Ancora nessuna finestra conclusa qui.</div>';
    if(ocraDaily) html+='<div class="card" style="background:var(--ocrabg)"><div style="color:var(--ocra);font-size:15px;line-height:1.45">⬤ <b>'+ocraDaily+'</b> finestre giornaliere scadute senza controllo — valgono come fatte, ma nessuno le ha confermate.</div></div>';
    ocraGroups.forEach(function(g){
      var dates=g.wins.sort(function(a,b){return a.scad<b.scad?1:-1}).map(function(w){return w.ap.toLocaleDateString('it-IT')}).join(' · ');
      html+='<div class="card" style="background:var(--ocrabg)"><div style="font-size:17px;font-weight:600;color:var(--ocra)">'+esc(g.s.nome)+'</div>'+
        '<div style="font-size:14px;color:var(--ocra);margin-top:3px">⬤ <b>'+g.wins.length+'</b> '+(g.wins.length>1?'finestre non controllate':'finestra non controllata')+' (ultime 5 sett.) — '+(g.wins.length>1?'valgono':'vale')+' come '+(g.wins.length>1?'fatte':'fatta')+', non confermat'+(g.wins.length>1?'e':'a')+'</div>'+
        '<div style="font-size:13px;color:var(--ocra);margin-top:4px">'+dates+'</div>'+
        '<button class="src-link" data-cap="'+g.s.id+'">📄 '+esc(g.s.fonte)+'</button></div>';
    });
    chiusiReports.forEach(function(r){
      var s=srvById(r.servizio); var fatto=r.stato==='ok';
      html+='<div class="card"><div class="row">'+
        '<div style="flex:1;min-width:0"><div style="font-size:17px;font-weight:600">'+esc(s?s.nome:r.servizio)+'</div></div>'+stCap('fatto',fatto?'Fatto':'Risolto')+'</div>'+
        '<div style="font-size:14px;color:var(--hint);margin-top:4px">'+(fatto?'fatto':'problema risolto')+' · '+esc(r.autore_nome)+' · '+new Date(r.created_at).toLocaleDateString('it-IT')+' <span style="color:var(--ok)">· completato</span></div>'+
        (!fatto && r.chiuso_da_nome?'<div style="font-size:13px;color:var(--ok);margin-top:2px">✓ chiuso da <b>'+esc(r.chiuso_da_nome)+'</b>'+(r.chiuso_il?' il '+new Date(r.chiuso_il).toLocaleDateString('it-IT'):'')+(r.chiuso_da&&r.chiuso_da!==r.autore_id?' · chiusura da amministrazione':'')+'</div>':'')+
        (r.nota?'<div style="font-size:15px;color:var(--muted);margin-top:6px">«'+esc(r.nota)+'»</div>':'')+
        threadHTML(r)+'</div>';
    });
  }
  v.innerHTML=html;
  $('z-area').onchange=function(e){curArea=e.target.value;renderAll()};
  v.querySelectorAll('.zchip').forEach(function(b){b.onclick=function(){curStato=b.dataset.st;renderZona();window.scrollTo(0,0);}});
  v.querySelectorAll('.seg:not([disabled])').forEach(function(b){b.onclick=function(){openSegnala(b.dataset.s)}});
  v.querySelectorAll('.src-link[data-cap]').forEach(function(b){b.onclick=function(){openCapitolato(b.dataset.cap)}});
  v.querySelectorAll('.th-tog').forEach(function(b){b.onclick=function(){var t=v.querySelector('.th[data-tid="'+b.dataset.rid+'"]');var show=t.style.display==='none';t.style.display=show?'block':'none';openThreads[b.dataset.rid]=show;}});
  v.querySelectorAll('.th-send').forEach(function(b){b.onclick=async function(){var inp=v.querySelector('.th-in[data-rid="'+b.dataset.rid+'"]');if(!inp.value.trim())return;openThreads[b.dataset.rid]=true;var ok=await addComment(b.dataset.rid,inp.value);if(ok)renderZona();}});
  Object.keys(openThreads).forEach(function(rid){if(openThreads[rid]){var t=v.querySelector('.th[data-tid="'+rid+'"]');if(t)t.style.display='block';}});
}

/* ---------- SEGNALA ---------- */
function openSegnala(sid){
  if(!curArea){ alert('Scegli prima dove ti trovi ("Dove sei ora").'); return; }   // niente segnalazione senza luogo
  var s=CAPITOLATO_VERDE.find(function(x){return x.id===sid});
  var existing=myReportP(curArea,sid);
  var existingUrls = existing? fotoListOf(existing).slice() : [];
  var m=document.createElement('div');
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:1000';
  m.innerHTML='<div style="background:var(--surface);width:100%;max-width:440px;max-height:92vh;overflow:auto;border-radius:16px 16px 0 0;padding:16px 16px 22px">'+
    '<div style="font-size:18px;font-weight:600">'+esc(s.nome)+(existing?' <span style="font-size:14px;color:var(--info)">· modifica</span>':'')+'</div>'+
    '<div style="font-size:15px;color:var(--hint);margin:2px 0 12px">'+esc(curArea)+' · dovuto: '+esc(s.freq)+' · '+esc(s.fonte)+'</div>'+
    (existing?'<div class="sub" style="margin:-6px 0 10px">Hai già segnalato questa voce: stai <b>modificando</b> la tua segnalazione.</div>':'')+
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:9px">'+
      '<button id="b-ok" style="border-color:var(--ok);color:var(--ok)">✓ Fatto</button>'+
      '<button id="b-no" style="border-color:var(--bad);color:var(--bad)">! Problema</button></div>'+
    '<label style="margin-top:12px;display:block">Foto (puoi sceglierne più di una)</label>'+
    '<input id="b-foto" type="file" accept="image/*" multiple style="display:none">'+
    '<div id="b-prevs" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px"></div>'+
    '<label id="b-nota-lbl" style="margin-top:8px;display:block">Nota (facoltativa)</label><textarea id="b-nota" rows="3" placeholder="es. prato secco, irrigazione ferma da giorni" style="min-height:92px;font-size:16px;border:1.5px solid var(--hint);background:var(--surface);border-radius:10px;padding:11px">'+esc(existing&&existing.nota?existing.nota:'')+'</textarea>'+
    '<div style="font-size:14px;color:var(--hint);margin-top:8px">firma: '+esc(userNome)+' · '+new Date().toLocaleDateString('it-IT')+' · zona '+esc(curArea)+'</div>'+
    '<div id="b-warn" style="color:var(--bad);font-size:15px;margin-top:8px;display:none">Indica prima se è Fatto o Problema</div>'+
    '<div style="display:grid;grid-template-columns:1fr 2fr;gap:9px;margin-top:14px"><button id="b-x">Annulla</button>'+
    '<button class="btn-primary" id="b-send">'+(existing?'Salva modifiche':'Invia segnalazione')+'</button></div></div>';
  document.querySelector('.wrap').appendChild(m);
  var stato = existing? existing.stato : null, fotoBlobs=[];
  function pick(el,col){$('b-ok').style.outline='';$('b-no').style.outline='';el.style.outline='2px solid '+col}
  function renderPrevs(){
    var h='';
    existingUrls.forEach(function(u,i){ h+='<div style="position:relative"><img src="'+esc(u)+'" style="width:64px;height:64px;object-fit:cover;border-radius:8px"><button data-ex="'+i+'" class="rm-ex" style="position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:var(--bad);color:#fff;border:none;font-size:14px;line-height:1;padding:0">×</button></div>'; });
    fotoBlobs.forEach(function(b,i){ h+='<div style="position:relative"><img src="'+URL.createObjectURL(b)+'" style="width:64px;height:64px;object-fit:cover;border-radius:8px"><button data-nw="'+i+'" class="rm-nw" style="position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;background:var(--bad);color:#fff;border:none;font-size:14px;line-height:1;padding:0">×</button></div>'; });
    // riquadro "+" SEMPRE in coda → resta a destra dopo le miniature: si capisce che si possono aggiungere altre foto
    h+='<button type="button" id="b-add" aria-label="Aggiungi foto" style="width:64px;height:64px;border-radius:8px;border:2px dashed var(--ok);background:var(--okbg);color:var(--ok);font-size:34px;line-height:1;display:flex;align-items:center;justify-content:center;padding:0">+</button>';
    var p=$('b-prevs'); p.innerHTML=h;
    p.querySelectorAll('.rm-ex').forEach(function(b){b.onclick=function(){existingUrls.splice(+b.dataset.ex,1);renderPrevs();}});
    p.querySelectorAll('.rm-nw').forEach(function(b){b.onclick=function(){fotoBlobs.splice(+b.dataset.nw,1);renderPrevs();}});
    $('b-add').onclick=function(){ $('b-foto').click(); };
  }
  function updateNotaLbl(){ var l=$('b-nota-lbl'); if(!l)return;
    if(stato==='problema'){ l.innerHTML='Nota — <b style="color:var(--bad)">descrivi il problema</b> (obbligatoria)'; $('b-nota').setAttribute('placeholder','Cosa non va? es. prato secco, irrigazione ferma da giorni'); }
    else { l.textContent='Nota (facoltativa)'; $('b-nota').setAttribute('placeholder','es. note utili, dettagli'); } }
  if(existing && stato){ pick(stato==='ok'?$('b-ok'):$('b-no'), stato==='ok'?'var(--ok)':'var(--bad)'); }
  renderPrevs(); updateNotaLbl();
  $('b-ok').onclick=function(){stato='ok';pick(this,'var(--ok)');updateNotaLbl();};
  $('b-no').onclick=function(){stato='problema';pick(this,'var(--bad)');updateNotaLbl();};
  $('b-foto').onchange=function(e){ [].slice.call(e.target.files).forEach(function(f){ downscale(f,function(blob){ fotoBlobs.push(blob); renderPrevs(); }); }); e.target.value=''; };
  $('b-x').onclick=function(){m.remove()};
  $('b-send').onclick=async function(){
    if(!stato){$('b-warn').textContent='Indica prima se è Fatto o Problema';$('b-warn').style.display='block';return}
    if(stato==='problema' && !$('b-nota').value.trim()){$('b-warn').textContent='Per un problema scrivi cosa non va.';$('b-warn').style.display='block';$('b-nota').focus();return}
    if(DEMO){
      var urlsD=existingUrls.concat(fotoBlobs.map(function(b){return URL.createObjectURL(b)}));
      if(existing){ existing.stato=stato; existing.nota=$('b-nota').value.trim(); existing.foto_urls=urlsD; existing.foto_url=urlsD[0]||null; }
      else { reports.unshift({id:'d'+Date.now(),area:curArea,servizio:s.id,servizio_nome:s.nome,fonte:s.fonte,stato:stato,nota:$('b-nota').value.trim(),foto_url:urlsD[0]||null,foto_urls:urlsD,autore_id:userId,autore_nome:userNome,risolto:false,periodo:curPeriodo(s.id),created_at:new Date().toISOString()}); }
      m.remove(); renderAll(); return;
    }
    var btn=$('b-send'); btn.disabled=true; btn.textContent='Invio…';
    try{
      var newUrls=[];
      for(var i=0;i<fotoBlobs.length;i++){
        var path=userId+'/'+Date.now()+'-'+i+'.jpg';
        var up=await sb.storage.from('foto').upload(path, fotoBlobs[i], {contentType:'image/jpeg'});
        if(up.error) throw up.error;
        newUrls.push(sb.storage.from('foto').getPublicUrl(path).data.publicUrl);
      }
      var allUrls=existingUrls.concat(newUrls);
      var payload={ area:curArea, servizio:s.id, servizio_nome:s.nome, fonte:s.fonte, stato:stato, nota:$('b-nota').value.trim(), foto_url:allUrls[0]||null, foto_urls:allUrls, autore_id:userId, autore_nome:userNome, periodo:curPeriodo(s.id) };
      var res=await sb.from('segnalazioni').upsert(payload,{onConflict:'autore_id,area,servizio,periodo'});
      if(res.error) throw res.error;
      m.remove(); await loadReports(); renderAll();
    }catch(err){ $('b-warn').textContent='Errore: '+err.message; $('b-warn').style.display='block'; btn.disabled=false; btn.textContent=existing?'Salva modifiche':'Invia segnalazione'; }
  };
}
function downscale(file,cb){var img=new Image();var rd=new FileReader();rd.onload=function(){img.onload=function(){var mx=1280,sc=Math.min(1,mx/Math.max(img.width,img.height));var cv=document.createElement('canvas');cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);cv.toBlob(function(b){cb(b)},'image/jpeg',0.75)};img.src=rd.result};rd.readAsDataURL(file)}

/* ---------- VIEW: BACHECA ---------- */
function renderBacheca(){
  var v=$('view-bacheca');
  var probByArea={};reports.forEach(function(r){if(isOpen(r)){probByArea[r.area]=(probByArea[r.area]||0)+1}});
  var pw={}; CAPITOLATO_VERDE.forEach(function(s){pw[s.id]=prevWindowOf(s);});
  function ocraOf(a){var n=0;CAPITOLATO_VERDE.forEach(function(s){if(!serviceInArea(s,a))return;var w=pw[s.id];if(w&&periodOutcome(a,s.id,w.id)==='ocra')n++;});return n;}
  var ocraByArea={}; AREE.forEach(function(a){ocraByArea[a]=ocraOf(a)});
  var totProb=Object.keys(probByArea).reduce(function(t,k){return t+probByArea[k]},0);
  var totOcra=AREE.reduce(function(t,a){return t+ocraByArea[a]},0);
  var okAree=AREE.filter(function(a){return !probByArea[a]&&!ocraByArea[a]}).length;

/* ---------- EXPORT PDF ---------- */
function loadImg(url){return new Promise(function(res,rej){var img=new Image();if(/^https?:/i.test(url))img.crossOrigin='anonymous';img.onload=function(){try{var c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;c.getContext('2d').drawImage(img,0,0);res({data:c.toDataURL('image/jpeg',0.85),w:img.naturalWidth,h:img.naturalHeight});}catch(e){rej(e);}};img.onerror=function(){rej(new Error('load'))};img.src=url;});}
async function exportPDF(){
  var btn=$('dz-export'); if(btn){btn.disabled=true;btn.textContent='Genero il PDF…';}
  try{
    var doc=new jspdf.jsPDF({unit:'pt',format:'a4'});
    var W=doc.internal.pageSize.getWidth(), H=doc.internal.pageSize.getHeight(), M=40, y=54;
    doc.setFont('helvetica','bold'); doc.setFontSize(16); doc.text('Dossier — esecuzione capitolato verde', M, y); y+=20;
    doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(110);
    doc.text('Condominio Oasi delle Palme (Via Cina 451, Roma) · generato il '+new Date().toLocaleDateString('it-IT'), M, y); y+=14;
    var probs=reports.filter(isOpen);
    doc.text(reports.length+' segnalazioni totali · '+probs.length+' inadempienze aperte', M, y); y+=22;
    doc.setTextColor(0);
    var bySrv={}; probs.forEach(function(r){(bySrv[r.servizio]=bySrv[r.servizio]||[]).push(r);});
    if(!probs.length){ doc.setFontSize(11); doc.text('Nessuna inadempienza aperta.', M, y); }
    var keys=Object.keys(bySrv);
    for(var k=0;k<keys.length;k++){
      var s=CAPITOLATO_VERDE.find(function(x){return x.id===keys[k]}); var rs=bySrv[keys[k]];
      if(y>H-120){doc.addPage();y=54;}
      doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.text(s?s.nome:keys[k], M, y); y+=15;
      doc.setFont('helvetica','normal'); doc.setFontSize(10); doc.setTextColor(110);
      doc.text('dovuto: '+(s?s.freq:'')+'   ·   '+(rs[0].fonte||''), M, y); y+=16; doc.setTextColor(0);
      for(var i=0;i<rs.length;i++){
        var r=rs[i];
        if(y>H-110){doc.addPage();y=54;}
        doc.setFontSize(11);
        var head=r.area+(r.nota?' — '+r.nota:'');
        var lines=doc.splitTextToSize(head, W-2*M); doc.text(lines, M, y+12);
        doc.setFontSize(9); doc.setTextColor(110);
        doc.text(r.autore_nome+' · '+fmt(r.created_at), M, y+12+lines.length*13+3); doc.setTextColor(0);
        y+=12+lines.length*13+12;
        var fotos=fotoListOf(r);
        for(var fi=0; fi<fotos.length; fi++){ try{
          var im=await loadImg(fotos[fi]);
          var iw=(W-2*M)*0.5, ih=iw*im.h/im.w;       // foto al 50% della larghezza utile, proporzioni reali
          var avail=H-54-y-16;                        // spazio rimasto sotto y in questa pagina
          if(ih>avail){ doc.addPage(); y=54; avail=H-54-y-16; }
          if(ih>avail){ var sc=avail/ih; ih=avail; iw=iw*sc; }   // foto verticale più alta della pagina: riduci in proporzione
          var ix=M+((W-2*M)-iw)/2;                     // centra se ridotta
          doc.addImage(im.data,'JPEG',ix,y,iw,ih);
          y+=ih+10;
        }catch(e){} }
        var cms=comments.filter(function(c){return c.segnalazione_id===r.id});
        for(var j=0;j<cms.length;j++){
          if(y>H-60){doc.addPage();y=54;}
          doc.setFontSize(9); doc.setTextColor(90);
          var clines=doc.splitTextToSize('— '+cms[j].autore_nome+': '+cms[j].testo, W-M-(M+18));
          doc.text(clines, M+18, y); doc.setTextColor(0);
          y+=clines.length*11+5;
        }
      }
      y+=12;
    }
    doc.setFontSize(8); doc.setTextColor(140);
    doc.text('Ogni voce è ancorata al capitolato e a segnalazioni firmate con foto e data.', M, H-26);
    doc.save('dossier-oasi-delle-palme.pdf');
  }catch(err){ alert('Errore PDF: '+err.message); }
  if(btn){btn.disabled=false;btn.textContent='Esporta PDF firmato';}
}

function conferma(opt){   // {titolo, testo, azione='Esegui', distruttiva} → Promise<boolean>

    var m=document.createElement('div');
    m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-end;justify-content:center;z-index:2300';

      '<div style="display:grid;grid-template-columns:1fr 2fr;gap:9px"><button id="cf-x" style="font-size:16px">Annulla</button><button id="cf-ok" class="btn-primary" style="font-size:16px'+(opt.distruttiva?';background:var(--bad);border-color:var(--bad)':'')+'">'+esc(opt.azione||'Esegui')+'</button></div></div>';

}

/* ---------- Delegati di palazzina: modale di assegnazione (F0) ---------- */
async function assegnaDelegati(p,cands){
  if(document.getElementById('dl-ok')) return;   // guard: doppio tap durante il fetch = seconda modale con id duplicati e bottoni morti
  var cur={};
  if(DEMO){ cur=DEMO_DELEGATI.find(function(d){return d.palazzina===p})||{}; }
  else { var rc=await sb.from('delegati').select('*').eq('palazzina',p).maybeSingle(); if(rc.error){ alert('Errore: '+rc.error.message); return; } cur=rc.data||{}; }
  if(document.getElementById('dl-ok')) return;
  var m=document.createElement('div');
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:1000';
  function selOf(id,curId){
    var o='<option value="">— nessuno —</option>';
    cands.forEach(function(c){ o+='<option value="'+esc(c.autore_id)+'"'+(c.autore_id===curId?' selected':'')+'>'+esc(c.nome||c.unita)+' ('+esc(c.unita)+')</option>'; });
    return '<select id="'+id+'" style="width:100%;margin:4px 0 10px;font-size:16px;padding:11px;border:1px solid var(--line);border-radius:10px;background:var(--surface);color:var(--txt)">'+o+'</select>';
  }
  function stale(id,nm){ return id && nm && !cands.some(function(c){return c.autore_id===id}); }
  var staleNote=(stale(cur.delegato_autore_id,cur.delegato_nome)||stale(cur.vice_autore_id,cur.vice_nome)) ?
    '<div class="sub" style="color:var(--ocra);margin-bottom:8px">⚠️ L\'attuale titolare non è più tra i condòmini approvati: salvando, la carica passa a chi scegli qui (o a nessuno).</div>' : '';
  m.innerHTML='<div style="background:var(--surface);width:100%;max-width:440px;max-height:92vh;overflow:auto;border-radius:16px 16px 0 0;padding:16px 16px 22px">'+
    '<div style="font-size:18px;font-weight:600;margin-bottom:4px">Delegati — Pal. '+esc(p)+'</div>'+
    '<div class="sub" style="margin-bottom:12px">'+(cands.length?'Scegli tra i condòmini approvati della palazzina.':'Nessun condòmino approvato in questa palazzina: non c\'è nessuno da nominare.')+'</div>'+staleNote+
    '<label>Delegato</label>'+selOf('dl-del',cur.delegato_autore_id)+
    '<label>Vice-delegato</label>'+selOf('dl-vice',cur.vice_autore_id)+
    '<div id="dl-warn" style="color:var(--bad);font-size:14px;margin:4px 0;display:none"></div>'+
    '<div style="display:grid;grid-template-columns:1fr 2fr;gap:9px;margin-top:12px"><button id="dl-x">Annulla</button><button class="btn-primary" id="dl-ok">Salva</button></div></div>';
  document.querySelector('.wrap').appendChild(m);
  $('dl-x').onclick=function(){ m.remove(); };
  $('dl-ok').onclick=async function(){
    function warn(t){ $('dl-warn').textContent=t; $('dl-warn').style.display='block'; }
    var dId=$('dl-del').value, vId=$('dl-vice').value;
    if(dId && dId===vId){ warn('Delegato e vice devono essere persone diverse.'); return; }
    function pick(id){ var c=cands.find(function(x){return x.autore_id===id}); return c?{id:id,nome:c.nome||c.unita,unita:c.unita}:{id:null,nome:null,unita:null}; }
    var D=pick(dId), V=pick(vId);
    var rec={palazzina:p,delegato_autore_id:D.id,delegato_nome:D.nome,delegato_unita:D.unita,vice_autore_id:V.id,vice_nome:V.nome,vice_unita:V.unita,updated_at:new Date().toISOString()};
    if(DEMO){ DEMO_DELEGATI=DEMO_DELEGATI.filter(function(d){return d.palazzina!==p}); DEMO_DELEGATI.push(rec); myDeleg=null; m.remove(); renderAdmin(); return; }
    var btn=$('dl-ok'); btn.disabled=true; btn.textContent='Salvo…';
    var up=await sb.from('delegati').upsert(rec,{onConflict:'palazzina'});
    if(up.error){ warn('Errore: '+up.error.message); btn.disabled=false; btn.textContent='Salva'; return; }
    myDeleg=null;   // il mio status delegato può essere cambiato: si ricarica al prossimo renderVoti
    m.remove(); renderAdmin();
  };
}

];
var myDeleg=null;   // sono delegato/vice della MIA palazzina? (null = da caricare al primo renderVoti)
async function renderVoti(){
  var v=$('view-voti'); v.innerHTML='<div class="spin">Carico…</div>';
  var sondaggi, voti;
  if(DEMO){ sondaggi=DEMO_SONDAGGI; voti=DEMO_VOTI; }
  else {
    var rs=await sb.from('sondaggi').select('*').order('created_at',{ascending:false});
    if(rs.error){ v.innerHTML='<div class="empty">Errore: '+esc(rs.error.message)+'<br><br>Hai eseguito <b>migrate_v9_votazione.sql</b>?</div>'; return; }
    sondaggi=rs.data||[];
    var rv=await sb.from('voti').select('*'); voti=rv.error?[]:(rv.data||[]);
  }
  if(myDeleg===null){
    if(!userUnita){ myDeleg=false; }
    else if(DEMO){ var dd=DEMO_DELEGATI.find(function(d){return d.palazzina===userUnita.palazzina}); myDeleg=!!(dd&&(dd.delegato_autore_id===userId||dd.vice_autore_id===userId)); }
    else { var rd=await sb.from('delegati').select('delegato_autore_id,vice_autore_id').eq('palazzina',userUnita.palazzina).maybeSingle(); myDeleg=!!(rd.data&&(rd.data.delegato_autore_id===userId||rd.data.vice_autore_id===userId)); }
  }
  var ordini=[];
  if(userUnita || isAdmin){   // ADMIN vede tutto sempre (scelta Corrado): carica gli ordini di TUTTE le palazzine
    if(DEMO){ ordini=isAdmin?DEMO_ORDINI.slice():DEMO_ORDINI.filter(function(o){return o.palazzina===userUnita.palazzina}); }
    else { var qo=sb.from('ordini_esecutivi').select('*'); if(!isAdmin) qo=qo.eq('palazzina',userUnita.palazzina); var ro=await qo.order('created_at',{ascending:false}); ordini=ro.error?[]:(ro.data||[]); }
  }
  var ordBySond={}; ordini.forEach(function(o){ if(o.sondaggio_id) ordBySond[o.sondaggio_id]=o; });
  var ordMiei=userUnita?ordini.filter(function(o){return o.palazzina===userUnita.palazzina}):[];
  var palMine=userUnita?sondaggi.filter(function(s){return s.palazzina===userUnita.palazzina}):[];
  var generali=sondaggi.filter(function(s){return !s.palazzina});
  var attivi=generali.filter(function(s){return s.approvato!==false});
  var proposte=generali.filter(function(s){return s.approvato===false && (adminView() || s.proposto_da===userId)});   // in vista condòmino l'admin vede solo le proprie proposte
  function opzOf(s){return Array.isArray(s.opzioni)? s.opzioni : (typeof s.opzioni==='string'? JSON.parse(s.opzioni):['Sì','No','Astenuto'])}
  function mandatoDi(s){   // MANDATO su un punto ODG: QUALUNQUE risposta oltre 500/1000 di palazzina (anche No/Astenuto: è la posizione della palazzina)
    var sv=voti.filter(function(x){return x.sondaggio_id===s.id}), win=null;
    opzOf(s).forEach(function(o){
      var mm=sv.filter(function(x){return x.opzione===o}).reduce(function(t,x){return t+(+x.millesimi||0)},0);
      if(mm>500 && (!win||mm>win.mm)) win={o:o,mm:mm};
    });
    return win;
  }
  function vinceDi(s){   // risposta AZIONABILE oltre 500/1000 di palazzina (No/Astenuto vincenti = nessuna azione)
    var sv=voti.filter(function(x){return x.sondaggio_id===s.id}), win=null;
    opzOf(s).forEach(function(o){
      if(/^(no\b|non\b|astenut|contrari)/i.test(o.trim())) return;   // risposte negative/astensione non generano ordini (\b: "Noleggiare" passa, "No grazie" no)
      var mm=sv.filter(function(x){return x.opzione===o}).reduce(function(t,x){return t+(+x.millesimi||0)},0);
      if(mm>500 && (!win||mm>win.mm)) win={o:o,mm:mm};
    });
    return win;
  }
  function card(s,pal){
    var sv=voti.filter(function(x){return x.sondaggio_id===s.id});
    var myVote=sv.find(function(x){return x.autore_id===userId});
    var unitVote=sv.find(function(x){return userUnita && x.unita===userUnita.unita});   // il voto è dell'UNITÀ
    var mine=!!myVote;
    var opzioni=opzOf(s);
    var totMm=sv.reduce(function(t,x){return t+(+x.millesimi||0)},0);
    var isMyPal=!pal || (userUnita && s.palazzina===userUnita.palazzina);   // admin in supervisione: osserva le altre palazzine, non ci vota
    var isOdg=s.tipo==='odg_punto', isDib=s.tipo==='dibattito', isAsm=s.tipo==='assemblea';
    var canManage=isMyPal && (adminView()||(pal&&myDeleg));   // gestione solo nella PROPRIA palazzina (Corrado: "admin non tocca i voti altrui" — sui voti altrui è osservatore puro)
    var h='<div class="card"><div style="font-weight:600;font-size:18px">'+(pal&&!isMyPal?'<span class="pill" style="margin-right:6px">Pal. '+esc(s.palazzina)+'</span>':'')+(isOdg?'<span class="pill" style="margin-right:6px">📋 ODG</span>':'')+(isDib?'<span class="pill" style="margin-right:6px">💬 Dibattito</span>':'')+(isAsm?'<span class="pill" style="margin-right:6px">🏛️ Assemblea</span>':'')+esc(s.domanda)+'</div>'+
      (s.descrizione?'<div style="font-size:15px;color:var(--muted);line-height:1.45;white-space:pre-wrap;margin:4px 0 2px">'+esc(s.descrizione)+'</div>':'')+
      '<div style="font-size:14px;color:var(--hint);margin:3px 0 10px">'+sv.length+' voti · '+totMm.toFixed(1).replace('.',',')+'/1000 mm'+(pal?' di palazzina':'')+(s.chiuso?' · CHIUSO'+(s.chiuso_da_nome?' da '+esc(s.chiuso_da_nome):''):'')+'</div>';
    if(pal && !isMyPal){
      if(!s.chiuso) h+='<div class="sub" style="margin-bottom:4px">Voto della Pal. '+esc(s.palazzina)+': lo osservi da amministratore, vota solo la palazzina.</div>';
    } else if((!unitVote || mine) && !s.chiuso && approvato() && userUnita){
      h+='<div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px">'+opzioni.map(function(o){return '<button class="vt-vote" data-s="'+esc(s.id)+'" data-o="'+esc(o)+'">'+esc(o)+'</button>'}).join('')+'</div>';
    } else if(unitVote && !mine && approvato() && !s.chiuso){
      h+='<div class="sub" style="margin-bottom:4px;color:var(--ocra)">Ha già votato un comproprietario della tua unità. Il voto è <b>dell\'unità</b>: lo vedi, ma non puoi cambiarlo.</div>';
    } else if(!userUnita && approvato() && !s.chiuso){
      h+='<div class="sub" style="margin-bottom:4px">Il voto è dell\'unità: i non-condòmini (custode, avvocato…) non votano.</div>';
    } else if(!approvato() && !unitVote && !s.chiuso){
      h+='<div class="sub" style="margin-bottom:4px">Per votare devi essere un condòmino confermato.</div>';
    }
    opzioni.forEach(function(o){
      var ov=sv.filter(function(x){return x.opzione===o});
      var mm=ov.reduce(function(t,x){return t+(+x.millesimi||0)},0);
      var pct=totMm>0?Math.round(mm/totMm*100):0;
      h+='<div style="margin-top:10px"><div style="display:flex;justify-content:space-between;font-size:15px;gap:8px">'+
        '<span>'+(unitVote&&unitVote.opzione===o?'<b>'+esc(o)+' ✓ ('+(mine?'il tuo voto':'voto dell\'unità')+')</b>':esc(o))+'</span>'+
        '<span style="color:var(--hint);white-space:nowrap">'+ov.length+' u · '+mm.toFixed(1).replace('.',',')+' mm</span></div>'+
        '<div style="height:8px;background:var(--line);border-radius:5px;margin-top:4px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:var(--area,var(--ok))"></div></div>'+
        (ov.length?'<div style="font-size:13px;color:var(--hint);margin-top:3px">'+ov.map(function(x){return esc(x.autore_nome)}).join(', ')+'</div>':'')+'</div>';
    });
    if(pal && isOdg){   // punto ODG: l'esito è il MANDATO del delegato (qualunque risposta oltre 500, anche No/Astenuto) — niente ordini esecutivi
      if(s.chiuso){
        var man=mandatoDi(s);
        h+= man ? '<div class="sub" style="margin-top:10px">📋 <b>Mandato della palazzina: «'+esc(man.o)+'»</b> ('+man.mm.toFixed(1).replace('.',',')+'/1000 di palazzina) — il delegato lo porta al Consiglio.</div>'
                : '<div class="sub" style="margin-top:10px">Nessuna risposta oltre 500/1000 di palazzina: su questo punto la palazzina va al Consiglio come <b>astenuta</b>.</div>';
      } else if(canManage){
        h+='<div class="sub" style="margin-top:10px">Chiudendo il voto fissi il mandato da portare al Consiglio.</div>';
      }
      if(canManage && s.odg_punto_id){ h+='<button class="vt-dib" data-p="'+esc(s.odg_punto_id)+'" data-t="'+esc(s.domanda)+'" style="margin-top:10px;font-size:14px">💬 Apri un dibattito su questo punto</button>'; }
    } else if(pal && isDib){   // dibattito: consultazione — nessuna soglia, l'esito entra nel RAPPORTO del delegato
      h+='<div class="sub" style="margin-top:10px">💬 Consultazione della palazzina: '+(s.chiuso?'esito registrato nel <b>rapporto del delegato</b> per il Consiglio.':'l\'esito entrerà nel <b>rapporto del delegato</b> per il Consiglio.')+'</div>';
    } else if(pal){
      var ord=ordBySond[s.id];
      if(ord){ h+='<div class="sub" style="margin-top:10px">📨 Ordine esecutivo trasmesso — '+ordStato(ord.stato)[1]+'.</div>'; }
      else if(s.chiuso){
        var win=vinceDi(s);
        if(win && isMyPal && myDeleg) h+='<button class="vt-tras" data-s="'+esc(s.id)+'" data-o="'+esc(win.o)+'" style="margin-top:10px;border-color:var(--ok);color:var(--ok)">📨 Trasmetti ordine esecutivo: «'+esc(win.o)+'»</button>';   // trasmette SOLO il delegato/vice (il DB lo impone: RLS ordini_insert)
        else if(win) h+='<div class="sub" style="margin-top:10px">«'+esc(win.o)+'» ha superato 500/1000 di palazzina: il delegato può trasmettere l\'ordine all\'amministrazione.</div>';
        else h+='<div class="sub" style="margin-top:10px">Nessuna risposta ha superato 500/1000 di palazzina: la proposta decade, nessuna azione.</div>';
      } else if(canManage){
        var winNow=vinceDi(s);
        if(winNow) h+='<div class="sub" style="margin-top:10px">«'+esc(winNow.o)+'» è oltre 500/1000: chiudendo il voto potrai trasmettere l\'ordine.</div>';
      }
    }
    if(canManage && !(pal && ordBySond[s.id])){ h+='<div style="display:flex;gap:7px;margin-top:12px">'+   // un voto già trasmesso come ordine non si riapre (M1 gate; enforced anche a DB, v44)
      '<button class="vt-close" data-s="'+esc(s.id)+'" data-chiuso="'+(s.chiuso?'1':'0')+'" style="font-size:14px">'+(s.chiuso?'Riapri':'Chiudi')+'</button>'+
      (adminView()?'<button class="vt-del" data-s="'+esc(s.id)+'" style="font-size:14px;border-color:var(--bad);color:var(--bad)">Elimina</button>':'')+'</div>'; }
    else if(isAsm && isAmministratore() && !s.chiuso){ h+='<div style="display:flex;gap:7px;margin-top:12px"><button class="vt-close" data-s="'+esc(s.id)+'" data-chiuso="0" style="font-size:14px">Chiudi</button></div>'; }   // l'amministratore chiude (solo chiude) il voto d'assemblea — scelta Corrado 2026-07-13
    return h+'</div>';
  }
  var html=vHead('🗳️','Voti','Sondaggi della comunità — un voto per unità.');
  // ===== voti della MIA palazzina (spazio segregato) =====
  if(userUnita){
    html+='<div class="cap-grp">🏠 Pal. '+esc(userUnita.palazzina)+' — voti di palazzina</div>';
    if(myDeleg){
      html+='<button class="btn-primary" id="vt-new-pal" style="margin-bottom:8px">＋ Apri un voto di palazzina</button>'+
        '<div class="sub" style="margin-bottom:10px">Sei delegato o vice: questi voti valgono solo per la tua palazzina, pesati sui suoi millesimi (scala /1000 interna). Una risposta oltre 500 diventa un ordine esecutivo per l\'amministrazione.</div>';
    }
    if(!palMine.length && !ordMiei.length){ html+='<div class="empty">Nessun voto di palazzina.'+(myDeleg?'':' Li apre il delegato (o il vice).')+'</div>'; }
    palMine.forEach(function(s){ html+=card(s,true); });
    if(ordMiei.length){
      html+='<div class="cap-grp">📨 Ordini esecutivi della palazzina</div>';
      ordMiei.forEach(function(o){ html+=ordineCard(o,false); });
    }
  }
  // ===== supervisione admin: TUTTE le palazzine, sempre (scelta Corrado 2026-07-12) =====
  if(isAdmin){
    var palAltre=sondaggi.filter(function(s){return s.palazzina && s.tipo!=='odg_punto' && (!userUnita || s.palazzina!==userUnita.palazzina)});   // gli ODG hanno la loro vista con l'aggregato: qui solo i voti interni
    var ordAltri=ordini.filter(function(o){return !userUnita || o.palazzina!==userUnita.palazzina});
    if(palAltre.length || ordAltri.length){
      html+='<div class="cap-grp">🛠️ Supervisione — altre palazzine (admin)</div>';
      PALAZZINE.forEach(function(p){
        palAltre.filter(function(s){return s.palazzina===p}).forEach(function(s){ html+=card(s,true); });
      });
      ordAltri.forEach(function(o){ html+=ordineCard(o,false); });
    }
  }
  if(userUnita||isAdmin){ html+='<div class="cap-grp">Sondaggi del condominio</div>'; }
  if(approvato() && (adminView() || userUnita)){ html+='<button class="btn-primary" id="vt-new" style="margin-bottom:12px">＋ '+(adminView()?'Nuovo sondaggio':'Proponi un sondaggio')+'</button>'; }
  else { html+='<div class="sub" style="margin-bottom:12px">Quando sarai un condòmino confermato potrai votare e proporre sondaggi.</div>'; }
  // PROPOSTE (in attesa di avallo dell'admin)
  if(proposte.length){
    html+='<div class="cap-grp">Proposte da approvare ('+proposte.length+')</div>';
    proposte.forEach(function(s){
      html+='<div class="card"><div style="font-weight:600;font-size:17px">'+esc(s.domanda)+'</div>'+
        (s.descrizione?'<div style="font-size:14.5px;color:var(--muted);white-space:pre-wrap;margin-top:2px">'+esc(s.descrizione)+'</div>':'')+
        '<div style="font-size:14px;color:var(--hint);margin:3px 0 8px">proposto da '+esc(s.autore_nome||'—')+' · opzioni: '+esc(opzOf(s).join(' / '))+'</div>';
      if(adminView()){ html+='<div style="display:flex;gap:7px"><button class="vt-appr" data-s="'+esc(s.id)+'" style="border-color:var(--ok);color:var(--ok)">✓ Avalla</button>'+
        '<button class="vt-del" data-s="'+esc(s.id)+'" style="border-color:var(--bad);color:var(--bad)">Elimina</button></div>'; }
      else { html+='<div class="sub">In attesa che l\'amministratore la approvi.</div>'; }
      html+='</div>';
    });
    html+='<div class="cap-grp">Sondaggi attivi</div>';
  }
  if(!attivi.length){ html+='<div class="empty">Nessun sondaggio attivo.'+(approvato()?' '+(adminView()?'Creane uno':'Proponine uno')+' col pulsante qui sopra.':'')+'</div>'; }
  attivi.forEach(function(s){ html+=card(s,false); });
  v.innerHTML=html;
  v.querySelectorAll('.vt-vote').forEach(function(b){b.onclick=function(){votaSondaggio(b.dataset.s,b.dataset.o)}});
  var nb=$('vt-new'); if(nb) nb.onclick=function(){nuovoSondaggio(false)};
  var np=$('vt-new-pal'); if(np) np.onclick=function(){nuovoSondaggio(true)};
  v.querySelectorAll('.vt-dib').forEach(function(b){b.onclick=function(){nuovoSondaggio(true,{punto:b.dataset.p,titolo:b.dataset.t})}});
  v.querySelectorAll('.vt-appr').forEach(function(b){b.onclick=async function(){
    if(!await conferma({titolo:'Avallare la proposta?',testo:'Il sondaggio diventa attivo per tutti e parte la notifica.',azione:'Avalla'})) return;
    approveSondaggio(b.dataset.s);
  }});
  v.querySelectorAll('.vt-close').forEach(function(b){b.onclick=async function(){
    var chiudi=b.dataset.chiuso!=='1';
    var sx=sondaggi.find(function(x){return x.id===b.dataset.s});
    var asm=sx&&sx.tipo==='assemblea';
    if(!await conferma(chiudi?{titolo:asm?'Chiudere il voto d\'assemblea?':'Chiudere il voto?',testo:asm?'Il voto di tutto il condominio si chiude e l\'esito resta verbalizzato con la tua firma.':'Nessuno potrà più votare finché non viene riaperto. Se è un voto di palazzina, l\'esito si congela.',azione:'Chiudi il voto'}:{titolo:'Riaprire il voto?',testo:'I condòmini potranno votare di nuovo.',azione:'Riapri'})) return;
    toggleSondaggio(b.dataset.s,chiudi);
  }});
  v.querySelectorAll('.vt-del').forEach(function(b){b.onclick=function(){eliminaSondaggio(b.dataset.s)}});
  v.querySelectorAll('.vt-tras').forEach(function(b){b.onclick=async function(){
    var s=sondaggi.find(function(x){return x.id===b.dataset.s}); if(!s) return;
    if(!await conferma({titolo:'Trasmettere l\'ordine esecutivo?',testo:'«'+s.domanda+'»\nEsito: '+b.dataset.o+'\n\nL\'amministrazione lo riceve nella sua inbox e deve eseguirlo.',azione:'Trasmetti'})) return;
    b.disabled=true;
    if(DEMO){ var w=vinceDi(s); DEMO_ORDINI.unshift({id:'o'+Date.now(),palazzina:s.palazzina,sondaggio_id:s.id,titolo:s.domanda,opzione_vincente:b.dataset.o,esito_mm:w?Math.round(w.mm*100)/100:null,stato:'da_eseguire',trasmesso_da_nome:userNome,created_at:new Date().toISOString()}); renderVoti(); return; }
    var r=await sb.from('ordini_esecutivi').insert({palazzina:s.palazzina,sondaggio_id:s.id,titolo:s.domanda,opzione_vincente:b.dataset.o,trasmesso_da:userId,trasmesso_da_nome:userNome});
    if(r.error){ alert('Errore: '+r.error.message); b.disabled=false; return; }
    renderVoti();
  }});
}
/* ---------- ORDINI ESECUTIVI (inbox amministrazione + card riusata nella sezione palazzina) ---------- */
function ordStato(st){ return st==='eseguito'?['✅','Eseguito']:st==='in_corso'?['🔧','In corso']:['📨','Da eseguire']; }
function ordineCard(o,manage){
  var d=new Date(o.created_at), st=ordStato(o.stato);
  var h='<div class="card"><div style="font-weight:600;font-size:17px">'+esc(o.titolo)+'</div>'+
    '<div style="font-size:14px;color:var(--hint);margin:3px 0 6px">Pal. '+esc(o.palazzina)+' · esito «'+esc(o.opzione_vincente)+'»'+(o.esito_mm?' · '+(+o.esito_mm).toFixed(1).replace('.',',')+'/1000 mm di palazzina':'')+'</div>'+
    '<div style="font-size:14px;color:var(--hint)">trasmesso da '+esc(o.trasmesso_da_nome||'—')+' il '+d.toLocaleDateString('it-IT')+'</div>'+
    '<div style="margin-top:8px"><span class="pill">'+st[0]+' '+st[1]+'</span>'+(o.aggiornato_da_nome?' <span class="sub">agg. da '+esc(o.aggiornato_da_nome)+(o.aggiornato_il?' il '+new Date(o.aggiornato_il).toLocaleDateString('it-IT'):'')+'</span>':'')+'</div>';
  if(manage && o.stato!=='eseguito'){
    h+='<div style="display:flex;gap:7px;margin-top:10px">'+
      (o.stato==='da_eseguire'?'<button class="ord-st" data-id="'+esc(o.id)+'" data-st="in_corso">🔧 Prendi in carico</button>':'')+
      '<button class="ord-st" data-id="'+esc(o.id)+'" data-st="eseguito" style="border-color:var(--ok);color:var(--ok)">✅ Segna eseguito</button></div>';
  }
  return h+'</div>';
}
async function renderOrdini(){
  var v=$('view-ordini'); v.innerHTML='<div class="spin">Carico…</div>';
  var rows;
  if(DEMO){ rows=DEMO_ORDINI.slice(); }
  else {
    var r=await sb.from('ordini_esecutivi').select('*').order('created_at',{ascending:false});
    if(r.error){ v.innerHTML='<div class="empty">Errore: '+esc(r.error.message)+'<br><br>Hai eseguito <b>migrate_v43</b>?</div>'; return; }
    rows=r.data||[];
  }
  var manage=isAmministratore()||adminView();
  var html=vHead('📨','Ordini esecutivi','Decisioni di palazzina (oltre 500/1000 interni) che l\'amministrazione deve eseguire.');
  var aperti=rows.filter(function(o){return o.stato!=='eseguito'}), fatti=rows.filter(function(o){return o.stato==='eseguito'});
  html+='<div class="cap-grp">Da eseguire / in corso ('+aperti.length+')</div>'+(aperti.length?aperti.map(function(o){return ordineCard(o,manage)}).join(''):'<div class="empty">Nessun ordine in attesa. 👍</div>');
  if(fatti.length) html+='<div class="cap-grp">Eseguiti ('+fatti.length+')</div>'+fatti.map(function(o){return ordineCard(o,false)}).join('');
  v.innerHTML=html;
  v.querySelectorAll('.ord-st').forEach(function(b){b.onclick=async function(){
    if(!await conferma(b.dataset.st==='eseguito'?{titolo:'Ordine eseguito?',testo:'La palazzina vedrà l\'ordine come completato, con la tua firma.',azione:'Segna eseguito'}:{titolo:'Prendere in carico l\'ordine?',testo:'La palazzina vedrà che l\'amministrazione ci sta lavorando.',azione:'Prendi in carico'})) return;
    b.disabled=true;

function creaOdg(){

  var m=document.createElement('div');
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:flex-end;justify-content:center;z-index:1000';
